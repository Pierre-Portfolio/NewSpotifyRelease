name: Update market indices

# Récupère les vrais indices (NASDAQ-100, S&P 500, CAC 40) depuis Yahoo Finance côté
# serveur et commit data/indices.json. L'app statique le lit ensuite en same-origin
# (CORS natif), ce qui contourne le mur CORS + RGPD de Yahoo côté navigateur.

on:
  schedule:
    # Toutes les 2 h entre 06:00 et 22:00 UTC, du lundi au vendredi (couvre l'ouverture
    # du CAC ~07:00 UTC jusqu'à la clôture US ~20:00–21:00 UTC).
    - cron: '0 6-22/2 * * 1-5'
  workflow_dispatch: {}   # déclenchement manuel (utile juste après le déploiement)

permissions:
  contents: write

concurrency:
  group: update-indices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch indices from Yahoo Finance
        run: python3 scripts/fetch_indices.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/indices.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/indices.json
            git commit -m "chore: update market indices data"
            git push
          else
            echo "data/indices.json inchangé — rien à committer."
          fi
