// ════════════════════════════════════════════════
// PKCE
// ════════════════════════════════════════════════
function generateRandomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(len))).map(b => chars[b % chars.length]).join('');
}
async function generateCodeChallenge(verifier) {
  const data   = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
async function loginWithSpotify() {
  const verifier   = generateRandomString(64);
  const challenge  = await generateCodeChallenge(verifier);
  localStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
    scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge,
  });
  window.location = `https://accounts.spotify.com/authorize?${params}`;
}
async function exchangeCode(code) {
  const verifier = localStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID, grant_type: 'authorization_code',
    code, redirect_uri: REDIRECT_URI, code_verifier: verifier,
  });
  const res  = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh', data.refresh_token);
    return true;
  }
  return false;
}
async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh');
  if (!refresh) return false;
  const body = new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'refresh_token', refresh_token: refresh });
  const res  = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    return true;
  }
  return false;
}
async function getToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) await refreshToken();
  return localStorage.getItem('spotify_token');
}
function logoutClear() {
  ['spotify_token','spotify_token_expiry','spotify_refresh','pkce_verifier'].forEach(k => localStorage.removeItem(k));
}

// ── Rate-limit guard (module-level) ──────────────
let _rlUntil  = 0;
let _rlNotify = null;
function _rlSet(retryMs) {
  _rlUntil = Date.now() + retryMs + 2000;
  if (_rlNotify) _rlNotify(_rlUntil);
}
function _rlCheck() {
  if (Date.now() < _rlUntil) return { error: 'rate_limited', blockedUntil: _rlUntil };
  return null;
}

async function apiGet(url) {
  const blocked = _rlCheck();
  if (blocked) return null;
  const token = await getToken();
  const res   = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (res.status === 429) {
    const raw     = res.headers.get('Retry-After');
    const retryMs = raw !== null ? parseInt(raw) * 1000 : 60000;
    _rlSet(retryMs);
    const err = new Error('RATE_LIMIT');
    err.retryAfter = (retryMs/1000).toFixed(1);
    err.waitMs  = retryMs + 2000;
    err.waitSec = ((retryMs + 2000)/1000).toFixed(1);
    err.rawHeader = raw;
    throw err;
  }
  if (res.status === 204) return null; // Nothing playing — no body to parse
  return res.json();
}
async function apiPut(url, body) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 429) {
    const raw = res.headers.get('Retry-After');
    _rlSet(raw !== null ? parseInt(raw) * 1000 : 30000);
    return { error: 'rate_limited', blockedUntil: _rlUntil };
  }
  if (res.status === 204) return { ok: true };
  if (res.status === 403) return { error: 'forbidden' };
  if (res.status === 404) return { error: 'no_active_device' };
  return res.json().catch(() => ({ error: 'unknown' }));
}
async function apiPost(url) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
  });
  if (res.status === 429) {
    const raw = res.headers.get('Retry-After');
    _rlSet(raw !== null ? parseInt(raw) * 1000 : 30000);
    return { error: 'rate_limited', blockedUntil: _rlUntil };
  }
  if (res.status === 204) return { ok: true };
  if (res.status === 403) return { error: 'forbidden' };
  if (res.status === 404) return { error: 'no_active_device' };
  return res.json().catch(() => ({ error: 'unknown' }));
}
async function apiDel(url) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, { method:'DELETE', headers: { Authorization:`Bearer ${token}` } });
  if (res.status === 429) { const raw = res.headers.get('Retry-After'); _rlSet(raw ? parseInt(raw)*1000 : 30000); return { error:'rate_limited' }; }
  return { ok: true };
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ════════════════════════════════════════════════
// LOCAL DB — sql.js + IndexedDB
// ════════════════════════════════════════════════
const IDB_KEY = 'spotifyplus_db';

function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('spotifyplus', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('db');
    req.onsuccess = e => res(e.target.result);
    req.onerror   = rej;
  });
}
async function idbGet(key) {
  const db  = await idbOpen();
  return new Promise((res, rej) => {
    const tx  = db.transaction('db', 'readonly');
    const req = tx.objectStore('db').get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = rej;
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('db', 'readwrite');
    tx.objectStore('db').put(value, key);
    tx.oncomplete = res;
    tx.onerror    = rej;
  });
}

let _db = null;

async function initDB() {
  const SQL   = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
  const saved = await idbGet(IDB_KEY);
  if (saved) {
    _db = new SQL.Database(new Uint8Array(saved));
  } else {
    _db = new SQL.Database();
    _db.run(`
      CREATE TABLE IF NOT EXISTS tracks (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        spotify_uri TEXT UNIQUE NOT NULL,
        artist_name TEXT NOT NULL,
        title TEXT NOT NULL,
        release_title TEXT,
        release_type TEXT,
        release_date TEXT,
        cover_url TEXT,
        duration_ms INTEGER,
        listened INTEGER DEFAULT 0,
        added_at TEXT DEFAULT (datetime('now'))
      );
      CREATE TABLE IF NOT EXISTS artists_scraped (
        spotify_id TEXT PRIMARY KEY,
        last_scraped_at TEXT NOT NULL
      );
      CREATE TABLE IF NOT EXISTS stats (
        id INTEGER PRIMARY KEY CHECK (id = 1),
        total_listened INTEGER DEFAULT 0,
        listened_this_month INTEGER DEFAULT 0,
        listened_this_year INTEGER DEFAULT 0,
        last_reset_month TEXT,
        last_reset_year TEXT
      );
    `);
    _db.run("INSERT OR IGNORE INTO stats (id) VALUES (1)");
  }
  // Migration — ajoute la colonne liked si elle n'existe pas encore
  try { _db.run("ALTER TABLE tracks ADD COLUMN liked INTEGER DEFAULT 0"); } catch {}
  return _db;
}

async function saveDB() {
  if (!_db) return;
  const data = _db.export();
  await idbSet(IDB_KEY, data.buffer);
}

function dbRun(sql, params = []) {
  _db.run(sql, params);
}

function dbAll(sql, params = []) {
  const stmt = _db.prepare(sql);
  if (params.length) stmt.bind(params);
  const rows = [];
  while (stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}

function dbGet(sql, params = []) {
  return dbAll(sql, params)[0] || null;
}

function loadListenStatsFromDB() {
  const s     = dbGet("SELECT * FROM stats WHERE id = 1");
  const rem   = dbGet("SELECT COUNT(*) as c FROM tracks WHERE listened = 0");
  const remMs = dbGet("SELECT SUM(duration_ms) as s FROM tracks WHERE listened = 0");
  return {
    remaining:   rem?.c  || 0,
    remaining_ms: remMs?.s || 0,
    this_month:  s?.listened_this_month || 0,
    this_year:   s?.listened_this_year  || 0,
    all_time:    s?.total_listened      || 0,
  };
}

function loadLikedTracksFromDB() {
  return dbAll(
    "SELECT * FROM tracks WHERE liked = 1 ORDER BY id DESC LIMIT 500"
  ).map(r => ({
    id: r.id,
    spotifyUri: r.spotify_uri,
    artist: r.artist_name,
    title: r.title,
    subtitle: r.release_title,
    label: r.release_type === 'discover_weekly' ? 'Découvertes' : (r.release_type || ''),
    date: r.release_date || '',
    image: r.cover_url,
    isNew: false,
  }));
}

// ════════════════════════════════════════════════
// DÉCOUVERTES DE LA SEMAINE — import hebdo auto
// ════════════════════════════════════════════════
const DW_LS_KEY      = 'spotifyplus_dw_last_import';
const DW_MAX_AGE_MS  = 7 * 24 * 60 * 60 * 1000; // 7 jours

async function importDiscoverWeekly(addLog) {
  const last = localStorage.getItem(DW_LS_KEY);
  if (last && Date.now() - parseInt(last) < DW_MAX_AGE_MS) return;

  addLog('── Import Découvertes de la semaine ──', 'info');

  // Chercher la playlist parmi les playlists de l'utilisateur
  let playlistId = null;
  let nextUrl = 'https://api.spotify.com/v1/me/playlists?limit=50';
  while (nextUrl && !playlistId) {
    const data = await apiGet(nextUrl);
    if (!data?.items) break;
    const pl = data.items.find(p =>
      p.owner?.id === 'spotify' &&
      (p.name?.toLowerCase().includes('découvertes') || p.name?.toLowerCase().includes('discover weekly'))
    );
    if (pl) playlistId = pl.id;
    nextUrl = data.next || null;
  }

  if (!playlistId) {
    addLog('⚠ Playlist "Découvertes de la semaine" introuvable — abonne-toi à elle sur Spotify', 'warn');
    return;
  }

  const today      = new Date().toISOString().slice(0, 10);
  const tracksData = await apiGet(`https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=50`);
  if (!tracksData?.items?.length) return;

  let added = 0;
  for (const item of tracksData.items) {
    const t = item.track;
    if (!t?.uri || t.is_local) continue;
    try {
      dbRun(
        "INSERT OR IGNORE INTO tracks (spotify_uri, artist_name, title, release_title, release_type, release_date, cover_url, duration_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
        [t.uri, t.artists?.map(a => a.name).join(', ') || '?', t.name, 'Découvertes de la semaine', 'discover_weekly', today, t.album?.images?.[0]?.url || null, t.duration_ms || null]
      );
      added++;
    } catch {}
  }

  if (added > 0) {
    await saveDB();
    localStorage.setItem(DW_LS_KEY, Date.now().toString());
    addLog(`✓ ${added} titre(s) de "Découvertes de la semaine" ajoutés au feed`, 'ok');
  } else {
    addLog('Découvertes de la semaine : tous les titres sont déjà dans le feed', 'info');
    localStorage.setItem(DW_LS_KEY, Date.now().toString());
  }
}

              id:         t.spotify_uri,
              spotifyUri: t.spotify_uri,
              label:      t.release_type === 'single' ? 'Single' : t.release_type === 'discover_weekly' ? 'Découvertes' : 'Album',
              artist:     t.artist_name,
              title:      t.title,
              subtitle:   t.release_type === 'discover_weekly' ? 'Découvertes de la semaine' : t.release_type !== 'single' ? t.release_title : null,
              date:       t.release_date ? new Date(t.release_date).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) : '',
              scraped_at: t.added_at ? new Date(t.added_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) : null,
              image:      t.cover_url,
              isNew:      false,
            })));
          }

          // Load listen stats
          setListenStats(loadListenStatsFromDB());
          setLikedTracks(loadLikedTracksFromDB());

          // Vérifier si une synchro était en cours (reprise possible)
          try {
            const saved = localStorage.getItem('spotifyplus_sync_progress');
            if (saved) {
              const p = JSON.parse(saved);
              if (p?.artists_scanned > 0) setResumableSession(p);
            }
          } catch {}

          try {
            const today = new Date().toISOString().slice(0, 10);
            const dailyRaw = localStorage.getItem('spotifyplus_daily_scrapings');
            if (dailyRaw) {
              const d = JSON.parse(dailyRaw);
              if (d?.date === today) setDailyScrapings(d.count || 0);
            }
          } catch {}

          if (initMsgs.length > 0) setLogs(initMsgs);
          setDbReady(true);
        } else {
          setAuthState('login');
        }
      } catch { setAuthState('login'); }
    })();
  }, []);

  // ── Poll lecture en cours toutes les 5s ──
  React.useEffect(() => {
    if (authState !== 'connected') return;
    let stop = false;
    const tick = async () => {
      try {
        const r = await apiGet('https://api.spotify.com/v1/me/player/currently-playing');
        if (!stop && r?.item) {
          setNow({
            title:    r.item.name,
            artist:   r.item.artists.map(a => a.name).join(', '),
            duration: Math.floor(r.item.duration_ms / 1000),
            current:  Math.floor((r.progress_ms || 0) / 1000),
            image:    r.item.album?.images?.[0]?.url,
            playing:  r.is_playing,
            uri:      r.item.uri,
          });
        } else if (!stop && !r?.item) {
          setNow(null);
        }
      } catch {}
    };
    tick();
    const id = setInterval(tick, 5000);
    return () => { stop = true; clearInterval(id); };
  }, [authState]);

  // ── Countdown UI ──
  React.useEffect(() => {
    if (nextCall <= 0) return;
    const id = setInterval(() => setNextCall(v => Math.max(0, v - 1)), 1000);
    return () => clearInterval(id);
  }, [nextCall]);

  // ── Marquer comme écouté quand le morceau se termine (URI change) ──
  React.useEffect(() => {
    const currentUri = now?.uri || null;
    const prevUri    = prevUriRef.current;
    prevUriRef.current = currentUri;

    if (!prevUri || prevUri === currentUri) return;

    // Auto-avance — AVANT le check listenedUrisRef pour ne pas être bloqué
    // Déclenche si : loop désactivé ET (rien ne joue OU le nouveau titre n'est pas dans le feed)
    if (!loopEnabledRef.current && dbReady) {
      const f = feedRef.current;
      const prevIdx      = f.findIndex(item => item.spotifyUri === prevUri);
      const currentInFeed = currentUri ? f.some(item => item.spotifyUri === currentUri) : false;
      if (prevIdx !== -1 && !currentInFeed) {
        const next = f[prevIdx + 1] ?? f[0];
        if (next) playTrack(next.spotifyUri);
      }
    }

    if (listenedUrisRef.current.has(prevUri)) return;
    if (!dbReady) return;

    setFeed(F => {
      const item = F.find(f => f.spotifyUri === prevUri);
      if (!item) return F;

      listenedUrisRef.current.add(prevUri);

      try {
        dbRun("UPDATE tracks SET listened = 1 WHERE spotify_uri = ?", [prevUri]);
        dbRun("UPDATE stats SET total_listened = total_listened + 1, listened_this_month = listened_this_month + 1, listened_this_year = listened_this_year + 1 WHERE id = 1");
        saveDB().catch(() => {});
        setListenStats(loadListenStatsFromDB());
      } catch {
        listenedUrisRef.current.delete(prevUri);
      }

      setTimeout(() => setFeed(F2 => F2.filter(f => f.spotifyUri !== prevUri)), 600);
      return F.map(f => f.spotifyUri === prevUri ? { ...f, removing: true } : f);
    });
  }, [now?.uri, dbReady]);

  // ── Détecter fin de titre (≤ 3s restantes) → passer au suivant ──
  React.useEffect(() => {
    if (!now) { prevPositionRef.current = 0; prevDurationRef.current = 0; return; }

    const prevPos = prevPositionRef.current;
    const prevDur = prevDurationRef.current;
    prevPositionRef.current = now.current;
    prevDurationRef.current = now.duration;

    if (loopEnabledRef.current) return;

    // Restart detection (même titre qui repart du début)
    if (now.duration > 15 && now.current < 5 && prevPos > prevDur - 10 && prevDur > 0) {
      const f = feedRef.current;
      const idx = f.findIndex(item => item.spotifyUri === now.uri);
      if (idx !== -1) {
        const next = f[idx + 1] ?? f[0];
        if (next) playTrack(next.spotifyUri);
      }
      return;
    }

    // Fin de titre : ≤ 3s restantes — peu importe is_playing (Spotify retourne false quand ça s'arrête)
    if (now.duration > 15 && advancedForRef.current !== now.uri) {
      const remaining = now.duration - now.current;
      if (remaining >= 0 && remaining <= 3) {
        const f = feedRef.current;
        const idx = f.findIndex(item => item.spotifyUri === now.uri);
        if (idx !== -1) {
          advancedForRef.current = now.uri; // marquer pour éviter le double appel
          const next = f[idx + 1] ?? f[0];
          if (next) playTrack(next.spotifyUri);
        }
      }
    }
  }, [now?.current]);

  // ── Détecter arrêt du titre (playing true → stopped) → avancer si fin proche ──
  // Surveille now entier pour capturer aussi le cas now=null (204 Spotify)
  React.useEffect(() => {
    const prev = prevNowRef.current;
    // Mémoriser l'état courant (garder l'URI même si now=null)
    prevNowRef.current = {
      playing:  now?.playing  ?? false,
      uri:      now?.uri      ?? prev.uri,   // conserve la dernière URI connue
      current:  now?.current  ?? prev.current,
      duration: now?.duration ?? prev.duration,
    };

    // Transition : était en lecture → maintenant arrêté (false ou null)
    if (!prev.playing) return;               // n'était pas en lecture avant
    if (now?.playing === true) return;       // toujours en lecture
    if (loopEnabledRef.current) return;
    if (!dbReady) return;

    const uri = prev.uri;
    if (!uri || advancedForRef.current === uri) return;

    const f = feedRef.current;
    const idx = f.findIndex(item => item.spotifyUri === uri);
    if (idx === -1) return; // titre pas dans notre feed

    // Avancer si les dernières secondes connues indiquent la fin du titre
    const remaining = prev.duration - prev.current;
    if (prev.duration > 15 && remaining <= 8) {
      advancedForRef.current = uri;
      const next = f[idx + 1] ?? f[0];
      if (next) playTrack(next.spotifyUri);
    }
  }, [now]);

  // Connecte le guard module-level au state React
  React.useEffect(() => {
    _rlNotify = (until) => setRateLimitUntil(until);
    return () => { _rlNotify = null; };
  }, []);

  const seek = async (positionMs) => {
    const r = await apiPut(`https://api.spotify.com/v1/me/player/seek?position_ms=${Math.round(positionMs)}`);
    if (!r?.error) setNow(n => n ? { ...n, current: Math.round(positionMs / 1000) } : n);
  };

  const togglePause = () => {
    setPaused(p => {
      const nv = !p;
      log(nv ? '⏸ Synchronisation mise en pause.' : '▶ Reprise de la synchronisation.', nv ? 'wait' : 'ok');
      return nv;
    });
  };
  const waitWhilePaused = async () => { while (pausedRef.current) await sleep(500); };

  const purgeListened = async () => {
    if (!dbReady) return;
    const row   = dbGet("SELECT COUNT(*) as c FROM tracks WHERE listened = 1");
    const count = row?.c || 0;
    dbRun("DELETE FROM tracks WHERE listened = 1");
    await saveDB();
    setListenStats(loadListenStatsFromDB());
    alert(`${count} titre(s) supprimé(s).`);
  };

  const removeFromFeed = async (uri) => {
    if (!dbReady) return;
    dbRun("DELETE FROM tracks WHERE spotify_uri = ?", [uri]);
    await saveDB();
    setFeed(f => f.filter(item => item.spotifyUri !== uri));
    setListenStats(loadListenStatsFromDB());
  };

  const setTrackLiked = async (uri, bool) => {
    if (!dbReady) return;
    dbRun("UPDATE tracks SET liked = ? WHERE spotify_uri = ?", [bool ? 1 : 0, uri]);
    await saveDB();
    setLikedTracks(loadLikedTracksFromDB());
  };

  const resumeSync = () => {
    if (!resumableSession) return;
    startSync({ skipCount: resumableSession.artists_scanned });
  };

  // ── SYNC ──
  const startSync = async (options = {}) => {
    if (scraping) return;
    const { skipCount = 0 } = options;
    setResumableSession(null);
    setScraping(true); setPaused(false);
    setLogs([]); setProgress(0);
    setStats({ artists:0, total:0, releases:0, tracks:0 });
    setEta(''); setStatus('Vérification du compte…', 'pulse');

    try {
      log('── Étape 1 : vérification du compte ──', 'info');
      const me = await apiGet('https://api.spotify.com/v1/me');
      if (!me?.id) { log('Erreur : impossible de récupérer le compte.', 'error'); setScraping(false); return; }
      log(`✓ Compte : ${me.display_name || me.id}`, 'ok');

      // Charger les dates de scrapping depuis la DB locale
      const scrapedRows  = dbAll("SELECT spotify_id, last_scraped_at FROM artists_scraped");
      const scrapedDates = {};
      scrapedRows.forEach(r => { scrapedDates[r.spotify_id] = r.last_scraped_at; });
      log(`✓ Dates de scrapping chargées (${scrapedRows.length} artiste(s) connus)`, 'ok');

      const ceiling = new Date();
      log('── Scraping par date individuelle par artiste ──', 'info');
      setStatus('Chargement des artistes…', 'pulse');

      const _today = new Date().toISOString().slice(0, 10);
      const _dailyRaw = localStorage.getItem('spotifyplus_daily_scrapings');
      let dailyCount = (_dailyRaw ? JSON.parse(_dailyRaw) : null)?.date === _today
        ? (JSON.parse(_dailyRaw).count || 0) : 0;

      const seenUris = new Set(knownUrisRef.current);
      let totalTracks = 0, totalReleases = 0, artistsScanned = skipCount, totalArtists = ESTIMATED_TOTAL;
      let globalArtistIndex = 0;
      let nextUrl = 'https://api.spotify.com/v1/me/following?type=artist&limit=50';
      let pageNum  = 0;

      if (skipCount > 0) log(`↩ Reprise à partir de l'artiste #${skipCount + 1}`, 'ok');

      while (nextUrl) {
        pageNum++;
        const pageData = await apiGet(nextUrl);
        if (!pageData?.artists?.items) { log('Erreur chargement artistes.', 'error'); break; }
        if (pageData.artists.total) {
          totalArtists = pageData.artists.total;
          setStats(s => ({ ...s, total: totalArtists }));
        }
        nextUrl = pageData.artists.next || null;
        const artists = pageData.artists.items;
        log(`✓ ${artists.length} artiste(s) — page ${pageNum}`, 'ok');

        for (let i = 0; i < artists.length; i++) {
          globalArtistIndex++;
          if (globalArtistIndex <= skipCount) continue;
          await waitWhilePaused();
          const artist = artists[i];
          artistsScanned++;
          dailyCount++;
          localStorage.setItem('spotifyplus_daily_scrapings', JSON.stringify({ date: _today, count: dailyCount }));
          setDailyScrapings(dailyCount);
          setStats(s => ({ ...s, artists: artistsScanned }));
          setProgress(Math.min(98, (artistsScanned / totalArtists) * 100));
          setCurrentArtist(artist.name);
          setStatus(`Scan ${artistsScanned}/${totalArtists} — ${artist.name}`, 'pulse');

          const cutoff = new Date(scrapedDates[artist.id] || '2026-03-15');
          const albumsData = await apiGet(
            `https://api.spotify.com/v1/artists/${artist.id}/albums?include_groups=album,single&limit=10&market=FR`
          );
          if (albumsData?.items) {
            const inRange = albumsData.items.filter(a => { const d = new Date(a.release_date); return d >= cutoff && d <= ceiling; });
            if (inRange.length === 0) log(`→ ${artist.name} · aucune sortie depuis ${cutoff.toLocaleDateString('fr-FR')}`, 'info');

            for (const album of albumsData.items) {
              const rDate = new Date(album.release_date);
              if (rDate < cutoff || rDate > ceiling) continue;

              const tracksData = await apiGet(`https://api.spotify.com/v1/albums/${album.id}/tracks?limit=50`);
              if (!tracksData?.items?.length) continue;
              const uris = tracksData.items.map(t => t.uri);
              if (seenUris.has(uris[0])) { log(`${artist.name} — ${album.name} · déjà en base`, 'info'); continue; }

              // Sauvegarder en DB locale
              const coverUrl = album.images?.[0]?.url || null;
              if (album.album_type === 'single') {
                try {
                  dbRun(
                    "INSERT OR IGNORE INTO tracks (spotify_uri, artist_name, title, release_title, release_type, release_date, cover_url, duration_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
                    [uris[0], artist.name, album.name, null, 'single', album.release_date || null, coverUrl, tracksData.items[0]?.duration_ms || null]
                  );
                } catch {}
              } else {
                for (const t of tracksData.items) {
                  try {
                    dbRun(
                      "INSERT OR IGNORE INTO tracks (spotify_uri, artist_name, title, release_title, release_type, release_date, cover_url, duration_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
                      [t.uri, artist.name, t.name, album.name, album.album_type, album.release_date || null, coverUrl, t.duration_ms || null]
                    );
                  } catch {}
                }
              }

              uris.forEach(u => { seenUris.add(u); knownUrisRef.current.add(u); });
              const addedCount = album.album_type === 'single' ? 1 : tracksData.items.length;
              totalTracks  += addedCount;
              totalReleases++;
              setStats(s => ({ ...s, releases: totalReleases, tracks: totalTracks }));

              const dateStr = rDate.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
              if (album.album_type === 'single') {
                setFeed(F => [...F, {
                  id:         uris[0],
                  spotifyUri: uris[0],
                  label:      'Single',
                  artist:     artist.name,
                  title:      album.name,
                  subtitle:   null,
                  date:       dateStr,
                  image:      coverUrl,
                  isNew:      true,
                }].slice(0, 200));
              } else {
                const trackItems = tracksData.items.map(t => ({
                  id:         t.uri,
                  spotifyUri: t.uri,
                  label:      'Album',
                  artist:     artist.name,
                  title:      t.name,
                  subtitle:   album.name,
                  date:       dateStr,
                  image:      coverUrl,
                  isNew:      true,
                }));
                setFeed(F => [...F, ...trackItems].slice(0, 200));
              }
              log(`✓ ${artist.name} — ${album.name} · ${addedCount} titre(s) sauvegardé(s)`, 'ok');
            }
          }

          // Mise à jour de la date de scrapping de l'artiste
          dbRun(
            "INSERT OR REPLACE INTO artists_scraped (spotify_id, last_scraped_at) VALUES (?, datetime('now'))",
            [artist.id]
          );

          // Sauvegarder la progression pour reprise après redémarrage
          localStorage.setItem('spotifyplus_sync_progress', JSON.stringify({
            artists_scanned:  artistsScanned,
            total_artists:    totalArtists,
            last_artist_name: artist.name,
          }));

          const isVeryLast = !nextUrl && i === artists.length - 1;
          if (!isVeryLast) {
            saveDB().catch(() => {});
            const jitter   = Math.random() * 2000 + 1000;
            const delay    = delayChoiceRef.current * 1000 + jitter;
            const nextName = i + 1 < artists.length ? artists[i + 1].name : 'page suivante';
            updateETA(artistsScanned, totalArtists, delay);
            setStatus(`Pause avant : ${nextName}`, 'wait');
            log(`⏳ Attente ${(delay/1000).toFixed(1)}s → ${nextName}`, 'wait');
            const sec = Math.ceil(delay / 1000);
            setNextCallTotal(sec); setNextCall(sec);
            await sleep(delay);
          }
        }
      }

      setProgress(100); setNextCall(0); setEta('');
      await saveDB();
      localStorage.removeItem('spotifyplus_sync_progress');
      if (totalTracks === 0) {
        setStatus('Terminé — aucune nouvelle sortie.', 'green');
        log('Aucune sortie trouvée dans cette période.', 'info');
      } else {
        setStatus(`Terminé ✓ — ${totalTracks} titre(s)`, 'green');
        log(`🎵 ${totalTracks} titre(s) depuis ${totalReleases} sortie(s) sauvegardés en base.`, 'ok');
      }
    } catch (err) {
      setNextCall(0); setEta('');
      if (err.message === 'RATE_LIMIT') {
        log(`🚫 RATE LIMIT 429 — Retry-After: ${err.rawHeader}`, 'error');
        log(`⏳ Pause ${err.waitSec}s…`, 'wait');
        setStatus(`Rate limit 429 — pause ${err.waitSec}s`, 'wait');
        setNextCallTotal(Math.ceil(err.waitMs/1000)); setNextCall(Math.ceil(err.waitMs/1000));
        await sleep(err.waitMs);
        log('Délai écoulé. Relancez manuellement.', 'info');
        setStatus('Arrêté après rate limit.', 'green');
      } else {
        log(`Erreur : ${err.message}`, 'error');
        setStatus('Erreur — arrêté.', 'wait');
      }
    } finally {
      setScraping(false); setPaused(false);
    }
  };

  const logout = () => { logoutClear(); window.location.reload(); };

  const api = {
    authState, user, playlist,
    scraping, paused, togglePause, startSync, logout,
    stats, progress, currentArtist, statusMsg, statusMode,
    nextCall, nextCallTotal, eta, dailyScrapings, feed, logs, now,
    delayChoice, setDelayChoice,
    listenStats, setListenStats,
    rateLimitUntil, seek,
    loopEnabled, setLoopEnabled,
    dbReady, purgeListened, removeFromFeed, setTrackLiked,
    likedTracks, setLikedTracks,
    resumableSession, resumeSync,
  };
  return <StoreCtx.Provider value={api}>{children}</StoreCtx.Provider>;
}

function useIsMobile(bp = 820) {
  const [m, setM] = React.useState(typeof window !== 'undefined' ? window.innerWidth < bp : false);
  React.useEffect(() => {
    const h = () => setM(window.innerWidth < bp);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, [bp]);
  return m;
}

function AlbumArt({ size=48, letter='S', color=C.accent, image }) {
  if (image) return <img src={image} alt="" style={{ width:size, height:size, borderRadius:size*0.15, objectFit:'cover', flexShrink:0 }} />;
  return (
    <div style={{ width:size, height:size, borderRadius:size*0.15, flexShrink:0, background:`linear-gradient(135deg,${color}22,${color}55)`, border:`1px solid ${color}44`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.38, fontWeight:700, color, fontFamily:'DM Mono,monospace' }}>{letter}</div>
  );
}
function ProgressBar({ pct, color=C.accent, height=3 }) {
  return (
    <div style={{ width:'100%', height, background:'#2a2a2a', borderRadius:99, overflow:'hidden' }}>
      <div style={{ width:`${pct}%`, height:'100%', background:color, borderRadius:99, transition:'width 0.6s linear' }} />
    </div>
  );
}

function SeekBar({ now }) {
  const { seek } = useStore();
  const barRef   = React.useRef(null);
  const [hover,    setHover]    = React.useState(false);
  const [dragging, setDragging] = React.useState(false);
  const [localPct, setLocalPct] = React.useState(null);

  const getPct = (clientX) => {
    const r = barRef.current.getBoundingClientRect();
    return Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100));
  };

  const startDrag = (clientX) => {
    setDragging(true);
    setLocalPct(getPct(clientX));
  };
  const onMouseDown = (e) => {
    e.preventDefault();
    startDrag(e.clientX);
    const onMove = (ev) => setLocalPct(getPct(ev.clientX));
    const onUp   = (ev) => {
      const p = getPct(ev.clientX);
      setDragging(false); setLocalPct(null);
      seek((p / 100) * now.duration * 1000);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup',   onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onUp);
  };
  const onTouchStart = (e) => {
    e.preventDefault();
    startDrag(e.touches[0].clientX);
    const onMove = (ev) => setLocalPct(getPct(ev.touches[0].clientX));
    const onEnd  = (ev) => {
      const p = getPct(ev.changedTouches[0].clientX);
      setDragging(false); setLocalPct(null);
      seek((p / 100) * now.duration * 1000);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend',  onEnd);
    };
    window.addEventListener('touchmove', onMove, { passive:false });
    window.addEventListener('touchend',  onEnd);
  };

  const pct       = (dragging && localPct !== null) ? localPct : (now.current / Math.max(now.duration, 1)) * 100;
  const showThumb = hover || dragging;

  return (
    <div ref={barRef}
      onMouseDown={onMouseDown}
      onTouchStart={onTouchStart}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ flex:1, height:28, display:'flex', alignItems:'center', cursor:'pointer', position:'relative', userSelect:'none', touchAction:'none' }}>
      <div style={{ width:'100%', height: showThumb ? 4 : 3, background:'#2a2a2a', borderRadius:99, overflow:'visible', transition:'height 0.12s', position:'relative' }}>
        <div style={{ width:`${pct}%`, height:'100%', background:C.accent, borderRadius:99, transition: dragging ? 'none' : 'width 0.6s linear' }} />
      </div>
      <div style={{
        position:'absolute', left:`${pct}%`, top:'50%',
        transform:'translate(-50%, -50%)',
        width:13, height:13, borderRadius:'50%', background:'#fff',
        boxShadow:'0 1px 6px rgba(0,0,0,0.6)',
        opacity: showThumb ? 1 : 0,
        transition: dragging ? 'none' : 'opacity 0.12s',
        pointerEvents:'none',
      }} />
    </div>
  );
}
function Tag({ children, color=C.accent }) {
  return <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', background:`${color}18`, color, border:`1px solid ${color}40`, borderRadius:4, padding:'2px 6px' }}>{children}</span>;
}
function StatusDot({ active, mode }) {
  const isPulse = mode === 'pulse' || mode === 'wait';
  const col     = mode === 'wait' ? 'oklch(0.75 0.18 80)' : (active ? C.accent : C.dim);
  return <span style={{ display:'inline-block', width:7, height:7, borderRadius:'50%', background:col, boxShadow: active||isPulse ? `0 0 6px ${col}` : 'none', flexShrink:0, animation: isPulse ? 'spdot 1.1s ease-in-out infinite' : 'none' }} />;
}
const fmt      = s => { if (!s && s !== 0) return '0:00'; const m = Math.floor(s/60); return `${m}:${(s%60).toString().padStart(2,'0')}`; };
const logColor = t => t==='ok' ? C.accent : t==='warn'||t==='wait' ? 'oklch(0.75 0.18 80)' : t==='error' ? 'oklch(0.65 0.18 25)' : C.muted;

);

}

function MobilePlayer() {
  const { now, feed, loopEnabled, setLoopEnabled, seek, setTrackLiked } = useStore();
  const [isLiked, setIsLiked] = React.useState(false);

  // Vérifier si le titre en cours est liké sur Spotify
  React.useEffect(() => {
    if (!now?.uri) { setIsLiked(false); return; }
    const id = now.uri.split(':')[2];
    if (!id) return;
    apiGet(`https://api.spotify.com/v1/me/tracks/contains?ids=${id}`)
      .then(data => { if (Array.isArray(data)) setIsLiked(data[0]); })
      .catch(() => {});
  }, [now?.uri]);

  if (!now) return null;

  const trackId      = now.uri?.split(':')[2];
  const currentIndex = feed.findIndex(f => f.spotifyUri === now.uri);
  const hasFeed      = feed.length > 0;

  const togglePlayPause = async () => {
    if (now.playing) await apiPut('https://api.spotify.com/v1/me/player/pause');
    else             await apiPut('https://api.spotify.com/v1/me/player/play');
  };
  const prevTrack = async () => {
    const idx = currentIndex > 0 ? currentIndex - 1 : feed.length - 1;
    if (feed[idx]) await playTrack(feed[idx].spotifyUri);
  };
  const nextTrack = async () => {
    const idx = currentIndex >= 0 && currentIndex < feed.length - 1 ? currentIndex + 1 : 0;
    if (feed[idx]) await playTrack(feed[idx].spotifyUri);
  };
  const toggleLoop = async () => {
    const next = !loopEnabled;
    setLoopEnabled(next);
    await apiPut(`https://api.spotify.com/v1/me/player/repeat?state=${next ? 'track' : 'off'}`);
  };
  const toggleLike = async () => {
    if (!trackId) return;
    if (isLiked) {
      await apiDel(`https://api.spotify.com/v1/me/tracks?ids=${trackId}`);
      setIsLiked(false);
      setTrackLiked(now.uri, false);
    } else {
      await apiPut('https://api.spotify.com/v1/me/tracks', { ids: [trackId] });
      setIsLiked(true);
      setTrackLiked(now.uri, true);
    }
  };

  const btnCtrl = { background:'none', border:'none', cursor:'pointer', padding:10, display:'flex', alignItems:'center', justifyContent:'center' };

  return (
    <div style={{ height:'25vh', minHeight:160, background:'linear-gradient(180deg,#131313 0%,#0a0a0a 100%)', borderTop:`1px solid ${C.border}`, display:'flex', flexDirection:'column', padding:'10px 20px 16px', flexShrink:0, gap:6 }}>

      {/* Pochette + titre + artiste + position + like */}
      <div style={{ display:'flex', alignItems:'center', gap:14, flex:1, minHeight:0 }}>
        <AlbumArt size={80} letter={(now.title||'?')[0]} color={C.accent} image={now.image} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:15, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', color:C.text }}>{now.title}</div>
          <div style={{ fontSize:12, color:C.muted, marginTop:3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{now.artist}</div>
          {currentIndex >= 0 && (
            <div style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', marginTop:5 }}>{currentIndex + 1} / {feed.length}</div>
          )}
        </div>
        {/* Bouton +1min */}
        <button onClick={() => seek(Math.min((now.current + 60) * 1000, now.duration * 1000 - 2000))}
          style={{ ...btnCtrl, flexShrink:0 }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted, fontFamily:'DM Mono,monospace', letterSpacing:'-0.03em' }}>+1:00</span>
        </button>
        {/* Bouton Like */}
        <button onClick={toggleLike} style={{ ...btnCtrl, flexShrink:0 }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill={isLiked ? '#e05050' : 'none'} stroke={isLiked ? '#e05050' : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>

      {/* Barre de progression */}
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:32, textAlign:'right', flexShrink:0 }}>{fmt(now.current)}</span>
        <SeekBar now={now} />
        <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:32, flexShrink:0 }}>{fmt(now.duration)}</span>
      </div>

      {/* Contrôles */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:16 }}>
        <button onClick={prevTrack} style={{ ...btnCtrl, opacity: hasFeed ? 1 : 0.3 }}>
          <svg width="26" height="26" viewBox="0 0 16 16" fill={C.muted}><rect x="1" y="1" width="2" height="14" rx="1"/><path d="M13 1L4 8l9 7V1z"/></svg>
        </button>
        <button onClick={togglePlayPause} style={{ width:56, height:56, borderRadius:'50%', background:C.accent, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          {now.playing
            ? <svg width="16" height="18" viewBox="0 0 12 14" fill="#000"><rect x="0" y="0" width="4" height="14" rx="1"/><rect x="8" y="0" width="4" height="14" rx="1"/></svg>
            : <svg width="16" height="18" viewBox="0 0 12 14" fill="#000"><path d="M1 0l11 7-11 7V0z"/></svg>}
        </button>
        <button onClick={nextTrack} style={{ ...btnCtrl, opacity: hasFeed ? 1 : 0.3 }}>
          <svg width="26" height="26" viewBox="0 0 16 16" fill={C.muted}><rect x="13" y="1" width="2" height="14" rx="1"/><path d="M3 1l9 7-9 7V1z"/></svg>
        </button>
        {/* Bouton Loop / Auto-avance */}
        <button onClick={toggleLoop} style={{ ...btnCtrl }} title={loopEnabled ? 'Passer à la suivante' : 'Relancer en boucle'}>
          {loopEnabled
            ? /* Icône boucle active (accent) */
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                <text x="9" y="15" fontSize="7" fill={C.accent} stroke="none" fontWeight="bold">1</text>
              </svg>
            : /* Icône auto-avance (muted) */
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
          }
        </button>
      </div>
    </div>
  );
}

function PlayerBar() {
  const { now, feed, loopEnabled, setLoopEnabled } = useStore();

  const togglePlayPause = async () => {
    if (!now) return;
    if (now.playing) {
      await apiPut('https://api.spotify.com/v1/me/player/pause');
    } else {
      await apiPut('https://api.spotify.com/v1/me/player/play');
    }
  };

  const toggleLoop = async () => {
    const next = !loopEnabled;
    setLoopEnabled(next);
    await apiPut(`https://api.spotify.com/v1/me/player/repeat?state=${next ? 'track' : 'off'}`);
  };

  const currentIndex = now?.uri ? feed.findIndex(f => f.spotifyUri === now.uri) : -1;

  const prevTrack = async () => {
    const idx = currentIndex > 0 ? currentIndex - 1 : feed.length - 1;
    if (feed[idx]) await playTrack(feed[idx].spotifyUri);
  };
  const nextTrack = async () => {
    const idx = currentIndex >= 0 && currentIndex < feed.length - 1 ? currentIndex + 1 : 0;
    if (feed[idx]) await playTrack(feed[idx].spotifyUri);
  };

  const hasFeed = feed.length > 0;
  const btnStyle = active => ({ background:'none', border:'none', cursor: active ? 'pointer' : 'default', display:'flex', alignItems:'center', justifyContent:'center', padding:6, borderRadius:6, opacity: active ? 0.7 : 0.25 });

  if (!now) {
    return (
      <div style={{ height:68, background:C.surfaceHigh, borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 22px', flexShrink:0 }}>
        <span style={{ fontFamily:'DM Mono,monospace', fontSize:11, color:C.dim }}>Aucune lecture en cours sur Spotify…</span>
      </div>
    );
  }
  return (
    <div style={{ height:68, background:C.surfaceHigh, borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 22px', gap:18, flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, width:240, minWidth:0 }}>
        <AlbumArt size={42} letter={(now.title||'?')[0]} color={C.accent} image={now.image} />
        <div style={{ minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{now.title}</div>
          <div style={{ fontSize:11, color:C.muted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{now.artist}</div>
        </div>
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <button onClick={prevTrack} disabled={!hasFeed} style={btnStyle(hasFeed)} title="Nouveauté précédente">
            <svg width="16" height="16" viewBox="0 0 16 16" fill={C.muted}>
              <rect x="1" y="1" width="2" height="14" rx="1"/>
              <path d="M13 1L4 8l9 7V1z"/>
            </svg>
          </button>
          <div onClick={togglePlayPause} style={{ width:34, height:34, borderRadius:'50%', background:C.accent, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, cursor:'pointer' }}>
            {now.playing
              ? <svg width="10" height="12" viewBox="0 0 12 14" fill="#000"><rect x="0" y="0" width="4" height="14" rx="1"/><rect x="8" y="0" width="4" height="14" rx="1"/></svg>
              : <svg width="10" height="12" viewBox="0 0 12 14" fill="#000"><path d="M1 0l11 7-11 7V0z"/></svg>}
          </div>
          <button onClick={nextTrack} disabled={!hasFeed} style={btnStyle(hasFeed)} title="Nouveauté suivante">
            <svg width="16" height="16" viewBox="0 0 16 16" fill={C.muted}>
              <rect x="13" y="1" width="2" height="14" rx="1"/>
              <path d="M3 1l9 7-9 7V1z"/>
            </svg>
          </button>
          <button onClick={toggleLoop} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', padding:6, borderRadius:6 }} title={loopEnabled ? 'Désactiver la boucle' : 'Répéter ce titre'}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={loopEnabled ? C.accent : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              {loopEnabled && <text x="9" y="15" fontSize="8" fill={C.accent} stroke="none" fontWeight="bold">1</text>}
            </svg>
          </button>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, width:'100%', maxWidth:420 }}>
          <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:30, textAlign:'right' }}>{fmt(now.current)}</span>
          <SeekBar now={now} />
          <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:30 }}>{fmt(now.duration)}</span>
        </div>
      </div>
      <div style={{ width:130, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
        {currentIndex >= 0
          ? <span style={{ fontSize:10, color:C.accent, fontFamily:'DM Mono,monospace' }}>{currentIndex + 1} / {feed.length}</span>
          : <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace' }}>En direct ↗</span>
        }
        {currentIndex >= 0 && feed[currentIndex]?.label &&
          <span style={{ fontSize:9, color:C.dim, letterSpacing:'0.05em' }}>{feed[currentIndex].label.toUpperCase()}</span>

      </div>
    </div>
  );
}

function ScrapingStatusPanel({ compact=false }) {
  const s = useStore();
  const total = Math.max(s.stats.total, 1);
  const pct   = (s.stats.artists / total) * 100;
  const label = s.scraping
    ? (s.paused ? 'EN PAUSE' : 'EN COURS')
    : (s.stats.artists > 0 ? 'TERMINÉ' : 'EN ATTENTE');

  return (
    <div style={{ borderRadius:10, background:C.surface, border:`1px solid ${C.border}`, padding: compact?'10px 12px':'14px 16px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom: compact?8:12 }}>
        <StatusDot active={s.scraping} mode={s.statusMode} />
        <span style={{ fontSize: compact?11:12, fontWeight:700, letterSpacing:'0.06em' }}>SCRAPING {label}</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap: compact?6:10, marginBottom: compact?10:14 }}>
        {[
          ['Artistes', s.stats.total ? `${s.stats.artists}/${s.stats.total}` : s.stats.artists, C.accent, `${s.dailyScrapings}/100`],
          ['Sorties',  s.stats.releases, C.accent, null],
          ['Titres',   s.stats.tracks,   C.accent, null],
        ].map(([lbl, val, color, sub]) => (
          <div key={lbl} style={{ background:C.surfaceHigh, border: compact?'none':`1px solid ${C.border}`, borderRadius: compact?6:8, padding: compact?'8px 6px':'12px 14px', textAlign: compact?'center':'left' }}>
            <div style={{ fontSize: compact?14:24, fontWeight:700, color, fontFamily:'DM Mono,monospace', lineHeight:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{val}</div>
            <div style={{ fontSize:9, color:C.muted, marginTop: compact?3:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>{lbl}</div>
            {sub && <div style={{ fontSize:9, color:C.accent, marginTop:2, fontFamily:'DM Mono,monospace', opacity:0.7 }}>{sub} aujourd'hui</div>}

        ))}
      </div>
      <ProgressBar pct={pct} />
      <div style={{ marginTop: compact?8:10, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
        <span style={{ fontSize: compact?10:11, color:C.dim }}>{s.statusMsg}</span>
        {s.currentArtist && (
          <span style={{ fontSize: compact?10:11, background:'#1e1e1e', border:`1px solid ${C.border}`, borderRadius:99, padding:'2px 10px', color:C.muted }}>{s.currentArtist}</span>
        )}
      </div>
    </div>
  );
}

function DateRangePanel({ compact=false }) {
  const s = useStore();
  const hasResume = !s.scraping && s.resumableSession;

    if (hasResume) {
      if (!confirm('Êtes-vous sûr de vouloir recommencer la synchro de 0 ?\nLa progression en cours sera perdue.')) return;
    }
    s.startSync();

  return (
    <div style={{ borderRadius:10, background: compact?C.surface:C.surfaceHigh, border:`1px solid ${C.border}`, padding: compact?'10px 12px':'12px 14px' }}>

        <button onClick={s.resumeSync}

        </button>
      )}

      <div style={{ display:'flex', gap: compact?8:6 }}>
        <button onClick={onLancer} disabled={s.scraping}
          style={{ flex:2, background: hasResume ? '#2a1a1a' : C.accent, border: hasResume ? '1px solid #5a2a2a' : 'none', borderRadius:6, padding: compact?'8px 0':'7px 0', cursor: s.scraping?'default':'pointer', color: hasResume ? '#c05050' : '#000', fontSize:11, fontWeight:700, opacity: s.scraping?0.6:1 }}>
          {s.scraping ? '▶ En cours…' : hasResume ? '↺ Recommencer la synchro de 0' : '▶ Lancer la synchronisation'}
        </button>
        {s.scraping && (
          <button onClick={s.togglePause}
            style={{ flex:1, background:`${C.accent}18`, border:`1px solid ${C.accent}40`, borderRadius:6, padding: compact?'8px 0':'7px 0', cursor:'pointer', color:C.accent, fontSize:11, fontWeight:700 }}>
            {s.paused ? '▶ Reprendre' : '⏸ Pause'}
          </button>
        )}
      </div>

      <button onClick={testConnection}
        style={{ width:'100%', marginTop:8, background:'none', border:`1px solid ${C.border}`, borderRadius:6, padding: compact?'6px 0':'7px 0', cursor:'pointer', color:C.muted, fontSize:10, fontWeight:600, letterSpacing:'0.04em' }}>
        ⚡ Tester la connexion
      </button>
    </div>
  );
}

function NextCallPanel({ compact=false }) {
  const s = useStore();
  if (!s.scraping || s.nextCall <= 0) return null;
  const pct = s.nextCallTotal > 0 ? (s.nextCall / s.nextCallTotal) * 100 : 0;
  return (
    <div style={{ borderRadius:10, background: compact?C.surface:C.surfaceHigh, border:`1px solid ${C.border}`, padding: compact?'10px 12px':'10px 14px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
        <span style={{ fontSize:10, fontWeight:700, color:C.dim, letterSpacing:'0.07em' }}>PROCHAIN APPEL DANS…</span>
        <span style={{ fontSize: compact?12:13, fontFamily:'DM Mono,monospace', color:C.accent }}>{s.nextCall}s</span>
      </div>
      <ProgressBar pct={pct} color={C.accent} height={4} />
      {s.eta && (
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:6, fontSize:10, color:C.muted }}>
          <span>Temps total restant</span>
          <span style={{ fontFamily:'DM Mono,monospace', color:C.accent }}>{s.eta}</span>
        </div>
      )}
      {s.stats.total > 0 && (() => {
        const totalLeft = Math.max(0, s.stats.total - s.stats.artists);
        const remainingToday = Math.max(0, 100 - s.dailyScrapings);
        let label;
        if (totalLeft === 0) {
          label = 'Terminé';
        } else if (totalLeft <= remainingToday) {
          label = "Aujourd'hui";
        } else {
          const days = 1 + Math.ceil((totalLeft - remainingToday) / 100);
          label = days === 1 ? 'Demain' : `${days} jours`;
        }
        return (
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:4, fontSize:10, color:C.muted }}>
            <span>Temps total de la session</span>
            <span style={{ fontFamily:'DM Mono,monospace', color:C.accent }}>{label}</span>
          </div>
        );
      })()}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:10, paddingTop:8, borderTop:`1px solid ${C.border}` }}>
        <span style={{ fontSize:10, color:C.dim, letterSpacing:'0.07em', fontWeight:700 }}>DÉLAI ENTRE ARTISTES</span>
        <select
          value={s.delayChoice}
          onChange={e => s.setDelayChoice(Number(e.target.value))}
          style={{ background:'#111', border:`1px solid ${C.accent}44`, borderRadius:6, padding:'3px 8px', fontSize:11, fontFamily:'DM Mono,monospace', color:C.accent, outline:'none', cursor:'pointer' }}>
          <option value={10}>10s</option>
          <option value={20}>20s</option>
          <option value={30}>30s</option>
        </select>
      </div>
    </div>
  );
}

function LogsPanel({ compact=false }) {
  const { logs } = useStore();
  const ref = React.useRef(null);
  React.useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [logs]);
  return (
    <div style={{ borderRadius:10, background: compact?C.surface:C.surfaceHigh, border:`1px solid ${C.border}`, padding: compact?'10px 12px':'12px 14px', display:'flex', flexDirection:'column', flex: compact?'none':1, minHeight: compact?0:0 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
        <span style={{ fontSize:10, fontWeight:700, color:C.dim, letterSpacing:'0.07em' }}>LOGS</span>
      </div>
      <div ref={ref} className="logs-scroll" style={{ background:'#080808', borderRadius:6, padding:8, display:'flex', flexDirection:'column', gap:4, fontFamily:'DM Mono,monospace', maxHeight: compact?260:320, overflowY:'auto' }}>
        {logs.length === 0 && <div style={{ fontSize:10, color:C.dim }}>Aucun événement.</div>}
        {logs.map((l, i) => (
          <div key={i} style={{ display:'flex', gap:6, alignItems:'flex-start' }}>
            <span style={{ fontSize:9, color:C.dim, whiteSpace:'nowrap', paddingTop:1 }}>[{l.time}]</span>
            <span style={{ fontSize: compact?11:10, color:logColor(l.type) }}>{l.msg}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

async function playTrack(spotifyUri) {
  if (!spotifyUri) return;
  const result = await apiPut('https://api.spotify.com/v1/me/player/play', { uris: [spotifyUri] });
  if (result?.error === 'no_active_device') alert('Aucun appareil Spotify actif. Ouvre Spotify d\'abord.');
  if (result?.error === 'forbidden')        alert('Lecture impossible — compte Spotify Free ?');
}

function FeedItem({ item, i, isMobile=false }) {
  const { now, removeFromFeed } = useStore();
  const [playing, setPlaying] = React.useState(false);
  const isNowPlaying = now?.uri === item.spotifyUri;

  const onPlay = async e => {
    e.stopPropagation();
    setPlaying(true);
    await playTrack(item.spotifyUri);
    setTimeout(() => setPlaying(false), 2000);
  };

  return (
    <div className={item.removing ? 'feed-removing' : ''}
      style={{ display:'flex', alignItems:'center', gap: isMobile?10:12, padding: isMobile?'7px 4px':'7px 8px', borderRadius:8, transition:'background 0.15s', background: isNowPlaying ? `${C.accent}0d` : 'transparent' }}
      onMouseEnter={e => { if (!item.removing) e.currentTarget.style.background = isNowPlaying ? `${C.accent}18` : C.surface; }}
      onMouseLeave={e => { e.currentTarget.style.background = isNowPlaying ? `${C.accent}0d` : 'transparent'; }}>

      <div style={{ width: isMobile?14:16, flexShrink:0, display:'flex', alignItems:'flex-end', justifyContent:'center', height:16 }}>
        {isNowPlaying
          ? <div style={{ display:'flex', alignItems:'flex-end', gap:2, height:14 }}>
              {[14, 10, 12].map((h, n) => (
                <div key={n} className="eq-bar" style={{ width:3, height:h, background:C.accent }} />
              ))}
            </div>
          : <span style={{ fontSize: isMobile?10:11, color:C.dim, fontFamily:'DM Mono,monospace' }}>{i+1}</span>
        }
      </div>

      <AlbumArt size={38} letter={item.artist[0]} color={item.isNew ? C.accent : item.label === 'Découvertes' ? 'oklch(0.65 0.18 300)' : C.blue} image={item.image} />

      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', color: isNowPlaying ? C.accent : C.text }}>
          {item.title}
        </div>
        <div style={{ fontSize: isMobile?10:11, color:C.muted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
          {item.artist}{item.subtitle ? ` · ${item.subtitle}` : ''}
        </div>
      </div>

      {isMobile
        ? (item.label === 'Découvertes' ? <Tag color='oklch(0.65 0.18 300)'>DW</Tag> : item.isNew && <Tag color={C.accent}>NEW</Tag>)
        : (<>
            <Tag color={item.isNew ? C.accent : item.label === 'Découvertes' ? 'oklch(0.65 0.18 300)' : C.blue}>{item.label}</Tag>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', flexShrink:0, gap:1 }}>
              <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace' }}>{item.date}</span>
              {item.scraped_at && <span style={{ fontSize:9, color:C.muted, fontFamily:'DM Mono,monospace' }} title="Date de scraping">↓ {item.scraped_at}</span>}
            </div>
          </>)}

      <button onClick={e => { e.stopPropagation(); removeFromFeed(item.spotifyUri); }}
        title="Retirer de la liste"
        style={{ width:24, height:24, borderRadius:'50%', border:`1px solid ${C.border}`, background:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, color:C.muted, fontSize:14, lineHeight:1, opacity:0.5, transition:'opacity 0.15s' }}
        onMouseEnter={e => e.currentTarget.style.opacity='1'}
        onMouseLeave={e => e.currentTarget.style.opacity='0.5'}>
        ×
      </button>
      <button onClick={onPlay}
        style={{ width:28, height:28, borderRadius:'50%', border:'none', background: (playing || isNowPlaying) ? C.accent : `${C.accent}22`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'background 0.2s' }}>
        <svg width="9" height="10" viewBox="0 0 9 10" fill={(playing || isNowPlaying) ? '#000' : C.accent}><path d="M0 0l9 5-9 5V0z"/></svg>
      </button>
    </div>
  );
}

function VosEcoutesPanel() {
  const { listenStats: ls, purgeListened, dbReady } = useStore();
  const fmtN = n => Number(n).toLocaleString('fr-FR');
  const fmtDuration = ms => {
    const totalMin = Math.floor((ms || 0) / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  };
  const cards = [
    { label:'RESTANTES À ÉCOUTER', value: fmtN(ls.remaining),        sub:'dans la file',    icon:'⏳', color:'#c8956c' },
    { label:'TEMPS D\'ÉCOUTE',     value: fmtDuration(ls.remaining_ms), sub:'heures restantes', icon:'⏱', color:'#e07b54' },
    { label:'CE MOIS-CI',          value: fmtN(ls.this_month),        sub:'écoutées',        icon:'📅', color: C.accent },
    { label:'CETTE ANNÉE',         value: fmtN(ls.this_year),         sub:'écoutées',        icon:'🗓', color:'#7b8ff7' },
    { label:'DEPUIS TOUJOURS',     value: fmtN(ls.all_time),          sub:'écoutées',        icon:'🎵', color:'#b07fe8' },
  ];
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      {cards.map(({ label, value, sub, icon, color }) => (
        <div key={label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:'10px 12px', display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:20, width:32, textAlign:'center', flexShrink:0 }}>{icon}</div>
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:'0.07em', color:C.dim, marginBottom:2 }}>{label}</div>
            <div style={{ fontSize:22, fontWeight:800, color, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{value}</div>
            <div style={{ fontSize:9, color:C.muted, marginTop:2 }}>{sub}</div>
          </div>
        </div>
      ))}
      <button onClick={purgeListened} disabled={!dbReady || ls.remaining === undefined}
        style={{ background:'#1a0a0a', border:'1px solid #3a1a1a', borderRadius:10, padding:'10px 14px', cursor: dbReady ? 'pointer' : 'default', color:'#c05050', fontSize:11, fontWeight:700, letterSpacing:'0.04em', opacity: dbReady ? 1 : 0.4, textAlign:'left' }}>
        🗑 Purger les écoutés
      </button>
    </div>
  );
}

function FeedList({ isMobile=false }) {
  const { feed } = useStore();
  if (feed.length === 0) {
    return <div style={{ fontSize:11, color:C.dim, padding:'40px 0', textAlign:'center', fontFamily:'DM Mono,monospace' }}>Aucune musique en attente.</div>;
  }
  return (
    <div style={{ display:'flex', flexDirection:'column' }}>
      {feed.map((item, i) => <FeedItem key={item.id + i} item={item} i={i} isMobile={isMobile} />)}
    </div>
  );
}

// ════════════════════════════════════════════════
// LIKER PANEL
// ════════════════════════════════════════════════
function LikerPanel() {
  const { likedTracks, removeFromFeed, setTrackLiked } = useStore();

  const onUnlike = async (item) => {
    const trackId = item.spotifyUri?.split(':')[2];
    if (trackId) await apiDel(`https://api.spotify.com/v1/me/tracks?ids=${trackId}`);
    setTrackLiked(item.spotifyUri, false);
  };

  if (likedTracks.length === 0) {
    return (
      <div style={{ fontSize:11, color:C.dim, padding:'40px 0', textAlign:'center', fontFamily:'DM Mono,monospace' }}>
        Aucun titre liké.<br/>
        <span style={{ fontSize:10, color:C.muted }}>Utilisez ❤️ dans le player pour liker un titre.</span>
      </div>
    );
  }

  return (
    <div style={{ display:'flex', flexDirection:'column' }}>
      {likedTracks.map(item => (
        <div key={item.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 4px', borderRadius:8, background:'transparent' }}>
          <AlbumArt size={38} letter={item.artist[0]} color={item.label === 'Découvertes' ? 'oklch(0.65 0.18 300)' : C.accent} image={item.image} />
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', color:C.text }}>{item.title}</div>
            <div style={{ fontSize:10, color:C.muted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
              {item.artist}{item.subtitle ? ` · ${item.subtitle}` : ''}
            </div>
          </div>
          <button onClick={() => onUnlike(item)}
            title="Retirer le like"
            style={{ width:28, height:28, borderRadius:'50%', border:'none', background:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#e05050" stroke="#e05050" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <button onClick={() => playTrack(item.spotifyUri)}
            style={{ width:28, height:28, borderRadius:'50%', border:'none', background:`${C.accent}22`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="9" height="10" viewBox="0 0 9 10" fill={C.accent}><path d="M0 0l9 5-9 5V0z"/></svg>
          </button>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════
// MOBILE APP
// ════════════════════════════════════════════════
function MobileApp() {
  const s   = useStore();
  const [tab, setTab] = React.useState('scrapping');
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, color:C.text, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ padding:'10px 16px 8px', display:'flex', alignItems:'center', justifyContent:'space-between', background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontWeight:800, fontSize:16, letterSpacing:'-0.03em' }}>
          <span style={{ color:C.accent }}>Spotify</span><span style={{ color:C.text }}>+</span>
        </div>
        <div style={{ display:'flex', gap:4 }}>
          {[['scrapping','Scrapping'],['ecouter','À écouter'],['liker','❤ Likés'],['stats','Stats']].map(([k,n]) => {
            const active = tab === k;
            return <button key={k} onClick={() => setTab(k)} style={{ background: active?`${C.accent}18`:'none', border: active?`1px solid ${C.accent}40`:'1px solid transparent', color: active?C.accent:C.muted, borderRadius:6, padding:'3px 8px', cursor:'pointer', fontSize:10, fontWeight: active?700:400 }}>{n}</button>;
          })}
        </div>
      </div>
      <div style={{ padding:'10px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
          <UserChip size="md" />
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{s.user?.display_name || s.user?.id || '—'}</div>
            <div style={{ fontSize:10, color:C.muted, display:'flex', alignItems:'center', gap:4 }}>
              <StatusDot active={true} /> {s.user?.product || 'connecté'}
            </div>
          </div>
        </div>
        <button onClick={s.logout} style={{ fontSize:10, color:C.muted, background:'none', border:`1px solid ${C.border}`, borderRadius:6, padding:'3px 8px', cursor:'pointer' }}>Déconnecter</button>
      </div>
      <div style={{ flex:1, overflowY:'auto', minHeight:0 }}>
        {tab === 'scrapping' && (
          <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            <DateRangePanel compact />
            <ScrapingStatusPanel compact />
            <NextCallPanel compact />
            <LogsPanel compact />
          </div>
        )}
        {tab === 'ecouter' && (
          <div style={{ padding:'12px 14px' }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.dim, letterSpacing:'0.07em', marginBottom:10 }}>SORTIES TROUVÉES · {s.feed.length}</div>
            <FeedList isMobile />
          </div>
        )}
        {tab === 'liker' && (
          <div style={{ padding:'12px 14px' }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.dim, letterSpacing:'0.07em', marginBottom:10 }}>TITRES LIKÉS · {s.likedTracks.length}</div>
            <LikerPanel />
          </div>
        )}
        {tab === 'stats' && (
          <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.dim, letterSpacing:'0.07em' }}>VOS ÉCOUTES</div>
            <VosEcoutesPanel />
          </div>
        )}
      </div>
      <MobilePlayer />
    </div>
  );
}

// ════════════════════════════════════════════════
// DESKTOP APP
// ════════════════════════════════════════════════
function WebApp() {
  const s = useStore();
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, color:C.text, display:'flex', flexDirection:'column', fontSize:13, overflow:'hidden' }}>
      <div style={{ height:50, borderBottom:`1px solid ${C.border}`, background:C.surface, display:'flex', alignItems:'center', padding:'0 22px', gap:20, flexShrink:0 }}>
        <div style={{ fontWeight:800, fontSize:17, letterSpacing:'-0.03em' }}>
          <span style={{ color:C.accent }}>Spotify</span><span style={{ color:C.text }}>+</span>
        </div>
        <div style={{ flex:1 }}>
          <button style={{ background:`${C.accent}18`, border:`1px solid ${C.accent}40`, color:C.accent, borderRadius:6, padding:'4px 12px', cursor:'pointer', fontSize:12, fontWeight:700 }}>Scrapping</button>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>

          <div style={{ minWidth:0 }}>

          </div>
          <button onClick={s.logout} style={{ fontSize:11, color:C.muted, background:'none', border:`1px solid ${C.border}`, borderRadius:6, padding:'3px 10px', cursor:'pointer', marginLeft:4 }}>Déconnecter</button>
        </div>
      </div>

      <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
        <div style={{ width:280, borderRight:`1px solid ${C.border}`, background:C.surface, padding:'16px 14px', display:'flex', flexDirection:'column', gap:14, overflowY:'auto', flexShrink:0 }}>
          <DateRangePanel />
          <NextCallPanel />
          <LogsPanel />
        </div>

        <div style={{ flex:1, overflowY:'auto', padding:'22px 24px', minWidth:0 }}>
          <div style={{ marginBottom:20 }}>
            <ScrapingStatusPanel />
          </div>
          <div>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:10 }}>
              <div>
                <h1 style={{ fontSize:16, fontWeight:700, letterSpacing:'-0.02em', marginBottom:2 }}>Nouveautés pour vous</h1>
                <p style={{ fontSize:11, color:C.muted }}>
                  {s.playlist ? `Playlist : ${s.playlist.name}` : 'Basées sur vos abonnements'}
                  {s.feed.length > 0 && ` · ${s.feed.length} sortie(s)`}
                </p>
              </div>
            </div>
            <FeedList />
          </div>
        </div>

        <div style={{ width:240, borderLeft:`1px solid ${C.border}`, background:C.surface, padding:'22px 16px', display:'flex', flexDirection:'column', gap:10, overflowY:'auto', flexShrink:0 }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', color:C.dim, marginBottom:4 }}>VOS ÉCOUTES</div>
          <VosEcoutesPanel />
        </div>
      </div>

      <PlayerBar />
    </div>
  );
}

// ════════════════════════════════════════════════
// ROOT
// ════════════════════════════════════════════════
function Shell() {
  const { authState } = useStore();
  const isMobile      = useIsMobile();

  if (authState === 'loading') {
    return (
      <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#0a0a0a' }}>
        <div style={{ fontFamily:'DM Mono,monospace', fontSize:11, color:C.muted, letterSpacing:'0.1em' }}>// CHARGEMENT…</div>
      </div>
    );
  }
  if (authState === 'login') return <Home isMobile={isMobile} />;
  return isMobile ? <MobileApp /> : <WebApp />;
}

function App() {
  return (
    <StoreProvider>
      <Shell />
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
