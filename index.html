          <div onClick={togglePlayPause} style={{ width:34, height:34, borderRadius:'50%', background:C.accent, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, cursor:'pointer' }}>
            {now.playing
              ? <svg width="10" height="12" viewBox="0 0 12 14" fill="#000"><rect x="0" y="0" width="4" height="14" rx="1"/><rect x="8" y="0" width="4" height="14" rx="1"/></svg>
              : <svg width="10" height="12" viewBox="0 0 12 14" fill="#000"><path d="M1 0l11 7-11 7V0z"/></svg>}
          </div>
          <button onClick={nextTrack} disabled={!hasFeed} style={btnStyle(hasFeed)} title="Nouveauté suivante">
            <svg width="16" height="16" viewBox="0 0 16 16" fill={C.muted}>
              <rect x="13" y="1" width="2" height="14" rx="1"/>
              <path d="M3 1l9 7-9 7V1z"/>

          </button>
          <button onClick={toggleLoop} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', padding:6, borderRadius:6 }} title={loopEnabled ? 'Désactiver la boucle' : 'Répéter ce titre'}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={loopEnabled ? C.accent : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              {loopEnabled && <text x="9" y="15" fontSize="8" fill={C.accent} stroke="none" fontWeight="bold">1</text>}

        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, width:'100%', maxWidth:420 }}>
          <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:30, textAlign:'right' }}>{fmt(now.current)}</span>
          <SeekBar now={now} />
          <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:30 }}>{fmt(now.duration)}</span>

      <div style={{ width:130, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
        {currentIndex >= 0

function ScrapingStatusPanel({ compact=false }) {
  const s = useStore();
  const total = Math.max(s.stats.total, 1);
  const pct   = (s.stats.artists / total) * 100;
  const label = s.scraping
    ? ((s.paused || s.rlWaiting) ? 'EN PAUSE' : 'EN COURS')
    : (s.stats.artists > 0 ? 'TERMINÉ' : 'EN ATTENTE');

  return (
    <div style={{ borderRadius:10, background:C.surface, border:`1px solid ${C.border}`, padding: compact?'10px 12px':'14px 16px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom: compact?8:12 }}>
        <StatusDot active={s.scraping} mode={s.statusMode} />
        <span style={{ fontSize: compact?11:12, fontWeight:700, letterSpacing:'0.06em' }}>SCRAPING {label}</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap: compact?6:10, marginBottom: compact?10:14 }}>
        {[
          ['Artistes', s.stats.total ? `${s.stats.artists}/${s.stats.total}` : s.stats.artists, C.accent, `${s.dailyScrapings}/100`],
          ['Sorties',  s.stats.releases, C.accent, null],
          ['Titres',   s.stats.tracks,   C.accent, null],
        ].map(([lbl, val, color, sub]) => (
          <div key={lbl} style={{ background:C.surfaceHigh, border: compact?'none':`1px solid ${C.border}`, borderRadius: compact?6:8, padding: compact?'8px 6px':'12px 14px', textAlign: compact?'center':'left' }}>

function DateRangePanel({ compact=false }) {
  const s = useStore();
  const hasResume = !s.scraping && s.resumableSession;

  // Blocage après 429 répétés : countdown re-rendu chaque seconde tant qu'il est actif
  const [, forceTick] = React.useState(0);
  const blocked = s.blockedUntil > Date.now();
  React.useEffect(() => {
    if (s.blockedUntil <= Date.now()) return;
    const id = setInterval(() => {
      forceTick(v => v + 1);
      if (Date.now() >= s.blockedUntil) clearInterval(id);
    }, 1000);
    return () => clearInterval(id);
  }, [s.blockedUntil]);
  const blockedMin = blocked ? Math.ceil((s.blockedUntil - Date.now()) / 60000) : 0;

  const onLancer = () => {
    if (hasResume) {
      if (!confirm('Êtes-vous sûr de vouloir recommencer la synchro de 0 ?\nLa progression en cours sera perdue.')) return;
    }
    s.startSync();
  };

  return (
    <div style={{ borderRadius:10, background: compact?C.surface:C.surfaceHigh, border:`1px solid ${C.border}`, padding: compact?'10px 12px':'12px 14px' }}>
      <div style={{ fontSize:10, color:C.dim, letterSpacing:'0.07em', fontWeight:700, marginBottom: compact?8:10 }}>SYNCHRONISATION</div>

      {/* Bandeau blocage rate-limit */}
      {blocked && (
        <div style={{ fontSize:10, color:'#c05050', background:'#1a0a0a', border:'1px solid #3a1a1a', borderRadius:6, padding:'6px 10px', marginBottom:8, textAlign:'center' }}>
          🚫 Rate limit Spotify — réessaie dans {blockedMin} min
        </div>
      )}

      {/* Bouton Reprendre — affiché EN PREMIER si session en cours */}
      {hasResume && (
        <button onClick={s.resumeSync} disabled={blocked}
          style={{ width:'100%', marginBottom:8, background:`${C.accent}18`, border:`1px solid ${C.accent}55`, borderRadius:6, padding: compact?'10px 12px':'12px 14px', cursor: blocked?'default':'pointer', color:C.accent, textAlign:'left', opacity: blocked?0.5:1 }}>
          <div style={{ fontSize: compact?12:13, fontWeight:700, letterSpacing:'0.02em' }}>↩ Reprendre la synchro en cours</div>
          <div style={{ fontSize:10, color:C.muted, fontWeight:400, marginTop:3, fontFamily:'DM Mono,monospace' }}>
            {s.resumableSession.artists_scanned} / {s.resumableSession.total_artists || '?'} artistes · dernier : {s.resumableSession.last_artist_name || '–'}
          </div>
        </button>
      )}

      <div style={{ display:'flex', gap: compact?8:6 }}>
        <button onClick={onLancer} disabled={s.scraping || blocked}
          style={{ flex:2, background: hasResume ? '#2a1a1a' : C.accent, border: hasResume ? '1px solid #5a2a2a' : 'none', borderRadius:6, padding: compact?'8px 0':'7px 0', cursor: (s.scraping || blocked)?'default':'pointer', color: hasResume ? '#c05050' : '#000', fontSize:11, fontWeight:700, opacity: (s.scraping || blocked)?0.6:1 }}>
          {s.scraping ? '▶ En cours…' : hasResume ? '↺ Recommencer la synchro de 0' : '▶ Lancer la synchronisation'}
        </button>
        {s.scraping && (
          <button onClick={s.togglePause}
            style={{ flex:1, background:`${C.accent}18`, border:`1px solid ${C.accent}40`, borderRadius:6, padding: compact?'8px 0':'7px 0', cursor:'pointer', color:C.accent, fontSize:11, fontWeight:700 }}>
            {s.paused ? '▶ Reprendre' : '⏸ Pause'}
          </button>
        )}
      </div>
    </div>
  );
}

async function playTrack(spotifyUri) {
  if (!spotifyUri) return;
  const result = await apiPut('https://api.spotify.com/v1/me/player/play', { uris: [spotifyUri] });
  if (result?.error === 'no_active_device') alert('Aucun appareil Spotify actif. Ouvre Spotify d\'abord.');
  if (result?.error === 'forbidden')        alert('Lecture impossible — compte Spotify Free ?');
}

// React.memo + props explicites (pas de useStore) : seuls les items dont les props changent
// re-render — sans ça, les ~1000 lignes du feed re-rendaient à chaque tick du poll player (5s)
const FeedItem = React.memo(function FeedItem({ item, i, isMobile=false, isNowPlaying, removeFromFeed, setTrackLiked, navigateFeed }) {
  const [playing, setPlaying]       = React.useState(false);
  const [liked,   setLikedLocal]    = React.useState(item.liked || 0);
  const [swipeDx, setSwipeDx]       = React.useState(0);
  const touchStartX = React.useRef(0);
  const swiping     = React.useRef(false);

  // Sync liked depuis les mises à jour du store
  React.useEffect(() => { setLikedLocal(item.liked || 0); }, [item.liked]);

  const onPlay = async e => {
    e.stopPropagation();
    setPlaying(true);
    await playTrack(item.spotifyUri);
    setTimeout(() => setPlaying(false), 2000);
  };

  const onToggleLike = async e => {
    e.stopPropagation();
    const newVal = liked ? 0 : 1;
    setLikedLocal(newVal);
    if (item.spotifyUri) {
      const res = newVal ? await librarySave(item.spotifyUri) : await libraryRemove(item.spotifyUri);
      if (libraryScopeAlert(res)) { setLikedLocal(liked ? 1 : 0); return; }
    }
    setTrackLiked(item.spotifyUri, !!newVal);
  };

  const onTouchStart = e => {
    touchStartX.current = e.touches[0].clientX;
    swiping.current = true;
  };
  const onTouchMove = e => {
    if (!swiping.current) return;
    setSwipeDx(e.touches[0].clientX - touchStartX.current);
  };
  const onTouchEnd = () => {
    swiping.current = false;
    if (swipeDx < -60) removeFromFeed(item.spotifyUri);
    else if (swipeDx > 60) navigateFeed(-1);
    setSwipeDx(0);
  };

  const swipeColor = swipeDx < -30 ? '#e0505033' : swipeDx > 30 ? `${C.accent}33` : 'transparent';

  return (
    <div className={item.removing ? 'feed-removing' : ''}
      style={{ display:'flex', alignItems:'center', gap: isMobile?10:12, padding: isMobile?'7px 4px':'7px 8px', borderRadius:8,
        transition: swiping.current ? 'none' : 'background 0.15s, transform 0.2s',
        transform: `translateX(${swipeDx}px)`,
        background: swipeColor || (isNowPlaying ? `${C.accent}0d` : 'transparent') }}
      onMouseEnter={e => { if (!item.removing && !swipeDx) e.currentTarget.style.background = isNowPlaying ? `${C.accent}18` : C.surface; }}
      onMouseLeave={e => { e.currentTarget.style.background = isNowPlaying ? `${C.accent}0d` : 'transparent'; }}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}>

      <div style={{ width: isMobile?14:16, flexShrink:0, display:'flex', alignItems:'flex-end', justifyContent:'center', height:16 }}>
        {isNowPlaying
          ? <div style={{ display:'flex', alignItems:'flex-end', gap:2, height:14 }}>
              {[14, 10, 12].map((h, n) => (
                <div key={n} className="eq-bar" style={{ width:3, height:h, background:C.accent }} />
              ))}
            </div>
          : <span style={{ fontSize: isMobile?10:11, color:C.dim, fontFamily:'DM Mono,monospace' }}>{i+1}</span>
        }
      </div>

      <AlbumArt size={38} letter={item.artist[0]} color={item.isNew ? C.accent : item.label === 'Découvertes' ? 'oklch(0.65 0.18 300)' : C.blue} image={item.image} />

      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', color: isNowPlaying ? C.accent : C.text }}>
          {item.title}
        </div>
        <div style={{ fontSize: isMobile?10:11, color:C.muted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
          {item.artist}{item.subtitle ? ` · ${item.subtitle}` : ''}
        </div>
      </div>

      {isMobile
        ? (item.label === 'Découvertes' ? <Tag color='oklch(0.65 0.18 300)'>DW</Tag> : item.isNew && <Tag color={C.accent}>NEW</Tag>)
        : (<>
            <Tag color={item.isNew ? C.accent : item.label === 'Découvertes' ? 'oklch(0.65 0.18 300)' : C.blue}>{item.label}</Tag>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', flexShrink:0, gap:1 }}>
              <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace' }}>{item.date}</span>
              {item.scraped_at && <span style={{ fontSize:9, color:C.muted, fontFamily:'DM Mono,monospace' }} title="Date de scraping">↓ {item.scraped_at}</span>}
            </div>
          </>)}

      <button onClick={e => { e.stopPropagation(); removeFromFeed(item.spotifyUri); }}
        title="Retirer de la liste"
        style={{ width:26, height:26, borderRadius:'50%', border:'1px solid #5a2020', background:'#2a0e0e', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, color:'#e05050', fontSize:15, lineHeight:1, transition:'background 0.15s, border-color 0.15s' }}
        onMouseEnter={e => { e.currentTarget.style.background='#e05050'; e.currentTarget.style.borderColor='#e05050'; e.currentTarget.style.color='#fff'; }}
        onMouseLeave={e => { e.currentTarget.style.background='#2a0e0e'; e.currentTarget.style.borderColor='#5a2020'; e.currentTarget.style.color='#e05050'; }}>
        ×
      </button>
      <button onClick={onToggleLike}
        title={liked ? 'Retirer le like' : 'Liker'}
        style={{ width:26, height:26, borderRadius:'50%', border:'none', background:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'transform 0.15s' }}
        onMouseEnter={e => e.currentTarget.style.transform='scale(1.2)'}
        onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill={liked ? '#e05050' : 'none'} stroke={liked ? '#e05050' : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
      <button onClick={onPlay}
        style={{ width:28, height:28, borderRadius:'50%', border:'none', background: (playing || isNowPlaying) ? C.accent : `${C.accent}22`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'background 0.2s' }}>
        <svg width="9" height="10" viewBox="0 0 9 10" fill={(playing || isNowPlaying) ? '#000' : C.accent}><path d="M0 0l9 5-9 5V0z"/></svg>
      </button>
    </div>
  );
});

function VosEcoutesPanel() {
  const { listenStats: ls, purgeListened, dbReady, now } = useStore();
  const fmtN = n => Number(n).toLocaleString('fr-FR');
  const fmtDuration = ms => {
    const totalMin = Math.floor((ms || 0) / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  };
  const fmtListenedTime = ms => {
    const totalMin = Math.floor((ms || 0) / 60000);
    if (totalMin < 60) return `${totalMin} min`;
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return m > 0 ? `${h}h ${m}min` : `${h}h`;
  };

  // Total écouté = durée des tracks listened=1 + durée du titre en cours (now.duration en secondes → ms)
  const currentTrackMs = now?.duration ? now.duration * 1000 : 0;
  const totalListenedMs = (ls.listened_ms || 0) + currentTrackMs;

  // % likés = likes posés dans l'app (stats.total_liked, jamais purgé) / écoutes all-time
  const totalLiked = ls.total_liked || 0;
  const likedPct = ls.all_time > 0 ? (totalLiked / ls.all_time) * 100 : 0;
  const likedPctStr = `${(Math.round(likedPct * 10) / 10).toLocaleString('fr-FR')} %`;

  const cards = [
    { label:'RESTANTES À ÉCOUTER', value: fmtN(ls.remaining),           sub:'dans la file',       icon:'⏳', color:'#c8956c' },
    { label:'TEMPS D\'ÉCOUTE',     value: fmtDuration(ls.remaining_ms),  sub:'heures restantes',   icon:'⏱', color:'#e07b54' },
    { label:'CE MOIS-CI',          value: fmtN(ls.this_month),           sub:'écoutées',           icon:'📅', color: C.accent },
    { label:'CETTE ANNÉE',         value: fmtN(ls.this_year),            sub:'écoutées',           icon:'🗓', color:'#7b8ff7' },
    { label:'DEPUIS TOUJOURS',     value: fmtN(ls.all_time),             sub:'écoutées',           icon:'🎵', color:'#b07fe8' },
    { label:'TEMPS TOTAL ÉCOUTÉ',  value: fmtListenedTime(totalListenedMs), sub:'durée cumulée',   icon:'⌛', color:'#a78bfa' },
    { label:'TITRES LIKÉS',        value: likedPctStr,                   sub:`${fmtN(totalLiked)} like(s) via l'app`, icon:'❤', color:'#e0608a' },
  ];
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      {cards.map(({ label, value, sub, icon, color }) => (
        <div key={label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:'10px 12px', display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:20, width:32, textAlign:'center', flexShrink:0 }}>{icon}</div>
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:'0.07em', color:C.dim, marginBottom:2 }}>{label}</div>
            <div style={{ fontSize:22, fontWeight:800, color, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{value}</div>
            <div style={{ fontSize:9, color:C.muted, marginTop:2 }}>{sub}</div>
          </div>
        </div>
      ))}
      <button onClick={purgeListened} disabled={!dbReady || ls.remaining === undefined}
        style={{ background:'#1a0a0a', border:'1px solid #3a1a1a', borderRadius:10, padding:'10px 14px', cursor: dbReady ? 'pointer' : 'default', color:'#c05050', fontSize:11, fontWeight:700, letterSpacing:'0.04em', opacity: dbReady ? 1 : 0.4, textAlign:'left' }}>
        🗑 Purger les écoutés
      </button>
    </div>
  );
}

            style={{ position:'absolute', right:6, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:C.muted, fontSize:14, lineHeight:1, padding:0 }}>
            ×
          </button>

      </div>

      {/* Bannière titres masqués */}
      {hidden > 0 && (
        <div style={{ fontSize:10, color:'#c8956c', background:'#1a1208', border:'1px solid #3a2a10', borderRadius:6, padding:'6px 10px', textAlign:'center' }}>

        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column' }}>
        {/* Clé stable (URI seule) : avec l'index concaténé, retirer un titre changeait
            la clé de tous les suivants → remount complet, React.memo inopérant.
            La clé est portée par le Fragment (la bannière de date n'a pas de clé propre :
            elle appartient à l'item qu'elle précède) */}
        {filteredFeed.map((item, i) => (
          <React.Fragment key={item.id}>
            {showDayBanners && (i === 0 || dayOf(filteredFeed[i - 1]) !== dayOf(item)) && (
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 2px 4px' }}>
                <span style={{ fontSize:9, fontWeight:700, letterSpacing:'0.08em', color:C.dim, fontFamily:'DM Mono,monospace', whiteSpace:'nowrap' }}>

                </span>
                <div style={{ flex:1, height:1, background:C.border }} />
              </div>
            )}
            <FeedItem item={item} i={i} isMobile={isMobile}
              isNowPlaying={now?.uri === item.spotifyUri}
              removeFromFeed={removeFromFeed} setTrackLiked={setTrackLiked} navigateFeed={navigateFeed} />
          </React.Fragment>
        ))}
        {filteredFeed.length === 0 && <div style={{ fontSize:11, color:C.dim, padding:'20px 0', textAlign:'center', fontFamily:'DM Mono,monospace' }}>Aucun titre pour ce filtre.</div>}
      </div>
    </div>
  );
}

function formatListenedAt(s) {
  if (!s) return '';
  const d = new Date(s.replace(' ', 'T') + 'Z'); // listened_at est en UTC (datetime('now'))
  if (isNaN(d)) return '';
  const diff = Date.now() - d.getTime();
  const min  = Math.floor(diff / 60000);
  if (min < 1)  return "à l'instant";
  if (min < 60) return `il y a ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24)   return `il y a ${h} h`;
  const j = Math.floor(h / 24);
  if (j === 1)  return 'hier';
  if (j < 7)    return `il y a ${j} j`;
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

// COMPACT PLAYER — vue ultra-compacte (split-screen / fenêtre du bas sur tel)
// N'affiche QUE les contrôles : précédent / play-pause / suivant
// ════════════════════════════════════════════════
function CompactPlayer() {
  const { now, filteredFeed, seek } = useStore();

  const currentIndex = now?.uri ? filteredFeed.findIndex(f => f.spotifyUri === now.uri) : -1;
  const hasFeed      = filteredFeed.length > 0;

  const togglePlayPause = async () => {
    if (!now) return;
    if (now.playing) await apiPut('https://api.spotify.com/v1/me/player/pause');
    else             await apiPut('https://api.spotify.com/v1/me/player/play');
  };
  const prevTrack = async () => {
    const idx = currentIndex > 0 ? currentIndex - 1 : filteredFeed.length - 1;
    if (filteredFeed[idx]) await playTrack(filteredFeed[idx].spotifyUri);
  };
  const nextTrack = async () => {
    const idx = currentIndex >= 0 && currentIndex < filteredFeed.length - 1 ? currentIndex + 1 : 0;
    if (!filteredFeed[idx]) return;
    await playTrack(filteredFeed[idx].spotifyUri);
    const dur = filteredFeed[idx].duration_ms;
    if (dur > 0) setTimeout(() => seek(Math.floor(dur * 0.25)), 400);
  };

  const btn = { background:'none', border:'none', cursor:'pointer', padding:12, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 };

  return (
    <div style={{ width:'100%', height:'100%', background:'linear-gradient(180deg,#131313 0%,#0a0a0a 100%)', color:C.text, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', gap:10, padding:'8px 16px', overflow:'hidden' }}>
      {now ? (
        <>
          {/* Titre + artiste (une ligne chacun) */}
          <div style={{ textAlign:'center', maxWidth:'100%', minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', color:C.text }}>{now.title}</div>
            <div style={{ fontSize:11, color:C.muted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
              {now.artist}{currentIndex >= 0 ? ` · ${currentIndex + 1}/${filteredFeed.length}` : ''}
            </div>
          </div>
          {/* Contrôles : précédent / play-pause / suivant */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:18 }}>
            <button onClick={prevTrack} style={{ ...btn, opacity: hasFeed ? 1 : 0.3 }} title="Précédent">
              <svg width="28" height="28" viewBox="0 0 16 16" fill={C.muted}><rect x="1" y="1" width="2" height="14" rx="1"/><path d="M13 1L4 8l9 7V1z"/></svg>
            </button>
            <button onClick={togglePlayPause} style={{ width:60, height:60, borderRadius:'50%', background:C.accent, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }} title={now.playing ? 'Pause' : 'Lecture'}>
              {now.playing
                ? <svg width="18" height="20" viewBox="0 0 12 14" fill="#000"><rect x="0" y="0" width="4" height="14" rx="1"/><rect x="8" y="0" width="4" height="14" rx="1"/></svg>
                : <svg width="18" height="20" viewBox="0 0 12 14" fill="#000"><path d="M1 0l11 7-11 7V0z"/></svg>}
            </button>
            <button onClick={nextTrack} style={{ ...btn, opacity: hasFeed ? 1 : 0.3 }} title="Suivant">
              <svg width="28" height="28" viewBox="0 0 16 16" fill={C.muted}><rect x="13" y="1" width="2" height="14" rx="1"/><path d="M3 1l9 7-9 7V1z"/></svg>
            </button>
          </div>
        </>
      ) : (
        <span style={{ fontFamily:'DM Mono,monospace', fontSize:11, color:C.dim, textAlign:'center' }}>Aucune lecture en cours sur Spotify…</span>
      )}
    </div>
  );
}

// ROOT
// ════════════════════════════════════════════════
function Shell() {
  const { authState, otherTab } = useStore();
  const isMobile      = useIsMobile();
  const shortViewport = useShortViewport();

  if (authState === 'loading') {
    return (
      <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#0a0a0a' }}>
        <div style={{ fontFamily:'DM Mono,monospace', fontSize:11, color:C.muted, letterSpacing:'0.1em' }}>// CHARGEMENT…</div>
      </div>
    );
  }
  // Viewport très court sur mobile (fenêtre du bas en split-screen) → vue compacte : uniquement les contrôles
  const content = authState === 'login'
    ? <Home isMobile={isMobile} />
    : (isMobile ? (shortViewport ? <CompactPlayer /> : <MobileApp />) : <WebApp />);
  return (
    <>
      {otherTab && (
        <div style={{ position:'fixed', top:0, left:0, right:0, zIndex:9999, background:'#3a1a0a', borderBottom:'1px solid #6a3a1a', color:'#e0a050', fontSize:11, fontFamily:'DM Mono,monospace', textAlign:'center', padding:'6px 12px' }}>
          ⚠ Spotify+ est déjà ouvert dans un autre onglet — fermez-en un (les sauvegardes s'écraseraient mutuellement)
        </div>
      )}
      {content}
    </>
  );
}

function App() {
  return (
    <StoreProvider>
      <Shell />
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
