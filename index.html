// ════════════════════════════════════════════════
// CONFIG — modifie REDIRECT_URI selon ton déploiement
// ════════════════════════════════════════════════
const CLIENT_ID    = '672e41f0308f4378b4f2331844e08b20';
const REDIRECT_URI = 'https://pierre-portfolio.github.io/NewSpotifyRelease/';
const SCOPES       = 'user-follow-read user-read-private user-read-currently-playing';
const API_BASE     = 'http://localhost:3001';
const DELAY_MIN    = 30000;
const DELAY_MAX    = 35000;
const ESTIMATED_TOTAL = 1400;

// ════════════════════════════════════════════════
// PKCE
// ════════════════════════════════════════════════
function generateRandomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(len))).map(b => chars[b % chars.length]).join('');
}
async function generateCodeChallenge(verifier) {
  const data   = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
async function loginWithSpotify() {
  const verifier   = generateRandomString(64);
  const challenge  = await generateCodeChallenge(verifier);
  localStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
    scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge,
  });
  window.location = `https://accounts.spotify.com/authorize?${params}`;
}
async function exchangeCode(code) {
  const verifier = localStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID, grant_type: 'authorization_code',
    code, redirect_uri: REDIRECT_URI, code_verifier: verifier,
  });
  const res  = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh', data.refresh_token);
    return true;
  }
  return false;
}
async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh');
  if (!refresh) return false;
  const body = new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'refresh_token', refresh_token: refresh });
  const res  = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    return true;
  }
  return false;
}
async function getToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) await refreshToken();
  return localStorage.getItem('spotify_token');
}
function logoutClear() {
  ['spotify_token','spotify_token_expiry','spotify_refresh','pkce_verifier'].forEach(k => localStorage.removeItem(k));
}

// ════════════════════════════════════════════════
// API HELPERS
// ════════════════════════════════════════════════
async function apiGet(url) {
  const token = await getToken();
  const res   = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (res.status === 429) {
    const raw    = res.headers.get('Retry-After');
    const retryMs = raw !== null ? parseInt(raw) * 1000 : 60000;
    const waitMs  = retryMs + 3000;
    const err = new Error('RATE_LIMIT');
    err.retryAfter = (retryMs/1000).toFixed(1);
    err.waitMs  = waitMs;
    err.waitSec = (waitMs/1000).toFixed(1);
    err.rawHeader = raw;
    throw err;
  }
  return res.json();
}
async function apiPut(url, body) {
  const token = await getToken();
  const res   = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (res.status === 204) return { ok: true };
  if (res.status === 403) return { error: 'forbidden' };
  if (res.status === 404) return { error: 'no_active_device' };
  return res.json().catch(() => ({ error: 'unknown' }));
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Backend helpers ───────────────────────────────
async function backendPost(path, body) {
  try {
    const res = await fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  } catch { return null; }
}
async function backendGet(path) {
  try {
    const res = await fetch(API_BASE + path);
    return res.json();
  } catch { return null; }
}
async function backendPatch(path, body) {
  try {
    const res = await fetch(API_BASE + path, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  } catch { return null; }
}

// ════════════════════════════════════════════════
// TEST CONNEXION — joue Kaza · Connexion
// ════════════════════════════════════════════════
async function testConnection() {
  try {
    const search = await apiGet('https://api.spotify.com/v1/search?q=track:connexion%20artist:kaza&type=track&limit=1&market=FR');
    const track  = search?.tracks?.items?.[0];
    if (!track) { alert('Titre introuvable sur Spotify.'); return; }
    const result = await apiPut('https://api.spotify.com/v1/me/player/play', { uris: [track.uri] });
    if (result?.error === 'no_active_device') alert('Aucun appareil Spotify actif. Lance Spotify sur un appareil d\'abord.');
    if (result?.error === 'forbidden')        alert('Lecture impossible — compte Spotify Free ?');
  } catch (e) {
    alert('Erreur : ' + e.message);
  }
}

// ════════════════════════════════════════════════
// DESIGN TOKENS
// ════════════════════════════════════════════════
const C = {
  bg:'#0a0a0a', surface:'#161616', surfaceHigh:'#1f1f1f',
  border:'#272727', accent:'#1ed760', text:'#f0f0f0',

// ════════════════════════════════════════════════
// STORE (contexte global)
// ════════════════════════════════════════════════
const StoreCtx = React.createContext(null);
const useStore = () => React.useContext(StoreCtx);

function StoreProvider({ children }) {
  const [authState, setAuthState] = React.useState('loading'); // 'loading'|'login'|'connected'
  const [user,     setUser]       = React.useState(null);
  const [playlist, setPlaylist]   = React.useState(null);

  const [dbUserId,  setDbUserId]           = React.useState(null);
  const [scraping, setScraping]           = React.useState(false);
  const [paused,   setPaused]             = React.useState(false);
  const pausedRef                         = React.useRef(false);
  const knownUrisRef                      = React.useRef(new Set());
  React.useEffect(() => { pausedRef.current = paused; }, [paused]);

  const [stats,         setStats]         = React.useState({ artists:0, total:0, releases:0, tracks:0 });
  const [listenStats,   setListenStats]   = React.useState({ remaining:0, this_month:0, this_year:0, all_time:0 });
  const [progress,      setProgress]      = React.useState(0);
  const [currentArtist, setCurrentArtist] = React.useState('');
  const [statusMsg,     setStatusMsg]     = React.useState('Prêt.');
  const [statusMode,    setStatusMode]    = React.useState('green');
  const [nextCall,      setNextCall]      = React.useState(0);
  const [nextCallTotal, setNextCallTotal] = React.useState(0);
  const [eta,           setEta]           = React.useState('');
  const [feed,          setFeed]          = React.useState([]);
  const [logs,          setLogs]          = React.useState([]);
  const [now,           setNow]           = React.useState(null);
  const [delayChoice,   setDelayChoice]   = React.useState(30);

  const weekAgo = new Date(Date.now() - 7*86400000);
  const [dateFrom, setDateFrom] = React.useState(weekAgo.toISOString().slice(0,10));

  const log = React.useCallback((msg, type='info') => {
    const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    setLogs(L => [...L, { time, msg, type }].slice(-500));
  }, []);

  const setStatus = React.useCallback((msg, mode='green') => {
    setStatusMsg(msg); setStatusMode(mode);
  }, []);

  const updateETA = React.useCallback((scanned, total, avgMs) => {
    const remaining = total - scanned;
    if (remaining <= 0) { setEta(''); return; }
    const sec = Math.ceil((remaining * avgMs) / 1000);
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    setEta((h > 0 ? `${h}h ` : '') + (m > 0 || h > 0 ? `${m}m ` : '') + `${s}s`);
  }, []);

  // ── Init OAuth ──
  React.useEffect(() => {
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      if (code) {
        const ok = await exchangeCode(code);
        window.history.replaceState({}, '', window.location.pathname);
        if (!ok) { setAuthState('login'); return; }
      }
      const token = localStorage.getItem('spotify_token');
      if (!token) { setAuthState('login'); return; }
      try {
        const me = await apiGet('https://api.spotify.com/v1/me');
        if (me?.id) {
          setUser(me);
          setAuthState('connected');
          // Upsert user en DB, récupère l'id interne
          backendPost('/api/users/upsert', {
            spotify_id:   me.id,
            display_name: me.display_name || null,
            avatar_url:   me.images?.[0]?.url || null,
            product:      me.product || null,
          }).then(u => {
            if (!u?.id) return;
            setDbUserId(u.id);
            backendGet(`/api/feed/${u.id}/uris`).then(uris => {
              if (Array.isArray(uris)) uris.forEach(u => knownUrisRef.current.add(u));
            }).catch(() => {});
            backendGet(`/api/feed/${u.id}/tracks`).then(rows => {
              if (!Array.isArray(rows) || rows.length === 0) return;
              setFeed(rows.map(t => ({
                id:         t.spotify_uri,
                spotifyUri: t.spotify_uri,
                label:      t.release_type === 'single' ? 'Single' : 'Album',
                artist:     t.artist_name,
                title:      t.title,
                subtitle:   t.release_type !== 'single' ? t.release_title : null,
                date:       new Date(t.release_date).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }),
                image:      t.cover_url,
                isNew:      false,
              })));
            }).catch(() => {});
            backendGet(`/api/feed/${u.id}/stats`).then(s => {
              if (!s || typeof s.artists === 'undefined') return;
              setStats({ artists: s.artists, total: s.artists, releases: s.releases, tracks: s.tracks });
            }).catch(() => {});
            backendGet(`/api/feed/${u.id}/listen-stats`).then(s => {
              if (!s || typeof s.remaining === 'undefined') return;
              setListenStats({ remaining: s.remaining, this_month: s.this_month, this_year: s.this_year, all_time: s.all_time });
            }).catch(() => {});
          }).catch(() => {});
        } else {
          setAuthState('login');
        }
      } catch { setAuthState('login'); }
    })();
  }, []);

  // ── Poll lecture en cours toutes les 5s ──
  React.useEffect(() => {
    if (authState !== 'connected') return;
    let stop = false;
    const tick = async () => {
      try {
        const r = await apiGet('https://api.spotify.com/v1/me/player/currently-playing');
        if (!stop && r?.item) {
          setNow({
            title:    r.item.name,
            artist:   r.item.artists.map(a => a.name).join(', '),
            duration: Math.floor(r.item.duration_ms / 1000),
            current:  Math.floor((r.progress_ms || 0) / 1000),
            image:    r.item.album?.images?.[0]?.url,
            playing:  r.is_playing,
          });
        } else if (!stop && !r?.item) {
          setNow(null);
        }
      } catch {}
    };
    tick();
    const id = setInterval(tick, 5000);
    return () => { stop = true; clearInterval(id); };
  }, [authState]);

  // ── Countdown UI ──
  React.useEffect(() => {
    if (nextCall <= 0) return;
    const id = setInterval(() => setNextCall(v => Math.max(0, v - 1)), 1000);
    return () => clearInterval(id);
  }, [nextCall]);

  const togglePause = () => {
    setPaused(p => {
      const nv = !p;
      log(nv ? '⏸ Synchronisation mise en pause.' : '▶ Reprise de la synchronisation.', nv ? 'wait' : 'ok');
      return nv;
    });
  };
  const waitWhilePaused = async () => { while (pausedRef.current) await sleep(500); };

  // ── SYNC ──
  const startSync = async () => {
    if (scraping) return;
    if (!dateFrom) { setStatus('Sélectionne une date de début.', 'wait'); return; }

    setScraping(true); setPaused(false);
    setLogs([]); setFeed([]); setProgress(0);
    setStats({ artists:0, total:0, releases:0, tracks:0 });
    setEta(''); setStatus('Vérification du compte…', 'pulse');

    let sessionId = null;

    try {
      log('── Étape 1 : vérification du compte ──', 'info');
      const me = await apiGet('https://api.spotify.com/v1/me');
      if (!me?.id) { log('Erreur : impossible de récupérer le compte.', 'error'); setScraping(false); return; }
      log(`✓ Compte : ${me.display_name || me.id}`, 'ok');

      // Créer la session en DB
      const sessionRes = await backendPost('/api/sync/start', {
        user_id:   dbUserId,
        date_from: dateFrom,
        date_to:   new Date().toISOString().slice(0, 10),
      });
      sessionId = sessionRes?.session_id || null;
      if (sessionId) log(`✓ Session #${sessionId} créée en base`, 'ok');
      else log('⚠ Backend non joignable — scraping sans sauvegarde DB', 'warn');

      const cutoff  = new Date(dateFrom);
      const ceiling = new Date();
      log(`── Période : ${cutoff.toLocaleDateString('fr-FR')} → ${ceiling.toLocaleDateString('fr-FR')} ──`, 'info');
      setStatus('Chargement des artistes…', 'pulse');

      const seenUris = new Set(knownUrisRef.current);
      let totalTracks = 0, totalReleases = 0, artistsScanned = 0, totalArtists = ESTIMATED_TOTAL;
      const avgDelay = delayChoice * 1000;
      let nextUrl = 'https://api.spotify.com/v1/me/following?type=artist&limit=50';
      let pageNum  = 0;

      while (nextUrl) {
        pageNum++;
        const pageData = await apiGet(nextUrl);
        if (!pageData?.artists?.items) { log('Erreur chargement artistes.', 'error'); break; }
        if (pageData.artists.total) {
          totalArtists = pageData.artists.total;
          setStats(s => ({ ...s, total: totalArtists }));
          if (sessionId) backendPatch(`/api/sync/${sessionId}`, { artists_total: totalArtists }).catch(() => {});
        }
        nextUrl = pageData.artists.next || null;
        const artists = pageData.artists.items;
        log(`✓ ${artists.length} artiste(s) — page ${pageNum}`, 'ok');

        for (let i = 0; i < artists.length; i++) {
          await waitWhilePaused();
          const artist = artists[i];
          artistsScanned++;
          setStats(s => ({ ...s, artists: artistsScanned }));
          setProgress(Math.min(98, (artistsScanned / totalArtists) * 100));
          setCurrentArtist(artist.name);
          setStatus(`Scan ${artistsScanned}/${totalArtists} — ${artist.name}`, 'pulse');

          const albumsData = await apiGet(
            `https://api.spotify.com/v1/artists/${artist.id}/albums?include_groups=album,single&limit=10&market=FR`
          );
          if (albumsData?.items) {
            const inRange = albumsData.items.filter(a => { const d = new Date(a.release_date); return d >= cutoff && d <= ceiling; });
            if (inRange.length === 0) log(`→ ${artist.name} · aucune sortie`, 'info');

            for (const album of albumsData.items) {
              const rDate = new Date(album.release_date);
              if (rDate < cutoff || rDate > ceiling) continue;

              const tracksData = await apiGet(`https://api.spotify.com/v1/albums/${album.id}/tracks?limit=50`);
              if (!tracksData?.items?.length) continue;
              const uris = tracksData.items.map(t => t.uri);
              if (seenUris.has(uris[0])) { log(`${artist.name} — ${album.name} · déjà en base`, 'info'); continue; }

              // Sauvegarde en DB
              if (sessionId && dbUserId) {
                const releaseRes = await backendPost('/api/releases', {
                  user_id:    dbUserId,
                  session_id: sessionId,
                  artist: {
                    spotify_id: artist.id,
                    name:       artist.name,
                    image_url:  artist.images?.[0]?.url || null,
                  },
                  release: {
                    spotify_id:   album.id,
                    title:        album.name,
                    type:         album.album_type,
                    release_date: album.release_date,
                    cover_url:    album.images?.[0]?.url || null,
                    spotify_url:  album.external_urls?.spotify || null,
                    tracks_count: tracksData.items.length,
                  },
                });
                if (releaseRes?.release_id) {
                  await backendPost(`/api/releases/${releaseRes.release_id}/tracks`, {
                    user_id: dbUserId,
                    tracks:  tracksData.items.map(t => ({
                      spotify_uri:  t.uri,
                      title:        t.name,
                      track_number: t.track_number,
                      duration_ms:  t.duration_ms,
                    })),
                  });
                }
                backendPost(`/api/sync/${sessionId}/log`, {
                  level:   'ok',
                  message: `✓ ${artist.name} — ${album.name} · ${tracksData.items.length} titre(s)`,
                }).catch(() => {});
              }

              uris.forEach(u => { seenUris.add(u); knownUrisRef.current.add(u); });
              totalTracks += tracksData.items.length;
              totalReleases++;
              setStats(s => ({ ...s, releases: totalReleases, tracks: totalTracks }));
              const dateStr = rDate.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
              const coverImg = album.images?.[0]?.url;
              if (album.album_type === 'single') {
                setFeed(F => [{
                  id:         uris[0],
                  spotifyUri: uris[0],
                  label:      'Single',
                  artist:     artist.name,
                  title:      album.name,
                  subtitle:   null,
                  date:       dateStr,
                  image:      coverImg,
                  isNew:      true,
                }, ...F].slice(0, 200));
              } else {
                const trackItems = tracksData.items.map(t => ({
                  id:         t.uri,
                  spotifyUri: t.uri,
                  label:      'Album',
                  artist:     artist.name,
                  title:      t.name,
                  subtitle:   album.name,
                  date:       dateStr,
                  image:      coverImg,
                  isNew:      true,
                }));
                setFeed(F => [...trackItems, ...F].slice(0, 200));
              }
              log(`✓ ${artist.name} — ${album.name} · ${tracksData.items.length} titre(s) sauvegardé(s)`, 'ok');
            }
          }

          // Mise à jour stats DB toutes les 10 artistes
          if (sessionId && artistsScanned % 10 === 0) {
            backendPatch(`/api/sync/${sessionId}`, {
              artists_scanned: artistsScanned,
              releases_found:  totalReleases,
              tracks_added:    totalTracks,
            }).catch(() => {});
          }

          const isVeryLast = !nextUrl && i === artists.length - 1;
          if (!isVeryLast) {
            const delay    = delayChoice * 1000;
            const nextName = i + 1 < artists.length ? artists[i + 1].name : 'page suivante';
            updateETA(artistsScanned, totalArtists, delay);
            setStatus(`Pause avant : ${nextName}`, 'wait');
            log(`⏳ Attente ${(delay/1000).toFixed(1)}s → ${nextName}`, 'wait');
            const sec = Math.ceil(delay / 1000);
            setNextCallTotal(sec); setNextCall(sec);
            await sleep(delay);
          }
        }
      }

      setProgress(100); setNextCall(0); setEta('');
      if (sessionId) {
        await backendPatch(`/api/sync/${sessionId}`, {
          artists_scanned: artistsScanned,
          releases_found:  totalReleases,
          tracks_added:    totalTracks,
          status:          'completed',
        });
      }
      if (totalTracks === 0) {
        setStatus('Terminé — aucune nouvelle sortie.', 'green');
        log('Aucune sortie trouvée dans cette période.', 'info');
      } else {
        setStatus(`Terminé ✓ — ${totalTracks} titre(s)`, 'green');
        log(`🎵 ${totalTracks} titre(s) depuis ${totalReleases} sortie(s) sauvegardés en base.`, 'ok');
      }
    } catch (err) {
      setNextCall(0); setEta('');
      if (sessionId) {
        backendPatch(`/api/sync/${sessionId}`, { status: 'error' }).catch(() => {});
        backendPost(`/api/sync/${sessionId}/log`, { level: 'error', message: err.message }).catch(() => {});
      }
      if (err.message === 'RATE_LIMIT') {
        log(`🚫 RATE LIMIT 429 — Retry-After: ${err.rawHeader}`, 'error');
        log(`⏳ Pause ${err.waitSec}s…`, 'wait');
        setStatus(`Rate limit 429 — pause ${err.waitSec}s`, 'wait');
        setNextCallTotal(Math.ceil(err.waitMs/1000)); setNextCall(Math.ceil(err.waitMs/1000));
        await sleep(err.waitMs);
        log('Délai écoulé. Relancez manuellement.', 'info');
        setStatus('Arrêté après rate limit.', 'green');
      } else {
        log(`Erreur : ${err.message}`, 'error');
        setStatus('Erreur — arrêté.', 'wait');
      }
    } finally {
      setScraping(false); setPaused(false);
    }
  };

  const logout = () => { logoutClear(); window.location.reload(); };

  const api = {
    authState, user, playlist,
    scraping, paused, togglePause, startSync, logout,
    stats, progress, currentArtist, statusMsg, statusMode,
    nextCall, nextCallTotal, eta, feed, logs, now,
    dateFrom, setDateFrom,
    delayChoice, setDelayChoice,
    listenStats, setListenStats,
  };
  return <StoreCtx.Provider value={api}>{children}</StoreCtx.Provider>;
}

function useIsMobile(bp = 820) {
  const [m, setM] = React.useState(typeof window !== 'undefined' ? window.innerWidth < bp : false);
  React.useEffect(() => {
    const h = () => setM(window.innerWidth < bp);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, [bp]);
  return m;
}

function Tag({ children, color=C.accent }) {

function StatusDot({ active, mode }) {

}
const fmt      = s => { if (!s && s !== 0) return '0:00'; const m = Math.floor(s/60); return `${m}:${(s%60).toString().padStart(2,'0')}`; };
const logColor = t => t==='ok' ? C.accent : t==='warn'||t==='wait' ? 'oklch(0.75 0.18 80)' : t==='error' ? 'oklch(0.65 0.18 25)' : C.muted;

async function playTrack(spotifyUri) {
  if (!spotifyUri) return;
  const result = await apiPut('https://api.spotify.com/v1/me/player/play', { uris: [spotifyUri] });
  if (result?.error === 'no_active_device') alert('Aucun appareil Spotify actif. Ouvre Spotify d\'abord.');
  if (result?.error === 'forbidden')        alert('Lecture impossible — compte Spotify Free ?');
}

      </div>
      {isMobile
        ? (item.isNew && <Tag color={C.accent}>NEW</Tag>)
        : (<><Tag color={item.isNew ? C.accent : C.blue}>{item.label}</Tag><span style={{ fontSize:10, color:C.dim, flexShrink:0, width:44, textAlign:'right' }}>{item.date}</span></>)}
      <button onClick={onPlay}
        style={{ width:28, height:28, borderRadius:'50%', border:'none', background: playing ? C.accent : `${C.accent}22`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'background 0.2s' }}>
        <svg width="9" height="10" viewBox="0 0 9 10" fill={playing ? '#000' : C.accent}><path d="M0 0l9 5-9 5V0z"/></svg>
      </button>
    </div>
  );
}

function VosEcoutesPanel() {
  const { listenStats: ls } = useStore();
  const fmt = n => Number(n).toLocaleString('fr-FR');
  const cards = [
    { label:'RESTANTES À ÉCOUTER', value: fmt(ls.remaining),  sub:'dans la file', icon:'⏳', color:'#c8956c' },
    { label:'CE MOIS-CI',          value: fmt(ls.this_month), sub:'écoutées',      icon:'📅', color: C.accent },
    { label:'CETTE ANNÉE',         value: fmt(ls.this_year),  sub:'écoutées',      icon:'🗓', color:'#7b8ff7' },
    { label:'DEPUIS TOUJOURS',     value: fmt(ls.all_time),   sub:'écoutées',      icon:'🎵', color:'#b07fe8' },
  ];
  return (
    <div style={{ width:200, flexShrink:0, display:'flex', flexDirection:'column', gap:10 }}>
      <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', color:C.dim, marginBottom:2 }}>VOS ÉCOUTES</div>
      {cards.map(({ label, value, sub, icon, color }) => (
        <div key={label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:'10px 12px', display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:20, width:32, textAlign:'center', flexShrink:0 }}>{icon}</div>
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:'0.07em', color:C.dim, marginBottom:2 }}>{label}</div>
            <div style={{ fontSize:22, fontWeight:800, color, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{value}</div>
            <div style={{ fontSize:9, color:C.muted, marginTop:2 }}>{sub}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function FeedList({ isMobile=false }) {
  const { feed } = useStore();
  if (feed.length === 0) {
    return <div style={{ fontSize:11, color:C.dim, padding:'40px 0', textAlign:'center', fontFamily:'DM Mono,monospace' }}>Aucune musique en attente.</div>;
  }
  return (
    <div style={{ display:'flex', flexDirection:'column' }}>
      {feed.map((item, i) => <FeedItem key={item.id + i} item={item} i={i} isMobile={isMobile} />)}
    </div>
  );
}

// ════════════════════════════════════════════════
// MOBILE APP
// ════════════════════════════════════════════════
function MobileApp() {
  const s   = useStore();
  const [tab, setTab] = React.useState('scrapping');
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, color:C.text, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ padding:'10px 16px 8px', display:'flex', alignItems:'center', justifyContent:'space-between', background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ fontWeight:800, fontSize:16, letterSpacing:'-0.03em' }}>
          <span style={{ color:C.accent }}>Spotify</span><span style={{ color:C.text }}>+</span>
        </div>
        <div style={{ display:'flex', gap:4 }}>
          {[['scrapping','Scrapping'],['ecouter','À écouter']].map(([k,n]) => {
            const active = tab === k;
            return <button key={k} onClick={() => setTab(k)} style={{ background: active?`${C.accent}18`:'none', border: active?`1px solid ${C.accent}40`:'1px solid transparent', color: active?C.accent:C.muted, borderRadius:6, padding:'3px 8px', cursor:'pointer', fontSize:10, fontWeight: active?700:400 }}>{n}</button>;
          })}
        </div>
      </div>
      <div style={{ padding:'10px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
          <UserChip size="md" />
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{s.user?.display_name || s.user?.id || '—'}</div>
            <div style={{ fontSize:10, color:C.muted, display:'flex', alignItems:'center', gap:4 }}>
              <StatusDot active={true} /> {s.user?.product || 'connecté'}
            </div>
          </div>
        </div>
        <button onClick={s.logout} style={{ fontSize:10, color:C.muted, background:'none', border:`1px solid ${C.border}`, borderRadius:6, padding:'3px 8px', cursor:'pointer' }}>Déconnecter</button>
      </div>
      <div style={{ flex:1, overflowY:'auto', minHeight:0 }}>
        {tab === 'scrapping' && (
          <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            <DateRangePanel compact />
            <ScrapingStatusPanel compact />
            <NextCallPanel compact />
            <LogsPanel compact />
          </div>
        )}
        {tab === 'ecouter' && (
          <div style={{ padding:'12px 14px' }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.dim, letterSpacing:'0.07em', marginBottom:10 }}>SORTIES TROUVÉES · {s.feed.length}</div>
            <FeedList isMobile />
          </div>
        )}
      </div>
      <MiniPlayer />
    </div>
  );
}

// ════════════════════════════════════════════════
// DESKTOP APP
// ════════════════════════════════════════════════
function WebApp() {
  const s = useStore();
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, color:C.text, display:'flex', flexDirection:'column', fontSize:13, overflow:'hidden' }}>
      <div style={{ height:50, borderBottom:`1px solid ${C.border}`, background:C.surface, display:'flex', alignItems:'center', padding:'0 22px', gap:20, flexShrink:0 }}>
        <div style={{ fontWeight:800, fontSize:17, letterSpacing:'-0.03em' }}>
          <span style={{ color:C.accent }}>Spotify</span><span style={{ color:C.text }}>+</span>
        </div>
        <div style={{ flex:1 }}>
          <button style={{ background:`${C.accent}18`, border:`1px solid ${C.accent}40`, color:C.accent, borderRadius:6, padding:'4px 12px', cursor:'pointer', fontSize:12, fontWeight:700 }}>Scrapping</button>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <StatusDot active={true} />
          <UserChip size="sm" />
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:160 }}>{s.user?.display_name || s.user?.id || '—'}</div>
            <div style={{ fontSize:10, color:C.muted }}>{s.user?.product || 'connecté'}</div>
          </div>
          <button onClick={s.logout} style={{ fontSize:11, color:C.muted, background:'none', border:`1px solid ${C.border}`, borderRadius:6, padding:'3px 10px', cursor:'pointer', marginLeft:4 }}>Déconnecter</button>
        </div>
      </div>

      <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
        <div style={{ width:280, borderRight:`1px solid ${C.border}`, background:C.surface, padding:'16px 14px', display:'flex', flexDirection:'column', gap:14, overflowY:'auto', flexShrink:0 }}>
          <DateRangePanel />
          <NextCallPanel />
          <LogsPanel />
        </div>

        <div style={{ flex:1, overflowY:'auto', padding:'22px 24px', minWidth:0 }}>
          <div style={{ marginBottom:20 }}>
            <ScrapingStatusPanel />
          </div>
          <div style={{ display:'flex', gap:24, alignItems:'flex-start' }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:10 }}>
                <div>
                  <h1 style={{ fontSize:16, fontWeight:700, letterSpacing:'-0.02em', marginBottom:2 }}>Nouveautés pour vous</h1>
                  <p style={{ fontSize:11, color:C.muted }}>
                    {s.playlist ? `Playlist : ${s.playlist.name}` : 'Basées sur vos abonnements'}
                    {s.feed.length > 0 && ` · ${s.feed.length} sortie(s)`}
                  </p>
                </div>
              </div>
              <FeedList />
            </div>
            <VosEcoutesPanel />
          </div>
        </div>
      </div>

      <PlayerBar />
    </div>
  );
}

// ════════════════════════════════════════════════
// ROOT
// ════════════════════════════════════════════════
function Shell() {
  const { authState } = useStore();
  const isMobile      = useIsMobile();

  if (authState === 'loading') {
    return (
      <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#0a0a0a' }}>
        <div style={{ fontFamily:'DM Mono,monospace', fontSize:11, color:C.muted, letterSpacing:'0.1em' }}>// CHARGEMENT…</div>
      </div>
    );
  }
  if (authState === 'login') return <Home isMobile={isMobile} />;
  return isMobile ? <MobileApp /> : <WebApp />;
}

function App() {
  return (
    <StoreProvider>
      <Shell />
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
