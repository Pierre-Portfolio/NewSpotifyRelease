// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const CLIENT_ID    = '672e41f0308f4378b4f2331844e08b20';
const REDIRECT_URI = 'https://pierre-portfolio.github.io/NewSpotifyRelease/';
// user-library-read/modify : requis par les endpoints /me/library (migration Spotify fév. 2026).
// Un compte connecté avant l'ajout de ces scopes doit se déconnecter/reconnecter pour les accorder.
const SCOPES       = 'user-follow-read user-read-private user-read-currently-playing user-modify-playback-state user-library-read user-library-modify';
const ESTIMATED_TOTAL = 1400;

// ════════════════════════════════════════════════
// PKCE
// ════════════════════════════════════════════════
function generateRandomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(len))).map(b => chars[b % chars.length]).join('');
}
async function generateCodeChallenge(verifier) {
  const data   = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
async function loginWithSpotify() {
  const verifier   = generateRandomString(64);
  const challenge  = await generateCodeChallenge(verifier);
  const state      = generateRandomString(16);
  localStorage.setItem('pkce_verifier', verifier);
  localStorage.setItem('pkce_state', state);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
    scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge, state,
  });
  window.location = `https://accounts.spotify.com/authorize?${params}`;
}
async function exchangeCode(code) {
  const verifier = localStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID, grant_type: 'authorization_code',
    code, redirect_uri: REDIRECT_URI, code_verifier: verifier,
  });
  const res  = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
  });
  const data = await res.json();
  localStorage.removeItem('pkce_verifier');
  localStorage.removeItem('pkce_state');
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh', data.refresh_token);
    return true;
  }
  return false;
}
// Mutex : les refresh tokens Spotify PKCE sont à usage unique (rotation).
// Deux refresh simultanés (poll player + scraping) consommeraient le même token → invalid_grant → déconnexion.
let _refreshPromise = null;
function refreshToken() {
  if (_refreshPromise) return _refreshPromise;
  _refreshPromise = (async () => {
    const refresh = localStorage.getItem('spotify_refresh');
    if (!refresh) return false;
    const body = new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'refresh_token', refresh_token: refresh });
    const res  = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body,
    });
    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem('spotify_token', data.access_token);
      localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
      if (data.refresh_token) localStorage.setItem('spotify_refresh', data.refresh_token); // rotation : stocker le nouveau
      return true;
    }
    if (data.error === 'invalid_grant') {
      // Refresh token définitivement mort : sans ça, le poll player enverrait des 401 toutes les 5s pour toujours
      logoutClear();
      window.location.reload();
    }
    return false;
  })().catch(() => false);
  _refreshPromise.finally(() => { _refreshPromise = null; });
  return _refreshPromise;
}
async function getToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) await refreshToken();
  return localStorage.getItem('spotify_token');
}
function logoutClear() {
  ['spotify_token','spotify_token_expiry','spotify_refresh','pkce_verifier','pkce_state'].forEach(k => localStorage.removeItem(k));
}

// ════════════════════════════════════════════════
// API HELPERS (Spotify)
// ════════════════════════════════════════════════

// ── Rate-limit guard (module-level, PERSISTÉ) ────
// Une seule fenêtre "aucune requête avant T", partagée par TOUS les appels
// (player, login, synchro) et relue au chargement du module : un blocage
// (429 player ou stop synchro min. 15 min) survit au F5 — avant, _rlUntil repartait
// à 0 au refresh et le poll player re-hammerait une API qui venait de throttle.
const RL_LS_KEY = 'spotifyplus_blocked_until';
let _rlUntil  = parseInt(localStorage.getItem(RL_LS_KEY) || '0') || 0;
let _rlNotify = null;
function _rlSet(retryMs) {
  _rlUntil = Date.now() + retryMs + 2000;
  try { localStorage.setItem(RL_LS_KEY, String(_rlUntil)); } catch {}
  if (_rlNotify) _rlNotify(_rlUntil);
}
function _rlCheck() {
  // rate_limited:true permet aux callers de distinguer "bloqué" de "pas de données" (204/null)
  if (Date.now() < _rlUntil) return { error: 'rate_limited', rate_limited: true, blockedUntil: _rlUntil };
  return null;
}
// Retry-After blindé : un header malformé donnerait parseInt→NaN → _rlUntil=NaN (guard inopérant)
// → retry immédiat en boucle sur une API qui vient de throttle
function _parseRetryAfterMs(raw, fallbackMs) {
  const n = parseInt(raw);
  return Number.isFinite(n) && n >= 0 ? n * 1000 : fallbackMs;
}

async function apiGet(url, _retried = false) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (res.status === 401 && !_retried) {
    // Token expiré côté serveur — un refresh puis un seul retry (sinon le body d'erreur remonte au caller)
    const ok = await refreshToken();
    if (ok) return apiGet(url, true);
  }
  if (res.status === 429) {
    const raw     = res.headers.get('Retry-After');
    const retryMs = _parseRetryAfterMs(raw, 60000);
    _rlSet(retryMs);
    const err = new Error('RATE_LIMIT');
    err.retryAfter = (retryMs/1000).toFixed(1);
    err.waitMs  = retryMs + 2000;
    err.waitSec = ((retryMs + 2000)/1000).toFixed(1);
    err.rawHeader = raw;
    throw err;
  }
  if (res.status === 204) return null; // Nothing playing — no body to parse
  return res.json();
}
async function apiPut(url, body, _retried = false) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401 && !_retried) {
    // Même politique que apiGet : un refresh puis un seul retry (un like/play ne doit pas échouer en silence)
    const ok = await refreshToken();
    if (ok) return apiPut(url, body, true);
  }
  if (res.status === 429) {
    _rlSet(_parseRetryAfterMs(res.headers.get('Retry-After'), 30000));
    return { error: 'rate_limited', rate_limited: true, blockedUntil: _rlUntil };
  }
  if (res.status === 204) return { ok: true };
  if (res.status === 403) return { error: 'forbidden' };
  if (res.status === 404) return { error: 'no_active_device' };
  return res.json().catch(() => ({ error: 'unknown' }));
}
async function apiPost(url, _retried = false) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
  });
  if (res.status === 401 && !_retried) {
    const ok = await refreshToken();
    if (ok) return apiPost(url, true);
  }
  if (res.status === 429) {
    _rlSet(_parseRetryAfterMs(res.headers.get('Retry-After'), 30000));
    return { error: 'rate_limited', rate_limited: true, blockedUntil: _rlUntil };
  }
  if (res.status === 204) return { ok: true };
  if (res.status === 403) return { error: 'forbidden' };
  if (res.status === 404) return { error: 'no_active_device' };
  return res.json().catch(() => ({ error: 'unknown' }));
}
async function apiDel(url, _retried = false) {
  const blocked = _rlCheck();
  if (blocked) return blocked;
  const token = await getToken();
  const res   = await fetch(url, { method:'DELETE', headers: { Authorization:`Bearer ${token}` } });
  if (res.status === 401 && !_retried) {
    const ok = await refreshToken();
    if (ok) return apiDel(url, true);
  }
  if (res.status === 429) { _rlSet(_parseRetryAfterMs(res.headers.get('Retry-After'), 30000)); return { error:'rate_limited', rate_limited: true }; }
  if (res.status === 403) return { error: 'forbidden' };
  return { ok: true };
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ════════════════════════════════════════════════
// LIBRARY — migration API Spotify février 2026
// /me/tracks/contains et PUT/DELETE /me/tracks ont été supprimés (appliqué aux apps
// Development Mode existantes le 9 mars 2026) → endpoints génériques /me/library
// qui acceptent des URIs Spotify (max 40 par requête), en query string même pour PUT.
// Scopes requis : user-library-read (contains) / user-library-modify (save/remove).
// ════════════════════════════════════════════════
const _uriQS = uris => uris.map(encodeURIComponent).join(',');
async function libraryContains(uris) {
  const data = await apiGet(`https://api.spotify.com/v1/me/library/contains?uris=${_uriQS(uris)}`);
  return Array.isArray(data) ? data : null; // null = erreur, rate-limit ou scope manquant (403)
}
const librarySave   = uri => apiPut(`https://api.spotify.com/v1/me/library?uris=${_uriQS([uri])}`);
const libraryRemove = uri => apiDel(`https://api.spotify.com/v1/me/library?uris=${_uriQS([uri])}`);
// Alerte commune quand le token a été émis avant l'ajout des scopes user-library-* :
// l'API répond 403 tant que l'utilisateur ne s'est pas déconnecté/reconnecté
function libraryScopeAlert(result) {
  if (result?.error !== 'forbidden') return false;
  alert('Spotify a refusé la gestion des likes (nouvelle permission requise).\nDéconnecte-toi puis reconnecte-toi pour l\'accorder.');
  return true;
}
// Jour LOCAL (YYYY-MM-DD) — toISOString() donnerait le jour UTC : le compteur
// journalier se réinitialiserait à 2h du matin en France l'été au lieu de minuit
const localDay = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// ════════════════════════════════════════════════
// LOCAL DB — sql.js + IndexedDB
// ════════════════════════════════════════════════
const IDB_KEY = 'spotifyplus_db';

// Connexion unique réutilisée : avant, chaque get/set ouvrait une nouvelle connexion jamais fermée
let _idbPromise = null;
function idbOpen() {
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((res, rej) => {
    const req = indexedDB.open('spotifyplus', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('db');
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => { _idbPromise = null; rej(e); };
  });
  return _idbPromise;
}
async function idbGet(key) {
  const db  = await idbOpen();
  return new Promise((res, rej) => {
    const tx  = db.transaction('db', 'readonly');
    const req = tx.objectStore('db').get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = rej;
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('db', 'readwrite');
    tx.objectStore('db').put(value, key);
    tx.oncomplete = res;
    tx.onerror    = rej;
  });
}

let _db = null;

async function initDB() {
  const SQL   = await initSqlJs({ locateFile: f => `./vendor/${f}` });
  const saved = await idbGet(IDB_KEY);
  if (saved) {
    _db = new SQL.Database(new Uint8Array(saved));
  } else {
    _db = new SQL.Database();
    _db.run(`
      CREATE TABLE IF NOT EXISTS tracks (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        spotify_uri TEXT UNIQUE NOT NULL,
        artist_name TEXT NOT NULL,
        title TEXT NOT NULL,
        release_title TEXT,
        release_type TEXT,
        release_date TEXT,
        cover_url TEXT,
        duration_ms INTEGER,
        listened INTEGER DEFAULT 0,
        added_at TEXT DEFAULT (datetime('now'))
      );
      CREATE TABLE IF NOT EXISTS artists_scraped (
        spotify_id TEXT PRIMARY KEY,
        last_scraped_at TEXT NOT NULL
      );
      CREATE TABLE IF NOT EXISTS stats (
        id INTEGER PRIMARY KEY CHECK (id = 1),
        total_listened INTEGER DEFAULT 0,
        listened_this_month INTEGER DEFAULT 0,
        listened_this_year INTEGER DEFAULT 0,
        last_reset_month TEXT,
        last_reset_year TEXT
      );
    `);
    _db.run("INSERT OR IGNORE INTO stats (id) VALUES (1)");
  }
  // Migrations idempotentes
  try { _db.run("ALTER TABLE tracks ADD COLUMN liked INTEGER DEFAULT 0"); } catch {}
  try { _db.run("ALTER TABLE tracks ADD COLUMN listened_at TEXT"); } catch {} // horodatage de l'écoute (historique)
  try { _db.run("ALTER TABLE stats ADD COLUMN total_listened_ms INTEGER DEFAULT 0"); } catch {}
  try { _db.run("ALTER TABLE stats ADD COLUMN total_liked INTEGER DEFAULT 0"); } catch {}
  return _db;
}

// Sérialisation des sauvegardes : jamais deux exports/écritures IndexedDB en parallèle.
// Pas de debounce temporel : chaque appel garantit une écriture incluant ses données
// (la boucle do/while ré-exporte si un appel est arrivé pendant l'écriture en cours).
let _savePromise = null;
let _saveQueued  = false;
async function saveDB() {
  if (!_db) return;
  if (_savePromise) { _saveQueued = true; return _savePromise; }
  _savePromise = (async () => {
    do {
      _saveQueued = false;
      const data = _db.export();
      await idbSet(IDB_KEY, data.buffer);
    } while (_saveQueued);
  })();
  try { await _savePromise; } finally { _savePromise = null; }
}

function dbRun(sql, params = []) {
  _db.run(sql, params);
}

function dbAll(sql, params = []) {
  const stmt = _db.prepare(sql);
  if (params.length) stmt.bind(params);
  const rows = [];
  while (stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}

function dbGet(sql, params = []) {
  return dbAll(sql, params)[0] || null;
}

function loadListenStatsFromDB() {
  const s     = dbGet("SELECT * FROM stats WHERE id = 1");
  const rem   = dbGet("SELECT COUNT(*) as c FROM tracks WHERE listened = 0");
  const remMs = dbGet("SELECT SUM(duration_ms) as s FROM tracks WHERE listened = 0");
  return {
    remaining:    rem?.c  || 0,
    remaining_ms: remMs?.s || 0,
    this_month:   s?.listened_this_month  || 0,
    this_year:    s?.listened_this_year   || 0,
    all_time:     s?.total_listened       || 0,
    listened_ms:  s?.total_listened_ms    || 0,
    total_liked:  s?.total_liked          || 0,
  };
}

function loadLikedTracksFromDB() {
  return dbAll(
    "SELECT * FROM tracks WHERE liked = 1 ORDER BY id DESC LIMIT 500"
  ).map(r => ({
    id: r.id,
    spotifyUri: r.spotify_uri,
    artist: r.artist_name,
    title: r.title,
    subtitle: r.release_title,
    label: r.release_type === 'discover_weekly' ? 'Découvertes' : (r.release_type || ''),
    date: r.release_date || '',
    image: r.cover_url,
    isNew: false,
  }));
}

// Historique des écoutes : titres écoutés (listened=1) non purgés, le plus récent en haut.
// Les anciennes lignes sans listened_at (avant la migration) retombent en bas (NULL = dernier en DESC).
function loadHistoryFromDB() {
  return dbAll(
    "SELECT * FROM tracks WHERE listened = 1 ORDER BY listened_at DESC, id DESC LIMIT 200"
  ).map(r => ({
    id: r.id,
    spotifyUri: r.spotify_uri,
    artist: r.artist_name,
    title: r.title,
    subtitle: r.release_title,
    label: r.release_type === 'discover_weekly' ? 'Découvertes' : (r.release_type || ''),
    date: r.release_date || '',
    image: r.cover_url,
    listenedAt: r.listened_at,
    isNew: false,
  }));
}

// ════════════════════════════════════════════════
// DÉCOUVERTES DE LA SEMAINE — import hebdo auto
// ════════════════════════════════════════════════
const DW_LS_KEY      = 'spotifyplus_dw_last_import';
const DW_MAX_AGE_MS  = 7 * 24 * 60 * 60 * 1000; // 7 jours

async function importDiscoverWeekly(addLog) {
  const last = localStorage.getItem(DW_LS_KEY);
  if (last && Date.now() - parseInt(last) < DW_MAX_AGE_MS) return;
  if (Date.now() < _rlUntil) return; // fenêtre rate-limit active — ne pas insister, retentera au prochain login

  addLog('── Import Découvertes de la semaine ──', 'info');

  // Chercher la playlist parmi les playlists de l'utilisateur
  let playlistId = null;
  let nextUrl = 'https://api.spotify.com/v1/me/playlists?limit=50';
  while (nextUrl && !playlistId) {
    const data = await apiGet(nextUrl);
    if (!data?.items) break;
    const pl = data.items.find(p =>
      p.owner?.id === 'spotify' &&
      (p.name?.toLowerCase().includes('découvertes') || p.name?.toLowerCase().includes('discover weekly'))
    );
    if (pl) playlistId = pl.id;
    nextUrl = data.next || null;
  }

  if (!playlistId) {
    addLog('⚠ Playlist "Découvertes de la semaine" introuvable — abonne-toi à elle sur Spotify', 'warn');
    return;
  }

  const today      = new Date().toISOString().slice(0, 10);
  // Migration Spotify fév. 2026 : /playlists/{id}/tracks → /playlists/{id}/items, et le
  // contenu n'est renvoyé QUE pour les playlists possédées/collaboratives. "Découvertes de
  // la semaine" appartient à Spotify → l'API peut refuser (403) ou renvoyer sans items.
  const tracksData = await apiGet(`https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50`);
  if (tracksData?.rate_limited) return; // fenêtre 429 — retentera au prochain login
  if (tracksData?.error || !tracksData?.items?.length) {
    addLog('⚠ Contenu de "Découvertes de la semaine" inaccessible — depuis la migration Spotify de février 2026, les playlists éditoriales Spotify ne sont plus lisibles par les apps tierces. Import désactivé, nouvel essai dans 7 jours.', 'warn');
    localStorage.setItem(DW_LS_KEY, Date.now().toString()); // ne pas réessayer à chaque login
    return;
  }

  let added = 0;
  for (const entry of tracksData.items) {
    const t = entry.item || entry.track; // champ renommé track → item par la migration 2026
    if (!t?.uri || t.is_local) continue;
    try {
      dbRun(
        "INSERT OR IGNORE INTO tracks (spotify_uri, artist_name, title, release_title, release_type, release_date, cover_url, duration_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
        [t.uri, t.artists?.map(a => a.name).join(', ') || '?', t.name, 'Découvertes de la semaine', 'discover_weekly', today, t.album?.images?.[0]?.url || null, t.duration_ms || null]
      );
      added++;
    } catch {}
  }

  if (added > 0) {
    await saveDB();
    localStorage.setItem(DW_LS_KEY, Date.now().toString());
    addLog(`✓ ${added} titre(s) de "Découvertes de la semaine" ajoutés au feed`, 'ok');
  } else {
    addLog('Découvertes de la semaine : tous les titres sont déjà dans le feed', 'info');
    localStorage.setItem(DW_LS_KEY, Date.now().toString());
  }
}

// DESIGN TOKENS
// ════════════════════════════════════════════════
const C = {
  bg:'#0a0a0a', surface:'#161616', surfaceHigh:'#1f1f1f',
  border:'#272727', accent:'#1ed760', text:'#f0f0f0',
  muted:'#8a8a8a', dim:'#4a4a4a',
  blue:'oklch(0.65 0.18 250)',
};

// ════════════════════════════════════════════════
// STORE (contexte global)
// ════════════════════════════════════════════════
const StoreCtx = React.createContext(null);
const useStore = () => React.useContext(StoreCtx);

function StoreProvider({ children }) {
  const [authState, setAuthState] = React.useState('loading');
  const [user,     setUser]       = React.useState(null);

  const [dbReady,  setDbReady]          = React.useState(false);
  const [resumableSession, setResumableSession] = React.useState(null);

  // ── État de synchro unifié — UNE seule source de vérité au lieu de 3 booléens ──
  // 'idle' | 'running' | 'paused' (pause manuelle) | 'rl_waiting' (attente 429)
  // Le ref est posé de façon SYNCHRONE (setSync) : le guard anti double-clic de
  // startSync et le checkpoint lisent l'état réel, pas celui du dernier render.
  const [syncState, setSyncState] = React.useState('idle');
  const syncStateRef              = React.useRef('idle');
  const setSync = (st) => { syncStateRef.current = st; setSyncState(st); };
  const scraping  = syncState !== 'idle';
  const paused    = syncState === 'paused';
  const rlWaiting = syncState === 'rl_waiting';

  const [otherTab, setOtherTab]   = React.useState(false); // autre onglet détecté (risque d'écrasement DB)
  const knownUrisRef              = React.useRef(new Set());
  const listenedUrisRef           = React.useRef(new Set());
  const prevUriRef                = React.useRef(null);
  const [loopEnabled, setLoopEnabled] = React.useState(() => localStorage.getItem('spotifyplus_loop') === '1');
  const loopEnabledRef            = React.useRef(false);
  const feedRef                   = React.useRef([]);
  const prevPositionRef           = React.useRef(0);
  const prevDurationRef           = React.useRef(0);
  const advancedForRef            = React.useRef(null); // URI pour laquelle on a déjà déclenché l'avance
  const prevNowRef                = React.useRef({ playing:false, uri:null, current:0, duration:0 });
  React.useEffect(() => {
    loopEnabledRef.current = loopEnabled;
    localStorage.setItem('spotifyplus_loop', loopEnabled ? '1' : '0'); // persistant : survit au changement d'onglet / F5
  }, [loopEnabled]);
  // ⚠ l'effet de sync feedRef est déclaré APRÈS le useState de feed (les deps [feed] sont évaluées pendant le rendu)

  const [stats,         setStats]       = React.useState({ artists:0, total:0, releases:0, tracks:0 });
  const [listenStats,   setListenStats] = React.useState({ remaining:0, remaining_ms:0, this_month:0, this_year:0, all_time:0 });
  const [likedTracks,   setLikedTracks] = React.useState([]);
  const [history,       setHistory]     = React.useState([]); // titres écoutés non purgés, plus récent en haut
  const [progress,      setProgress]    = React.useState(0);
  const [currentArtist, setCurrentArtist] = React.useState('');
  const [statusMsg,     setStatusMsg]   = React.useState('Prêt.');
  const [statusMode,    setStatusMode]  = React.useState('green');
  const [nextCall,      setNextCall]    = React.useState(0);
  const [nextCallTotal, setNextCallTotal] = React.useState(0);
  const [eta,           setEta]         = React.useState('');
  const [dailyScrapings, setDailyScrapings] = React.useState(0);

  const [feed,          setFeed]        = React.useState([]);
  React.useEffect(() => { feedRef.current = feed; }, [feed]);

  const [blockedUntil, setBlockedUntil] = React.useState(0);     // fenêtre rate-limit persistée (spotifyplus_blocked_until)

  // Filtres du feed — APRÈS feed (useMemo référence feed, doit être déclaré après)
  const [filterType,   setFilterType]   = React.useState('all');
  const [sortBy,       setSortBy]       = React.useState('default');
  const [artistSearch, setArtistSearch] = React.useState('');
  const resetFilters = () => { setFilterType('all'); setSortBy('default'); setArtistSearch(''); };

  const filteredFeed = React.useMemo(() => {
    let r = (feed || []).filter(item => {
      if (filterType === 'single' && item.label !== 'Single') return false;
      if (filterType === 'album'  && item.label !== 'Album')  return false;
      if (filterType === 'dw'     && item.label !== 'Découvertes') return false;
      if (artistSearch.trim()) return (item.artist || '').toLowerCase().includes(artistSearch.trim().toLowerCase());
      return true;
    });
    return [...r].sort((a, b) => {
      if (sortBy === 'date_asc') return (a.rawDate || '').localeCompare(b.rawDate || '');
      if (sortBy === 'artist')    return (a.artist || '').localeCompare(b.artist || '');
      return 0;
    });
  }, [feed, filterType, sortBy, artistSearch]);

  const filteredFeedRef = React.useRef([]);
  React.useEffect(() => { filteredFeedRef.current = filteredFeed; }, [filteredFeed]);
  const [logs,          setLogs]        = React.useState([]);
  const [now,           setNow]         = React.useState(null);
  const [delayChoice,   setDelayChoice] = React.useState(30);
  const delayChoiceRef = React.useRef(30);
  React.useEffect(() => { delayChoiceRef.current = delayChoice; }, [delayChoice]);

  const log = React.useCallback((msg, type='info') => {
    const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    setLogs(L => [...L, { time, msg, type }].slice(-500));
  }, []);

  const setStatus = React.useCallback((msg, mode='green') => {
    setStatusMsg(msg); setStatusMode(mode);
  }, []);

  // remaining = nombre TOTAL d'artistes restant à scraper (la fin de la synchro complète,
  // pas la fin de la session de 100/jour — celle-ci a son propre affichage dans NextCallPanel)
  const updateETA = React.useCallback((remaining, avgMs) => {
    if (remaining <= 0) { setEta(''); return; }
    const sec = Math.ceil((remaining * avgMs) / 1000);
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    setEta((h > 0 ? `${h}h ` : '') + (m > 0 || h > 0 ? `${m}m ` : '') + `${s}s`);
  }, []);

  // ── Init OAuth + local DB ──
  React.useEffect(() => {
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      if (code) {
        // Anti-CSRF : le state retourné doit correspondre à celui généré au départ
        const returnedState = params.get('state');
        const stateOk = returnedState && returnedState === localStorage.getItem('pkce_state');
        const ok = stateOk && await exchangeCode(code);
        window.history.replaceState({}, '', window.location.pathname);
        if (!ok) { setAuthState('login'); return; }
      }
      const token = localStorage.getItem('spotify_token');
      if (!token) { setAuthState('login'); return; }
      try {
        const me = await apiGet('https://api.spotify.com/v1/me');
        // me.rate_limited : fenêtre 429 persistée active au boot — le token existe,
        // on entre quand même en mode connecté (dégradé) au lieu d'éjecter vers le login
        if (me?.id || me?.rate_limited) {
          if (me?.id) setUser(me);
          setAuthState('connected');

          // Demander la persistance du stockage (réduit le risque d'éviction IndexedDB, surtout iOS)
          try { navigator.storage?.persist?.(); } catch {}

          // Init local DB
          await initDB();

          // Check month/year reset
          const now2      = new Date();
          const curMonth  = now2.toISOString().slice(0, 7);
          const curYear   = now2.getFullYear().toString();
          const statsRow  = dbGet("SELECT last_reset_month, last_reset_year FROM stats WHERE id = 1");
          if (statsRow?.last_reset_month !== curMonth) {
            dbRun("UPDATE stats SET listened_this_month = 0, last_reset_month = ? WHERE id = 1", [curMonth]);
          }
          if (statsRow?.last_reset_year !== curYear) {
            dbRun("UPDATE stats SET listened_this_year = 0, last_reset_year = ? WHERE id = 1", [curYear]);
          }

          // Import Découvertes de la semaine si besoin (1x par semaine)
          const initMsgs = [];
          const addInitLog = (msg, type='info') => {
            const t = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            initMsgs.push({ time: t, msg, type });
          };
          await importDiscoverWeekly(addInitLog).catch(() => {});

          // Load known URIs for dedup (inclut les DW tracks fraîchement importées)
          const uriRows = dbAll("SELECT spotify_uri FROM tracks");
          uriRows.forEach(r => knownUrisRef.current.add(r.spotify_uri));

          // Load feed (not listened)
          const trackRows = dbAll("SELECT * FROM tracks WHERE listened = 0 ORDER BY id ASC LIMIT 1000");
          if (trackRows.length > 0) {
            setFeed(trackRows.map(t => ({
              id:         t.spotify_uri,
              spotifyUri: t.spotify_uri,
              label:      t.release_type === 'single' ? 'Single' : t.release_type === 'discover_weekly' ? 'Découvertes' : 'Album',
              artist:     t.artist_name,
              title:      t.title,
              subtitle:   t.release_type === 'discover_weekly' ? 'Découvertes de la semaine' : t.release_type !== 'single' ? t.release_title : null,
              date:       t.release_date ? new Date(t.release_date).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) : '',
              scraped_at: t.added_at ? new Date(t.added_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) : null,
              image:      t.cover_url,
              isNew:       false,
              liked:       t.liked || 0,
              rawDate:     t.release_date || '',
              duration_ms: t.duration_ms || 0,
            })));
          }

          // Load listen stats
          setListenStats(loadListenStatsFromDB());
          setLikedTracks(loadLikedTracksFromDB());
          setHistory(loadHistoryFromDB());
          // syncInitialLikes est appelé après setDbReady(true) via useEffect

          // Vérifier si une synchro était en cours (reprise possible)
          try {
            const saved = localStorage.getItem('spotifyplus_sync_progress');
            if (saved) {
              const p = JSON.parse(saved);
              if (p?.artists_scanned > 0) setResumableSession(p);
            }
          } catch {}

          try {
            const dailyRaw = localStorage.getItem('spotifyplus_daily_scrapings');
            if (dailyRaw) {
              const d = JSON.parse(dailyRaw);
              if (d?.date === localDay()) setDailyScrapings(d.count || 0);
            }
          } catch {}

          // Fenêtre rate-limit persistée (déjà relue dans _rlUntil au chargement du module)
          try {
            if (_rlUntil > Date.now()) setBlockedUntil(_rlUntil);
            else localStorage.removeItem(RL_LS_KEY);
          } catch {}

          if (initMsgs.length > 0) setLogs(initMsgs);
          setDbReady(true);
        } else {
          setAuthState('login');
        }
      } catch { setAuthState('login'); }
    })();
  }, []);

  // ── Poll lecture en cours toutes les 5s ──
  React.useEffect(() => {
    if (authState !== 'connected') return;
    let stop = false;
    const tick = async () => {
      if (document.visibilityState === 'hidden') return; // onglet caché : ne pas dépenser de requêtes
      try {
        const r = await apiGet('https://api.spotify.com/v1/me/player/currently-playing');
        // Fenêtre 429 active : garder l'état affiché tel quel — setNow(null) ferait
        // disparaître le player et polluerait les effets d'auto-avance alors que la musique joue
        if (r?.rate_limited) return;
        if (!stop && r?.item) {
          const next = {
            title:    r.item.name,
            artist:   r.item.artists.map(a => a.name).join(', '),
            duration: Math.floor(r.item.duration_ms / 1000),
            current:  Math.floor((r.progress_ms || 0) / 1000),
            image:    r.item.album?.images?.[0]?.url,
            playing:  r.is_playing,
            uri:      r.item.uri,
          };
          // Bail-out : si rien n'a changé (lecture en pause), garder la même référence → pas de re-render global
          setNow(prev => (prev &&
            prev.uri === next.uri && prev.current === next.current &&
            prev.playing === next.playing && prev.duration === next.duration &&
            prev.title === next.title && prev.artist === next.artist &&
            prev.image === next.image) ? prev : next);
        } else if (!stop && !r?.item) {
          setNow(n => n === null ? n : null);
        }
      } catch {}
    };
    tick();
    const id = setInterval(tick, 5000);
    const onVis = () => { if (document.visibilityState === 'visible') tick(); }; // rattrapage immédiat au retour
    document.addEventListener('visibilitychange', onVis);
    return () => { stop = true; clearInterval(id); document.removeEventListener('visibilitychange', onVis); };
  }, [authState]);

  // ── Countdown UI ──
  React.useEffect(() => {
    if (nextCall <= 0) return;
    const id = setInterval(() => setNextCall(v => Math.max(0, v - 1)), 1000);
    return () => clearInterval(id);
  }, [nextCall]);

  // ── Marquer comme écouté quand le morceau se termine (URI change) ──
  React.useEffect(() => {
    const currentUri = now?.uri || null;
    const prevUri    = prevUriRef.current;
    prevUriRef.current = currentUri;

    // Le marqueur d'auto-avance ne vaut que pour le titre qu'on vient de quitter :
    // le reset permet de ré-avancer si l'utilisateur réécoute le même titre plus tard dans la session
    if (currentUri && advancedForRef.current && advancedForRef.current !== currentUri) {
      advancedForRef.current = null;
    }

    if (!prevUri || prevUri === currentUri) return;

    // Auto-avance — AVANT le check listenedUrisRef pour ne pas être bloqué
    // Déclenche si : loop désactivé ET (rien ne joue OU le nouveau titre n'est pas dans le feed)
    if (!loopEnabledRef.current && dbReady) {
      const f = filteredFeedRef.current;
      const prevIdx       = f.findIndex(item => item.spotifyUri === prevUri);
      const currentInFeed = currentUri ? f.some(item => item.spotifyUri === currentUri) : false;
      // Garde anti-vol de lecture : n'avancer que si le titre quitté était PROCHE DE SA FIN
      // au dernier tick (poll 5s + marge). Sans ça, lancer manuellement un titre hors feed
      // (ou stopper la lecture) déclenchait playTrack et écrasait le choix de l'utilisateur.
      // prevNowRef est mis à jour par l'effet `now` déclaré plus bas → il contient encore
      // l'état du tick PRÉCÉDENT quand cet effet s'exécute (ordre de déclaration des effets).
      const snap    = prevNowRef.current;
      const nearEnd = snap.uri === prevUri && snap.duration > 0 && (snap.duration - snap.current) <= 12;
      if (prevIdx !== -1 && !currentInFeed && nearEnd) {
        const next = f[prevIdx + 1] ?? f[0];
        if (next) playTrack(next.spotifyUri);
      }
    }

    if (listenedUrisRef.current.has(prevUri)) return;
    if (!dbReady) return;

    // Écritures DB hors de l'updater setFeed (les updaters React doivent rester purs)
    const item = feedRef.current.find(f => f.spotifyUri === prevUri);
    if (!item) return;

    listenedUrisRef.current.add(prevUri);
    try {
      const trackRow = dbGet("SELECT duration_ms FROM tracks WHERE spotify_uri = ?", [prevUri]);
      const durMs = trackRow?.duration_ms || 0;
      dbRun("UPDATE tracks SET listened = 1, listened_at = datetime('now') WHERE spotify_uri = ?", [prevUri]);
      dbRun(
        "UPDATE stats SET total_listened = total_listened + 1, listened_this_month = listened_this_month + 1, listened_this_year = listened_this_year + 1, total_listened_ms = total_listened_ms + ? WHERE id = 1",
        [durMs]
      );
      saveDB().catch(() => {});
      setListenStats(loadListenStatsFromDB());
      setHistory(loadHistoryFromDB());
    } catch {
      listenedUrisRef.current.delete(prevUri);
      return;
    }

    setFeed(F => F.map(f => f.spotifyUri === prevUri ? { ...f, removing: true } : f));
    setTimeout(() => setFeed(F2 => F2.filter(f => f.spotifyUri !== prevUri)), 600);
  }, [now?.uri, dbReady]);

  // ── Détecter fin de titre (≤ 3s restantes) → passer au suivant ──
  React.useEffect(() => {
    if (!now) { prevPositionRef.current = 0; prevDurationRef.current = 0; return; }

    const prevPos = prevPositionRef.current;
    const prevDur = prevDurationRef.current;
    prevPositionRef.current = now.current;
    prevDurationRef.current = now.duration;

    if (loopEnabledRef.current) return;

    // Restart detection (même titre qui repart du début)
    if (now.duration > 15 && now.current < 5 && prevPos > prevDur - 10 && prevDur > 0) {
      const f = filteredFeedRef.current;
      const idx = f.findIndex(item => item.spotifyUri === now.uri);
      if (idx !== -1) {
        const next = f[idx + 1] ?? f[0];
        if (next) playTrack(next.spotifyUri);
      }
      return;
    }

    // Fin de titre : ≤ 3s restantes — peu importe is_playing (Spotify retourne false quand ça s'arrête)
    if (now.duration > 15 && advancedForRef.current !== now.uri) {
      const remaining = now.duration - now.current;
      if (remaining >= 0 && remaining <= 3) {
        const f = filteredFeedRef.current;
        const idx = f.findIndex(item => item.spotifyUri === now.uri);
        if (idx !== -1) {
          advancedForRef.current = now.uri; // marquer pour éviter le double appel
          const next = f[idx + 1] ?? f[0];
          if (next) playTrack(next.spotifyUri);
        }
      }
    }
  }, [now?.current]);

  // ── Détecter arrêt du titre (playing true → stopped) → avancer si fin proche ──
  // Surveille now entier pour capturer aussi le cas now=null (204 Spotify)
  React.useEffect(() => {
    const prev = prevNowRef.current;
    // Mémoriser l'état courant (garder l'URI même si now=null)
    prevNowRef.current = {
      playing:  now?.playing  ?? false,
      uri:      now?.uri      ?? prev.uri,   // conserve la dernière URI connue
      current:  now?.current  ?? prev.current,
      duration: now?.duration ?? prev.duration,
    };

    // Transition : était en lecture → maintenant arrêté (false ou null)
    if (!prev.playing) return;               // n'était pas en lecture avant
    if (now?.playing === true) return;       // toujours en lecture
    if (loopEnabledRef.current) return;
    if (!dbReady) return;

    const uri = prev.uri;
    if (!uri || advancedForRef.current === uri) return;

    const f = filteredFeedRef.current;
    const idx = f.findIndex(item => item.spotifyUri === uri);
    if (idx === -1) return; // titre pas dans notre feed (ou filtré)

    // Avancer si les dernières secondes connues indiquent la fin du titre
    const remaining = prev.duration - prev.current;
    if (prev.duration > 15 && remaining <= 8) {
      advancedForRef.current = uri;
      const next = f[idx + 1] ?? f[0];
      if (next) playTrack(next.spotifyUri);
    }
  }, [now]);

  // Connecte le guard module-level au state React : TOUT 429 (player compris)
  // affiche le bandeau et désactive Lancer le temps de la fenêtre
  React.useEffect(() => {
    _rlNotify = (until) => setBlockedUntil(until);
    return () => { _rlNotify = null; };
  }, []);

  // Garde multi-onglets : la DB est chargée en RAM et chaque saveDB() exporte tout —
  // deux onglets ouverts = le dernier qui sauvegarde écrase les écoutes/likes de l'autre
  React.useEffect(() => {
    if (!('BroadcastChannel' in window)) return;
    const bc = new BroadcastChannel('spotifyplus_tabs');
    bc.onmessage = e => {
      if (e.data === 'ping') bc.postMessage('pong');      // un nouvel onglet demande — signaler notre présence
      else if (e.data === 'pong') setOtherTab(true);       // un onglet existant a répondu — nous sommes le doublon
    };
    bc.postMessage('ping');
    return () => bc.close();
  }, []);

  const seek = async (positionMs) => {
    const r = await apiPut(`https://api.spotify.com/v1/me/player/seek?position_ms=${Math.round(positionMs)}`);
    if (!r?.error) setNow(n => n ? { ...n, current: Math.round(positionMs / 1000) } : n);
  };

  const togglePause = () => {
    const st = syncStateRef.current;
    if (st === 'paused') { setSync('running'); log('▶ Reprise de la synchronisation.', 'ok'); }
    else if (st !== 'idle') { setSync('paused'); log('⏸ Synchronisation mise en pause.', 'wait'); }
  };

  const purgeListened = async () => {
    if (!dbReady) return;
    // Purge TOUS les titres écoutés, likés compris (vide aussi l'onglet ❤ Likés).
    // Le % likés (total_liked / total_listened) vit dans la table `stats`, indépendante
    // des lignes `tracks` : il n'est donc PAS affecté par cette suppression.
    const row   = dbGet("SELECT COUNT(*) as c FROM tracks WHERE listened = 1");
    const count = row?.c || 0;
    dbRun("DELETE FROM tracks WHERE listened = 1");
    await saveDB();
    setListenStats(loadListenStatsFromDB());
    setLikedTracks(loadLikedTracksFromDB());
    setHistory(loadHistoryFromDB());
    alert(`${count} titre(s) supprimé(s).`);
  };

  // useCallback : identités stables pour que React.memo(FeedItem) soit efficace
  const removeFromFeed = React.useCallback(async (uri) => {
    if (!dbReady) return;
    // Un titre liké n'est pas supprimé de la DB (il porte le like) : il est marqué
    // écouté pour sortir du feed, sans toucher les compteurs de la table stats
    const row = dbGet("SELECT liked FROM tracks WHERE spotify_uri = ?", [uri]);
    if (row?.liked) dbRun("UPDATE tracks SET listened = 1, listened_at = datetime('now') WHERE spotify_uri = ?", [uri]);
    else dbRun("DELETE FROM tracks WHERE spotify_uri = ?", [uri]);
    await saveDB();
    setFeed(f => f.filter(item => item.spotifyUri !== uri));
    setListenStats(loadListenStatsFromDB());
    setHistory(loadHistoryFromDB());
  }, [dbReady]);

  const setTrackLiked = React.useCallback(async (uri, bool) => {
    if (!dbReady) return;
    dbRun("UPDATE tracks SET liked = ? WHERE spotify_uri = ?", [bool ? 1 : 0, uri]);
    // Compteur persistant des likes posés DANS l'app (base du "% likés" de VosEcoutesPanel).
    // Volontairement dans la table stats (survit à la purge) et PAS alimenté par
    // syncInitialLikes (les likes Spotify importés ne comptent pas). Un unlike décrémente.
    if (bool) dbRun("UPDATE stats SET total_liked = total_liked + 1 WHERE id = 1");
    else      dbRun("UPDATE stats SET total_liked = MAX(total_liked - 1, 0) WHERE id = 1");
    await saveDB();
    setLikedTracks(loadLikedTracksFromDB());
    setListenStats(loadListenStatsFromDB());
    setFeed(f => f.map(item => item.spotifyUri === uri ? { ...item, liked: bool ? 1 : 0 } : item));
  }, [dbReady]);

  const syncInitialLikes = async () => {
    try {
      // 1×/24h max : jusqu'à 8 requêtes par appel, inutile à chaque reload de page
      const last = parseInt(localStorage.getItem('spotifyplus_likes_synced_at') || '0');
      if (Date.now() - last < 24 * 60 * 60 * 1000) return;
      const uriRows = dbAll("SELECT spotify_uri FROM tracks WHERE listened = 0 LIMIT 300");
      if (uriRows.length === 0) return;
      const uris = uriRows.map(r => r.spotify_uri).filter(Boolean);
      for (let i = 0; i < uris.length; i += 40) { // /me/library/contains : max 40 URIs par requête
        if (i > 0) await sleep(400); // lisse le burst d'appels au login (jusqu'à 8 batchs)
        const batch = uris.slice(i, i + 40);
        const data = await libraryContains(batch);
        if (!data) continue; // erreur, rate-limit ou scope manquant — on garde l'état local
        batch.forEach((uri, j) => {
          dbRun("UPDATE tracks SET liked = ? WHERE spotify_uri = ?", [data[j] ? 1 : 0, uri]);
        });
      }
      await saveDB();
      localStorage.setItem('spotifyplus_likes_synced_at', Date.now().toString());
      const likedUris = new Set(dbAll("SELECT spotify_uri FROM tracks WHERE liked = 1").map(r => r.spotify_uri));
      setFeed(f => f.map(item => ({ ...item, liked: likedUris.has(item.spotifyUri) ? 1 : 0 })));
      setLikedTracks(loadLikedTracksFromDB());
    } catch {}
  };

  const navigateFeed = React.useCallback(async (dir) => {
    const f = filteredFeedRef.current;
    if (f.length === 0) return;
    const nowUri = prevNowRef.current?.uri;
    const currentIdx = nowUri ? f.findIndex(item => item.spotifyUri === nowUri) : -1;
    let nextIdx;
    if (dir === -1) nextIdx = currentIdx > 0 ? currentIdx - 1 : f.length - 1;
    else nextIdx = currentIdx < f.length - 1 ? currentIdx + 1 : 0;
    if (f[nextIdx]) await playTrack(f[nextIdx].spotifyUri);
  }, []);

  // Sync des likes Spotify → DB dès que la DB est prête
  React.useEffect(() => {
    if (dbReady) syncInitialLikes();
  }, [dbReady]); // eslint-disable-line

  // Sauvegarde de sécurité quand l'app passe en arrière-plan (mobile : l'OS peut tuer l'onglet)
  React.useEffect(() => {
    if (!dbReady) return;
    const h = () => { if (document.visibilityState === 'hidden') saveDB().catch(() => {}); };
    document.addEventListener('visibilitychange', h);
    return () => document.removeEventListener('visibilitychange', h);
  }, [dbReady]);

  const resumeSync = () => {
    if (!resumableSession) return;
    startSync({
      skipCount:    resumableSession.artists_scanned,
      // Curseur de pagination : reprendre directement sur la bonne page au lieu de
      // re-paginer /me/following depuis le début (~20 fetchs dos à dos pour sauter 1000 artistes)
      resumeUrl:    resumableSession.page_url || null,
      resumeOffset: resumableSession.page_offset || 0,
    });
  };

  // ── Fin de synchro unifiée — TOUS les chemins d'arrêt passent par ici ──
  // reason: 'completed' | 'daily_limit' | 'error'
  const endSync = async (reason) => {
    setNextCall(0); setNextCallTotal(0); setEta('');
    setSync('idle');
    if (reason === 'completed') {
      localStorage.removeItem('spotifyplus_sync_progress');
      setResumableSession(null);
    } else {
      // Restaure le bouton "↩ Reprendre" immédiatement, sans attendre un reload
      try {
        const saved = localStorage.getItem('spotifyplus_sync_progress');
        if (saved) {
          const p = JSON.parse(saved);
          if (p?.artists_scanned > 0) setResumableSession(p);
        }
      } catch {}
    }
    try { await saveDB(); } catch {}
  };

  // ── SYNC ──
  // TOUTES les conditions de non-démarrage sont vérifiées ici, AVANT toute requête réseau :
  // synchro déjà en cours (ref synchrone — insensible au double-clic), fenêtre rate-limit
  // persistée, quota journalier déjà consommé.
  const startSync = async (options = {}) => {
    if (syncStateRef.current !== 'idle') return;

    // Fenêtre rate-limit persistée (429 player ou stop synchro min. 15 min) — survit au F5
    if (Date.now() < _rlUntil) {
      setBlockedUntil(_rlUntil);
      log(`🚫 Synchro bloquée (rate limit Spotify) — réessaie dans ${Math.ceil((_rlUntil - Date.now()) / 60000)} min`, 'error');
      setStatus('Bloqué — rate limit Spotify', 'error');
      return;
    }
    try { localStorage.removeItem(RL_LS_KEY); } catch {}
    setBlockedUntil(0);

    // Quota journalier déjà atteint : refuser avant de dépenser /me + pages d'artistes
    let curDay = localDay();
    let dailyCount = 0;
    try {
      const d = JSON.parse(localStorage.getItem('spotifyplus_daily_scrapings') || 'null');
      if (d?.date === curDay) dailyCount = d.count || 0;
    } catch {}
    if (dailyCount >= 100) {
      log('⛔ Limite journalière déjà atteinte (100 artistes/jour) — réessaie demain.', 'error');
      setStatus('Limite 100/jour atteinte', 'error');
      return;
    }

    const { skipCount = 0, resumeUrl = null, resumeOffset = 0 } = options;
    setResumableSession(null);
    setSync('running');
    setLogs([]); setProgress(0);
    setStats({ artists:0, total:0, releases:0, tracks:0 });
    setEta(''); setStatus('Vérification du compte…', 'pulse');

    try {
      // Point de contrôle unique, attendu avant CHAQUE appel API de la synchro.
      // UNE seule boucle d'attente pour la pause manuelle ET la fenêtre rate-limit globale
      // (_rlUntil, posée par n'importe quel 429, player compris) — le countdown UI est
      // dérivé de _rlUntil : plus de sleep parallèle dans apiGetSafe qui dupliquait l'attente.
      const checkpoint = async () => {
        while (true) {
          if (syncStateRef.current === 'paused') { await sleep(500); continue; }
          const wait = _rlUntil - Date.now();
          if (wait > 0) {
            if (syncStateRef.current !== 'rl_waiting') {
              setSync('rl_waiting');
              const sec = Math.ceil(wait / 1000);
              setNextCallTotal(sec); setNextCall(sec);
              setStatus(`⏸ Rate limit — reprise dans ${sec}s`, 'wait');
            }
            await sleep(500); continue;
          }
          if (syncStateRef.current === 'rl_waiting') {
            setSync('running');
            setStatus('▶ Reprise après rate limit…', 'pulse');
            log('▶ Reprise après rate limit.', 'ok');
          }
          return;
        }
      };

      // Wrapper apiGet : checkpoint avant chaque tentative + stop complet dès le PREMIER 429
      const apiGetSafe = async (url) => {
        while (true) {
          await checkpoint();
          let data;
          try {
            data = await apiGet(url);
          } catch (err) {
            if (err.message === 'RATE_LIMIT') {
              // Stop complet immédiat : on bloque TOUS les appels (min. 15 min) via la
              // fenêtre persistée — survit au F5. La progression est sauvegardée, le
              // bouton ↩ Reprendre réapparaît via endSync('error').
              const blockMs = Math.max(err.waitMs || 0, 15 * 60 * 1000);
              _rlSet(blockMs);
              setBlockedUntil(_rlUntil);
              const e = new Error('SYNC_RATE_ABORT');
              e.blockMin = Math.ceil(blockMs / 60000);
              throw e;
            }
            throw err;
          }
          if (data === null) return null;          // 204 sans body (n'arrive pas sur ces endpoints)
          if (data.rate_limited) continue;          // bloqué par le guard global — re-checkpoint puis retry
          if (data.error) {
            // Body d'erreur HTTP (401 non rattrapé, 403, 5xx…) : on s'arrête proprement
            // au lieu de terminer en silence comme si tout était scanné
            throw new Error(`API ${data.error.status || '?'} : ${data.error.message || 'erreur inconnue'}`);
          }
          return data;
        }
      };

      log('── Étape 1 : vérification du compte ──', 'info');
      const me = await apiGetSafe('https://api.spotify.com/v1/me');
      if (!me?.id) throw new Error('impossible de récupérer le compte');
      log(`✓ Compte : ${me.display_name || me.id}`, 'ok');

      // Charger les dates de scrapping depuis la DB locale
      const scrapedRows  = dbAll("SELECT spotify_id, last_scraped_at FROM artists_scraped");
      const scrapedDates = {};
      scrapedRows.forEach(r => { scrapedDates[r.spotify_id] = r.last_scraped_at; });
      log(`✓ Dates de scrapping chargées (${scrapedRows.length} artiste(s) connus)`, 'ok');

      const ceiling = new Date();
      log('── Scraping par date individuelle par artiste ──', 'info');
      setStatus('Chargement des artistes…', 'pulse');

      const seenUris = new Set(knownUrisRef.current);
      let totalTracks = 0, totalReleases = 0, artistsScanned = skipCount, totalArtists = ESTIMATED_TOTAL;
      let globalArtistIndex = 0;
      // Reprise par curseur : repartir directement sur la page sauvegardée au lieu de
      // re-paginer depuis le début (burst de fetchs sans délai = pire scénario post-429)
      let nextUrl   = resumeUrl || 'https://api.spotify.com/v1/me/following?type=artist&limit=50';
      let firstPage = true;
      let pageNum   = 0;

      if (skipCount > 0) log(`↩ Reprise à partir de l'artiste #${skipCount + 1}`, 'ok');

      while (nextUrl) {
        pageNum++;
        const pageUrl  = nextUrl; // URL de la page en cours — persistée pour la reprise
        const pageData = await apiGetSafe(pageUrl);
        // throw (et non break) : un échec ici ne doit PAS terminer la synchro comme si elle était complète
        if (!pageData?.artists?.items) throw new Error('chargement des artistes impossible');
        if (pageData.artists.total) {
          totalArtists = pageData.artists.total;
          setStats(s => ({ ...s, total: totalArtists }));
        }
        nextUrl = pageData.artists.next || null;
        const artists = pageData.artists.items;
        // Reprise au milieu d'une page : ne sauter que les artistes déjà traités de CETTE page
        const startIdx = (firstPage && resumeUrl) ? Math.min(resumeOffset, artists.length) : 0;
        firstPage = false;
        log(`✓ ${artists.length} artiste(s) — page ${pageNum}`, 'ok');

        for (let i = startIdx; i < artists.length; i++) {
          // Compat anciennes progressions (sans curseur de page) : re-parcours avec saut
          globalArtistIndex++;
          if (!resumeUrl && globalArtistIndex <= skipCount) continue;
          await checkpoint();

          // Passage de minuit pendant la synchro → reset du compteur journalier
          const dNow = localDay();
          if (dNow !== curDay) {
            curDay = dNow; dailyCount = 0; setDailyScrapings(0);
            log('🌅 Nouveau jour — compteur journalier remis à zéro', 'info');
          }

          if (dailyCount >= 100) {
            log('⛔ Limite journalière atteinte (100 artistes/jour). Synchro arrêtée — relancer demain.', 'error');
            setStatus('Limite 100/jour atteinte', 'error');
            if ('Notification' in window) {
              const send = () => new Notification('Spotify+ — Session terminée', { body: '100 artistes scrapés aujourd\'hui. Relance demain.', icon: './icon-192.png' });
              if (Notification.permission === 'granted') send();
              else if (Notification.permission !== 'denied') Notification.requestPermission().then(p => { if (p === 'granted') send(); });
            }
            await endSync('daily_limit');
            return;
          }
          const artist = artists[i];
          artistsScanned++;
          setStats(s => ({ ...s, artists: artistsScanned }));
          setProgress(Math.min(98, (artistsScanned / totalArtists) * 100));
          setCurrentArtist(artist.name);
          setStatus(`Scan ${artistsScanned}/${totalArtists} — ${artist.name}`, 'pulse');

          // Cutoff tronqué au JOUR du dernier scan : une sortie publiée le jour même du scan
          // mais indexée après ne doit pas être ratée (les doublons sont absorbés par INSERT OR IGNORE)
          const cutoff = new Date((scrapedDates[artist.id] || '2026-03-15').slice(0, 10));
          const albumsData = await apiGetSafe(
            // ⚠ Migration Spotify fév./mars 2026 : limit max de cet endpoint réduit de 50 à 10
            // (limit=20 → 400 "Invalid limit" depuis le 9 mars 2026, même pour les apps existantes)
            `https://api.spotify.com/v1/artists/${artist.id}/albums?include_groups=album,single&limit=10&market=FR`
          );

          // Quota journalier consommé APRÈS la requête : un throw au-dessus (erreur API,
          // disjoncteur) ne brûle plus le quota d'un artiste qui n'a pas été scanné
          dailyCount++;
          localStorage.setItem('spotifyplus_daily_scrapings', JSON.stringify({ date: curDay, count: dailyCount }));
          setDailyScrapings(dailyCount);
          if (albumsData?.items) {
            const inRange = albumsData.items.filter(a => { const d = new Date(a.release_date); return d >= cutoff && d <= ceiling; });
            if (inRange.length === 0) log(`→ ${artist.name} · aucune sortie depuis ${cutoff.toLocaleDateString('fr-FR')}`, 'info');

            for (const album of albumsData.items) {
              const rDate = new Date(album.release_date);
              if (rDate < cutoff || rDate > ceiling) continue;

              const tracksData = await apiGetSafe(`https://api.spotify.com/v1/albums/${album.id}/tracks?limit=50`);
              if (!tracksData?.items?.length) continue;
              const uris = tracksData.items.map(t => t.uri);
              // Skip seulement si TOUTES les pistes sont connues : un album dont la piste 1
              // est sortie en single auparavant ne doit pas être sauté en entier
              if (uris.every(u => seenUris.has(u))) { log(`${artist.name} — ${album.name} · déjà en base`, 'info'); continue; }

              // Sauvegarder en DB locale
              const coverUrl = album.images?.[0]?.url || null;
              if (album.album_type === 'single') {
                try {
                  dbRun(
                    "INSERT OR IGNORE INTO tracks (spotify_uri, artist_name, title, release_title, release_type, release_date, cover_url, duration_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
                    [uris[0], artist.name, album.name, null, 'single', album.release_date || null, coverUrl, tracksData.items[0]?.duration_ms || null]
                  );
                } catch {}
              } else {
                for (const t of tracksData.items) {
                  try {
                    dbRun(
                      "INSERT OR IGNORE INTO tracks (spotify_uri, artist_name, title, release_title, release_type, release_date, cover_url, duration_ms) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
                      [t.uri, artist.name, t.name, album.name, album.album_type, album.release_date || null, coverUrl, t.duration_ms || null]
                    );
                  } catch {}
                }
              }

              uris.forEach(u => { seenUris.add(u); knownUrisRef.current.add(u); });
              const addedCount = album.album_type === 'single' ? 1 : tracksData.items.length;
              totalTracks  += addedCount;
              totalReleases++;
              setStats(s => ({ ...s, releases: totalReleases, tracks: totalTracks }));

              const dateStr = rDate.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
              if (album.album_type === 'single') {
                setFeed(F => [...F, {
                  id:          uris[0],
                  spotifyUri:  uris[0],
                  label:       'Single',
                  artist:      artist.name,
                  title:       album.name,
                  subtitle:    null,
                  date:        dateStr,
                  rawDate:     album.release_date || '',
                  image:       coverUrl,
                  isNew:       true,
                  liked:       0,
                  duration_ms: tracksData.items[0]?.duration_ms || 0,
                }].slice(0, 1000)); // même cap que le chargement initial (sinon les nouveaux titres restent invisibles jusqu'au reload)
              } else {
                const trackItems = tracksData.items.map(t => ({
                  id:          t.uri,
                  spotifyUri:  t.uri,
                  label:       'Album',
                  artist:      artist.name,
                  title:       t.name,
                  subtitle:    album.name,
                  date:        dateStr,
                  rawDate:     album.release_date || '',
                  image:       coverUrl,
                  isNew:       true,
                  liked:       0,
                  duration_ms: t.duration_ms || 0,
                }));
                setFeed(F => [...F, ...trackItems].slice(0, 1000));
              }
              log(`✓ ${artist.name} — ${album.name} · ${addedCount} titre(s) sauvegardé(s)`, 'ok');
            }

            // Date de scan avancée UNIQUEMENT si la liste d'albums a bien été lue —
            // sinon la fenêtre de scan serait brûlée sans avoir rien scanné (sorties perdues à jamais)
            dbRun(
              "INSERT OR REPLACE INTO artists_scraped (spotify_id, last_scraped_at) VALUES (?, datetime('now'))",
              [artist.id]
            );
          } else {
            log(`⚠ ${artist.name} — albums inaccessibles, date de scan non avancée`, 'warn');
          }

          // Sauvegarder la progression pour reprise après redémarrage —
          // avec le curseur de page : la reprise ne re-paginera plus depuis le début
          localStorage.setItem('spotifyplus_sync_progress', JSON.stringify({
            artists_scanned:  artistsScanned,
            total_artists:    totalArtists,
            last_artist_name: artist.name,
            page_url:         pageUrl,
            page_offset:      i + 1,
          }));

          const isVeryLast = !nextUrl && i === artists.length - 1;
          if (!isVeryLast) {
            saveDB().catch(() => {});
            const jitter   = Math.random() * 2000 + 1000;
            const delay    = delayChoiceRef.current * 1000 + jitter;
            const nextName = i + 1 < artists.length ? artists[i + 1].name : 'page suivante';
            // ETA sur TOUS les artistes restants — le temps borné aux 100/jour est
            // déjà affiché par "Temps total de la session" dans NextCallPanel
            updateETA(totalArtists - artistsScanned, delay);
            setStatus(`Pause avant : ${nextName}`, 'wait');
            log(`⏳ Attente ${(delay/1000).toFixed(1)}s → ${nextName}`, 'wait');
            const sec = Math.ceil(delay / 1000);
            setNextCallTotal(sec); setNextCall(sec);
            await sleep(delay);
          }
        }
      }

      setProgress(100);
      if (totalTracks === 0) {
        setStatus('Terminé — aucune nouvelle sortie.', 'green');
        log('Aucune sortie trouvée dans cette période.', 'info');
      } else {
        setStatus(`Terminé ✓ — ${totalTracks} titre(s)`, 'green');
        log(`🎵 ${totalTracks} titre(s) depuis ${totalReleases} sortie(s) sauvegardés en base.`, 'ok');
      }
      await endSync('completed');
    } catch (err) {
      if (err.message === 'SYNC_RATE_ABORT') {
        log(`🚫 Rate limit 429 — synchro stoppée. Réessaie dans ~${err.blockMin} min.`, 'error');
        setStatus(`Bloqué ${err.blockMin} min — rate limit Spotify`, 'error');
      } else {
        log(`Erreur : ${err.message}`, 'error');
        setStatus('Erreur — arrêté.', 'wait');
      }
      await endSync('error');
    }
  };

  const logout = () => { logoutClear(); window.location.reload(); };

  const api = {
    authState, user, otherTab,
    syncState, scraping, paused, rlWaiting, blockedUntil, togglePause, startSync, logout,
    stats, progress, currentArtist, statusMsg, statusMode,
    nextCall, nextCallTotal, eta, dailyScrapings, feed, logs, now,
    delayChoice, setDelayChoice,
    listenStats, setListenStats,
    seek,
    loopEnabled, setLoopEnabled,
    dbReady, purgeListened, removeFromFeed, setTrackLiked,
    likedTracks, setLikedTracks, history, navigateFeed,
    filteredFeed, filterType, setFilterType, sortBy, setSortBy,
    artistSearch, setArtistSearch, resetFilters,
    resumableSession, resumeSync,
  };
  return <StoreCtx.Provider value={api}>{children}</StoreCtx.Provider>;
}

function useIsMobile(bp = 820) {
  const [m, setM] = React.useState(typeof window !== 'undefined' ? window.innerWidth < bp : false);
  React.useEffect(() => {
    const h = () => setM(window.innerWidth < bp);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, [bp]);
  return m;
}

// Détecte un viewport très court (ex. fenêtre du bas en multi-fenêtres / split-screen sur tel)
// → on n'affiche alors que la barre de contrôles (CompactPlayer)
function useShortViewport(maxH = 500) {
  const get = () => typeof window !== 'undefined' && window.innerHeight < maxH;
  const [s, setS] = React.useState(get);
  React.useEffect(() => {
    const h = () => setS(get());
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, [maxH]);
  return s;
}

function AlbumArt({ size=48, letter='S', color=C.accent, image }) {
  if (image) return <img src={image} alt="" style={{ width:size, height:size, borderRadius:size*0.15, objectFit:'cover', flexShrink:0 }} />;
  return (
    <div style={{ width:size, height:size, borderRadius:size*0.15, flexShrink:0, background:`linear-gradient(135deg,${color}22,${color}55)`, border:`1px solid ${color}44`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.38, fontWeight:700, color, fontFamily:'DM Mono,monospace' }}>{letter}</div>
  );
}
function ProgressBar({ pct, color=C.accent, height=3 }) {
  return (
    <div style={{ width:'100%', height, background:'#2a2a2a', borderRadius:99, overflow:'hidden' }}>
      <div style={{ width:`${pct}%`, height:'100%', background:color, borderRadius:99, transition:'width 0.6s linear' }} />
    </div>
  );
}

function SeekBar({ now }) {
  const { seek } = useStore();
  const barRef   = React.useRef(null);
  const [hover,    setHover]    = React.useState(false);
  const [dragging, setDragging] = React.useState(false);
  const [localPct, setLocalPct] = React.useState(null);

  const getPct = (clientX) => {
    const r = barRef.current.getBoundingClientRect();
    return Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100));
  };

  const startDrag = (clientX) => {
    setDragging(true);
    setLocalPct(getPct(clientX));
  };
  const onMouseDown = (e) => {
    e.preventDefault();
    startDrag(e.clientX);
    const onMove = (ev) => setLocalPct(getPct(ev.clientX));
    const onUp   = (ev) => {
      const p = getPct(ev.clientX);
      setDragging(false); setLocalPct(null);
      seek((p / 100) * now.duration * 1000);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup',   onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onUp);
  };
  const onTouchStart = (e) => {
    e.preventDefault();
    startDrag(e.touches[0].clientX);
    const onMove = (ev) => setLocalPct(getPct(ev.touches[0].clientX));
    const onEnd  = (ev) => {
      const p = getPct(ev.changedTouches[0].clientX);
      setDragging(false); setLocalPct(null);
      seek((p / 100) * now.duration * 1000);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend',  onEnd);
    };
    window.addEventListener('touchmove', onMove, { passive:false });
    window.addEventListener('touchend',  onEnd);
  };

  const pct       = (dragging && localPct !== null) ? localPct : (now.current / Math.max(now.duration, 1)) * 100;
  const showThumb = hover || dragging;

  return (
    <div ref={barRef}
      onMouseDown={onMouseDown}
      onTouchStart={onTouchStart}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ flex:1, height:28, display:'flex', alignItems:'center', cursor:'pointer', position:'relative', userSelect:'none', touchAction:'none' }}>
      <div style={{ width:'100%', height: showThumb ? 4 : 3, background:'#2a2a2a', borderRadius:99, overflow:'visible', transition:'height 0.12s', position:'relative' }}>
        <div style={{ width:`${pct}%`, height:'100%', background:C.accent, borderRadius:99, transition: dragging ? 'none' : 'width 0.6s linear' }} />
      </div>
      <div style={{
        position:'absolute', left:`${pct}%`, top:'50%',
        transform:'translate(-50%, -50%)',
        width:13, height:13, borderRadius:'50%', background:'#fff',
        boxShadow:'0 1px 6px rgba(0,0,0,0.6)',
        opacity: showThumb ? 1 : 0,
        transition: dragging ? 'none' : 'opacity 0.12s',
        pointerEvents:'none',
      }} />
    </div>
  );
}
function Tag({ children, color=C.accent }) {
  return <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', background:`${color}18`, color, border:`1px solid ${color}40`, borderRadius:4, padding:'2px 6px' }}>{children}</span>;
}
function StatusDot({ active, mode }) {
  const isPulse = mode === 'pulse' || mode === 'wait';
  const col     = mode === 'wait' ? 'oklch(0.75 0.18 80)' : (active ? C.accent : C.dim);
  return <span style={{ display:'inline-block', width:7, height:7, borderRadius:'50%', background:col, boxShadow: active||isPulse ? `0 0 6px ${col}` : 'none', flexShrink:0, animation: isPulse ? 'spdot 1.1s ease-in-out infinite' : 'none' }} />;
}
const fmt      = s => { if (!s && s !== 0) return '0:00'; const m = Math.floor(s/60); return `${m}:${(s%60).toString().padStart(2,'0')}`; };
const logColor = t => t==='ok' ? C.accent : t==='warn'||t==='wait' ? 'oklch(0.75 0.18 80)' : t==='error' ? 'oklch(0.65 0.18 25)' : C.muted;

const SpotifyIcon = ({ size=18, fill='#000' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill}><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 11-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.78.78 0 01.519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.795c3.527-1.07 9.393-.862 13.097 1.35a.937.937 0 01-.937 1.622z"/></svg>
);

if (!document.getElementById('sp-anim')) {
  const s = document.createElement('style'); s.id = 'sp-anim';
  s.textContent = '@keyframes spdot{0%,100%{opacity:1}50%{opacity:.35}}';

}

function MobilePlayer() {
  const { now, feed, filteredFeed, loopEnabled, setLoopEnabled, seek, setTrackLiked, likedTracks } = useStore();
  const [isLiked, setIsLiked] = React.useState(false);

  // Vérifier si le titre en cours est liké — local d'abord, API seulement si inconnu
  React.useEffect(() => {
    const feedItem = now?.uri ? feed.find(f => f.spotifyUri === now.uri) : null;
    const inLocal  = likedTracks.some(t => t.spotifyUri === now?.uri) || !!feedItem?.liked;
    setIsLiked(inLocal);
    if (!now?.uri) return;
    // Titre connu localement (feed ou likés) : la DB fait foi, pas besoin d'une
    // requête /me/library/contains à chaque changement de titre
    if (feedItem || inLocal) return;
    libraryContains([now.uri])
      .then(data => { if (data) setIsLiked(data[0]); })
      .catch(() => {});
  }, [now?.uri]);

  if (!now) return null;

  const currentIndex = filteredFeed.findIndex(f => f.spotifyUri === now.uri);
  const hasFeed      = filteredFeed.length > 0;

  const togglePlayPause = async () => {
    if (now.playing) await apiPut('https://api.spotify.com/v1/me/player/pause');
    else             await apiPut('https://api.spotify.com/v1/me/player/play');
  };
  const prevTrack = async () => {
    const idx = currentIndex > 0 ? currentIndex - 1 : filteredFeed.length - 1;
    if (filteredFeed[idx]) await playTrack(filteredFeed[idx].spotifyUri);
  };
  const nextTrack = async () => {
    const idx = currentIndex >= 0 && currentIndex < filteredFeed.length - 1 ? currentIndex + 1 : 0;
    if (!filteredFeed[idx]) return;
    await playTrack(filteredFeed[idx].spotifyUri);
    const dur = filteredFeed[idx].duration_ms;
    if (dur > 0) setTimeout(() => seek(Math.floor(dur * 0.25)), 400);
  };
  const toggleLoop = async () => {
    const next = !loopEnabled;
    setLoopEnabled(next);
    await apiPut(`https://api.spotify.com/v1/me/player/repeat?state=${next ? 'track' : 'off'}`);
  };
  const toggleLike = async () => {
    if (!now.uri) return;
    if (isLiked) {
      const res = await libraryRemove(now.uri);
      if (libraryScopeAlert(res)) return;
      setIsLiked(false);
      setTrackLiked(now.uri, false);
    } else {
      const res = await librarySave(now.uri);
      if (libraryScopeAlert(res)) return;
      setIsLiked(true);
      setTrackLiked(now.uri, true);
    }
  };

  const btnCtrl = { background:'none', border:'none', cursor:'pointer', padding:10, display:'flex', alignItems:'center', justifyContent:'center' };

  return (
    <div style={{ height:'25vh', minHeight:160, background:'linear-gradient(180deg,#131313 0%,#0a0a0a 100%)', borderTop:`1px solid ${C.border}`, display:'flex', flexDirection:'column', padding:'10px 20px 16px', flexShrink:0, gap:6 }}>

      {/* Pochette + titre + artiste + position + like */}
      <div style={{ display:'flex', alignItems:'center', gap:14, flex:1, minHeight:0 }}>
        <AlbumArt size={80} letter={(now.title||'?')[0]} color={C.accent} image={now.image} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:15, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', color:C.text }}>{now.title}</div>
          <div style={{ fontSize:12, color:C.muted, marginTop:3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{now.artist}</div>
          {currentIndex >= 0 && (
            <div style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', marginTop:5 }}>{currentIndex + 1} / {filteredFeed.length}</div>
          )}
        </div>
        {/* Bouton +1min */}
        <button onClick={() => seek(Math.min((now.current + 60) * 1000, now.duration * 1000 - 2000))}
          style={{ ...btnCtrl, flexShrink:0 }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted, fontFamily:'DM Mono,monospace', letterSpacing:'-0.03em' }}>+1:00</span>
        </button>
        {/* Bouton Like */}
        <button onClick={toggleLike} style={{ ...btnCtrl, flexShrink:0 }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill={isLiked ? '#e05050' : 'none'} stroke={isLiked ? '#e05050' : C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>

      {/* Barre de progression */}
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:32, textAlign:'right', flexShrink:0 }}>{fmt(now.current)}</span>
        <SeekBar now={now} />
        <span style={{ fontSize:10, color:C.dim, fontFamily:'DM Mono,monospace', width:32, flexShrink:0 }}>{fmt(now.duration)}</span>
      </div>

      {/* Contrôles */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:16 }}>
        <button onClick={prevTrack} style={{ ...btnCtrl, opacity: hasFeed ? 1 : 0.3 }}>
          <svg width="26" height="26" viewBox="0 0 16 16" fill={C.muted}><rect x="1" y="1" width="2" height="14" rx="1"/><path d="M13 1L4 8l9 7V1z"/></svg>
        </button>
        <button onClick={togglePlayPause} style={{ width:56, height:56, borderRadius:'50%', background:C.accent, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          {now.playing
            ? <svg width="16" height="18" viewBox="0 0 12 14" fill="#000"><rect x="0" y="0" width="4" height="14" rx="1"/><rect x="8" y="0" width="4" height="14" rx="1"/></svg>
            : <svg width="16" height="18" viewBox="0 0 12 14" fill="#000"><path d="M1 0l11 7-11 7V0z"/></svg>}
        </button>
        <button onClick={nextTrack} style={{ ...btnCtrl, opacity: hasFeed ? 1 : 0.3 }}>
          <svg width="26" height="26" viewBox="0 0 16 16" fill={C.muted}><rect x="13" y="1" width="2" height="14" rx="1"/><path d="M3 1l9 7-9 7V1z"/></svg>
        </button>
        {/* Bouton Loop / Auto-avance */}
        <button onClick={toggleLoop} style={{ ...btnCtrl }} title={loopEnabled ? 'Passer à la suivante' : 'Relancer en boucle'}>
          {loopEnabled
            ? /* Icône boucle active (accent) */
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                <text x="9" y="15" fontSize="7" fill={C.accent} stroke="none" fontWeight="bold">1</text>
              </svg>
            : /* Icône auto-avance (muted) */
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
          }
        </button>
      </div>
    </div>
  );
}

function PlayerBar() {
  const { now, feed, filteredFeed, loopEnabled, setLoopEnabled, seek } = useStore();

  const togglePlayPause = async () => {
    if (!now) return;
    if (now.playing) {
      await apiPut('https://api.spotify.com/v1/me/player/pause');
    } else {
      await apiPut('https://api.spotify.com/v1/me/player/play');
    }
  };

  const toggleLoop = async () => {
    const next = !loopEnabled;
    setLoopEnabled(next);
    await apiPut(`https://api.spotify.com/v1/me/player/repeat?state=${next ? 'track' : 'off'}`);
  };

  const currentIndex = now?.uri ? filteredFeed.findIndex(f => f.spotifyUri === now.uri) : -1;

  const prevTrack = async () => {
    const idx = currentIndex > 0 ? currentIndex - 1 : filteredFeed.length - 1;
    if (filteredFeed[idx]) await playTrack(filteredFeed[idx].spotifyUri);
  };
  const nextTrack = async () => {
    const idx = currentIndex >= 0 && currentIndex < filteredFeed.length - 1 ? currentIndex + 1 : 0;
    if (!filteredFeed[idx]) return;
    await playTrack(filteredFeed[idx].spotifyUri);
    const dur = filteredFeed[idx].duration_ms;
    if (dur > 0) setTimeout(() => seek(Math.floor(dur * 0.25)), 400);
  };

  const hasFeed = filteredFeed.length > 0;
  const btnStyle = active => ({ background:'none', border:'none', cursor: active ? 'pointer' : 'default', display:'flex', alignItems:'center', justifyContent:'center', padding:6, borderRadius:6, opacity: active ? 0.7 : 0.25 });

  if (!now) {
    return (
      <div style={{ height:68, background:C.surfaceHigh, borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 22px', flexShrink:0 }}>
        <span style={{ fontFamily:'DM Mono,monospace', fontSize:11, color:C.dim }}>Aucune lecture en cours sur Spotify…</span>
      </div>
    );
  }
  return (
    <div style={{ height:68, background:C.surfaceHigh, borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 22px', gap:18, flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, width:240, minWidth:0 }}>
        <AlbumArt size={42} letter={(now.title||'?')[0]} color={C.accent} image={now.image} />
        <div style={{ minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{now.title}</div>
          <div style={{ fontSize:11, color:C.muted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{now.artist}</div>
        </div>
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <button onClick={prevTrack} disabled={!hasFeed} style={btnStyle(hasFeed)} title="Nouveauté précédente">
            <svg width="16" height="16" viewBox="0 0 16 16" fill={C.muted}>
              <rect x="1" y="1" width="2" height="14" rx="1"/>
              <path d="M13 1L4 8l9 7V1z"/>
