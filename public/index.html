<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotify Raspi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231DB954'/%3E%3Cpath fill='%23000' d='M50 18C32.3 18 18 32.3 18 50s14.3 32 32 32 32-14.3 32-32S67.7 18 50 18zm14.7 46.2c-.6.9-1.7 1.2-2.6.6-7-4.3-15.9-5.3-26.3-2.9-1 .2-2-.4-2.2-1.4-.2-1 .4-2 1.4-2.2 11.4-2.6 21.2-1.5 29.1 3.3.9.6 1.2 1.7.6 2.6zm3.9-8.7c-.7 1.1-2.2 1.5-3.3.7-8-4.9-20.2-6.3-29.7-3.5-1.2.4-2.5-.3-2.9-1.5-.4-1.2.3-2.5 1.5-2.9 10.8-3.3 24.2-1.7 33.7 3.9 1.1.7 1.5 2.2.7 3.3zm.3-9.1C60.6 40.6 44.1 40 34 43c-1.5.5-3-.4-3.4-1.8-.5-1.5.4-3 1.8-3.4 11.6-3.5 30.9-2.8 43.1 4.1 1.4.8 1.8 2.5 1 3.8-.8 1.4-2.5 1.8-3.8 1z'/%3E%3C/svg%3E"/>
  <style>
    :root {
      --green:#1DB954; --black:#0a0a0a; --surface:#111;
      --border:#222; --text:#f0f0f0; --muted:#555;
      --orange:#f5a623;
      --font:'Space Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--text);font-family:var(--font);
      min-height:100vh;padding:1rem;}
    h1{font-size:1.5rem;font-weight:800;margin-bottom:1.5rem;color:var(--green)}
    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:2px;padding:1.25rem;margin-bottom:0.75rem}
    .label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
      color:var(--muted);margin-bottom:0.5rem}
    .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.7rem 1.2rem;
      font-family:var(--font);font-size:0.7rem;font-weight:700;border:none;
      border-radius:2px;cursor:pointer;transition:all 0.15s}
    .btn-green{background:var(--green);color:#000}
    .btn-green:hover{background:#1ed760}
    .btn-green:disabled{opacity:0.35;cursor:not-allowed}
    .btn-orange{background:rgba(245,166,35,0.1);color:var(--orange);
      border:1px solid var(--orange)}
    .btn-ghost{background:transparent;color:var(--muted);
      border:1px solid var(--border)}
    .btn-ghost:hover{color:var(--text);border-color:var(--muted)}
    .row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem}
    input[type=date]{font-family:var(--font);font-size:0.7rem;
      padding:0.5rem 0.75rem;background:#0d0d0d;border:1px solid var(--border);
      border-radius:2px;color:var(--text);color-scheme:dark}
    input[type=date]:focus{outline:none;border-color:var(--green)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
      background:var(--border);border:1px solid var(--border);
      border-radius:2px;margin-bottom:0.75rem}
    .stat{background:var(--surface);padding:0.75rem 0.5rem;text-align:center}
    .stat-val{font-size:1.4rem;font-weight:800;color:var(--green);line-height:1}
    .stat-lbl{font-size:0.55rem;color:var(--muted);text-transform:uppercase;margin-top:0.2rem}
    #log-panel{max-height:220px;overflow-y:auto;padding:0.5rem 0}
    .log-line{font-size:0.63rem;padding:0.22rem 1rem;
      border-bottom:1px solid #161616;line-height:1.5}
    .log-line.success{color:var(--green)}
    .log-line.error{color:#e05555}
    .log-line.wait{color:var(--orange)}
    .log-line.info{color:#888}
    /* Tracks */
    .track-list{display:flex;flex-direction:column;gap:0.5rem;margin-top:0.75rem}
    .track-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;
      background:#0d0d0d;border:1px solid var(--border);border-radius:2px}
    .track-cover{width:48px;height:48px;border-radius:2px;object-fit:cover;
      background:var(--border);flex-shrink:0}
    .track-info{flex:1;min-width:0}
    .track-name{font-size:0.8rem;font-weight:700;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .track-sub{font-size:0.65rem;color:var(--muted);margin-top:0.15rem}
    .track-actions{display:flex;gap:0.4rem;flex-shrink:0}
    .status-bar{display:flex;align-items:center;gap:0.6rem;padding:0.7rem 1rem;
      background:#0d0d0d;border:1px solid var(--border);border-radius:2px;
      font-size:0.7rem;color:var(--muted);margin-bottom:0.75rem}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .dot.g{background:var(--green)}
    .dot.p{background:var(--green);animation:blink 1s infinite}
    .dot.w{background:var(--orange);animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem}
    .tab{padding:0.6rem 1rem;font-family:var(--font);font-size:0.68rem;
      background:transparent;border:none;color:var(--muted);cursor:pointer;
      border-bottom:2px solid transparent;transition:all 0.15s}
    .tab.active{color:var(--green);border-bottom-color:var(--green)}
    .section{display:none}.section.active{display:block}
    .not-connected{text-align:center;padding:3rem 1rem;color:var(--muted)}
    .not-connected a{color:var(--green);text-decoration:none}
  </style>
</head>
<body>
<h1>// Spotify Raspi</h1>

<div id="not-connected" class="not-connected" style="display:none">
  <p>Non connecté. <a href="/api/auth/login">Se connecter avec Spotify →</a></p>
</div>

<div id="app" style="display:none">

  <!-- User -->
  <div class="card">
    <div class="row" style="align-items:center;justify-content:space-between;margin:0">
      <div>
        <div style="font-weight:700;font-size:0.9rem" id="user-name">—</div>
        <div style="font-size:0.62rem;color:var(--green)" id="user-plan">—</div>
      </div>
      <a href="/api/auth/login" class="btn btn-ghost" style="font-size:0.65rem">
        Reconnecter
      </a>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('sync')">Synchronisation</button>
    <button class="tab" onclick="showTab('tracks')">À écouter</button>
    <button class="tab" onclick="showTab('logs')">Logs</button>
  </div>

  <!-- ── TAB SYNC ── -->
  <div id="tab-sync" class="section active">
    <div class="card">
      <div class="label">// période</div>
      <div class="row">
        <div>
          <div style="font-size:0.58rem;color:var(--muted);margin-bottom:0.3rem">DU</div>
          <input type="date" id="date-from"/>
        </div>
        <div>
          <div style="font-size:0.58rem;color:var(--muted);margin-bottom:0.3rem">AU</div>
          <input type="date" id="date-to"/>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-green" id="btn-start" onclick="startSync()">▶ Lancer</button>
        <button class="btn btn-orange" id="btn-pause" style="display:none" onclick="togglePause()">⏸ Pause</button>
        <button class="btn btn-ghost" id="btn-stop" style="display:none" onclick="stopSync()">⏹ Arrêter</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="dot g" id="status-dot"></div>
      <span id="status-msg">Prêt.</span>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-scanned">—</div><div class="stat-lbl">Scannés</div></div>
      <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-val" id="s-releases">—</div><div class="stat-lbl">Sorties</div></div>
      <div class="stat"><div class="stat-val" id="s-tracks">—</div><div class="stat-lbl">Titres</div></div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;
        padding:0.75rem 1rem;border-bottom:1px solid var(--border)">
        <span style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)">
          // journal live
        </span>
        <span style="font-size:0.6rem;color:var(--muted)" id="log-count">0 événements</span>
      </div>
      <div id="log-panel"></div>
    </div>
  </div>

  <!-- ── TAB TRACKS ── -->
  <div id="tab-tracks" class="section">
    <div class="stats" style="margin-bottom:0.75rem">
      <div class="stat"><div class="stat-val" id="t-pending">—</div><div class="stat-lbl">En attente</div></div>
      <div class="stat"><div class="stat-val" id="t-listened">—</div><div class="stat-lbl">Écoutés</div></div>
      <div class="stat"><div class="stat-val" id="t-skipped">—</div><div class="stat-lbl">Passés</div></div>
      <div class="stat"><div class="stat-val" id="t-total">—</div><div class="stat-lbl">Total</div></div>
    </div>
    <div id="track-list" class="track-list"></div>
    <div style="text-align:center;margin-top:1rem">
      <button class="btn btn-ghost" id="load-more" onclick="loadMoreTracks()" style="display:none">
        Charger plus
      </button>
    </div>
  </div>

  <!-- ── TAB LOGS ── -->
  <div id="tab-logs" class="section">
    <div class="row">
      <select id="log-level-filter" onchange="loadLogs()"
        style="font-family:var(--font);font-size:0.68rem;background:#0d0d0d;
        border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:2px">
        <option value="">Tous les niveaux</option>
        <option value="success">Success</option>
        <option value="info">Info</option>
        <option value="error">Error</option>
        <option value="wait">Wait</option>
        <option value="warn">Warn</option>
      </select>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div id="logs-list" style="max-height:500px;overflow-y:auto;padding:0.5rem 0"></div>
    </div>
  </div>

</div>

<script>
const API = '/api';
let tracksOffset  = 0;
let tracksTotal   = 0;
let syncInterval  = null;
let paused        = false;
let logLines      = 0;
let lastLogId     = 0;

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  const res  = await fetch(`${API}/auth/status`);
  const data = await res.json();

  if (!data.connected) {
    document.getElementById('not-connected').style.display = 'block';
    return;
  }

  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = data.user.display_name || data.user.spotify_user_id;
  document.getElementById('user-plan').textContent = data.user.plan || 'Spotify';

  // Dates par défaut
  const today   = new Date().toISOString().split('T')[0];
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
  document.getElementById('date-from').value = weekAgo;
  document.getElementById('date-to').value   = today;

  loadTrackStats();
  pollSyncState();
}

// ── Tabs ──────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  event.target.classList.add('active');
  if (name === 'tracks') loadTracks(true);
  if (name === 'logs')   loadLogs();
}

// ── Sync ──────────────────────────────────────────────────────────
async function startSync() {
  const dateFrom = document.getElementById('date-from').value;
  const dateTo   = document.getElementById('date-to').value;
  if (!dateFrom || !dateTo) return;

  paused   = false;
  logLines = 0;
  lastLogId = 0;
  document.getElementById('log-panel').innerHTML = '';
  document.getElementById('log-count').textContent = '0 événements';

  await fetch(`${API}/sync/start`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dateFrom, dateTo }),
  });

  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-pause').style.display = 'inline-flex';
  document.getElementById('btn-stop').style.display  = 'inline-flex';

  setStatus('Synchro en cours…', 'p');
  startPolling();
}

async function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  if (paused) {
    await fetch(`${API}/sync/pause`, { method: 'POST' });
    btn.textContent = '▶ Reprendre';
    btn.className   = 'btn btn-green';
    setStatus('En pause.', 'w');
  } else {
    await fetch(`${API}/sync/resume`, { method: 'POST' });
    btn.textContent = '⏸ Pause';
    btn.className   = 'btn btn-orange';
    setStatus('Reprise…', 'p');
  }
}

async function stopSync() {
  await fetch(`${API}/sync/stop`, { method: 'POST' });
  stopPolling();
  resetSyncUI();
  setStatus('Arrêté.', 'g');
}

function startPolling() {
  stopPolling();
  syncInterval = setInterval(pollSyncState, 1500);
}

function stopPolling() {
  if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
}

async function pollSyncState() {
  const res   = await fetch(`${API}/sync/state`);
  const state = await res.json();

  if (state.lastSync) {
    const s = state.lastSync;
    document.getElementById('s-scanned').textContent  = s.artists_scanned  || '0';
    document.getElementById('s-total').textContent    = s.total_artists    || '—';
    document.getElementById('s-releases').textContent = s.releases_found   || '0';
    document.getElementById('s-tracks').textContent   = s.tracks_found     || '0';
  }

  // Récupère les nouveaux logs
  await pollLogs(state.lastSync?.id);

  if (!state.isSyncing && syncInterval) {
    stopPolling();
    resetSyncUI();
    const s = state.lastSync;
    if (s?.status === 'done') setStatus(`✓ Terminé — ${s.tracks_found} titres`, 'g');
    else if (s?.status === 'error') setStatus('Erreur — voir les logs', 'w');
    loadTrackStats();
  }
}

async function pollLogs(syncId) {
  if (!syncId) return;
  const url = `${API}/logs?syncId=${syncId}&limit=50`;
  const res = await fetch(url);
  const data = await res.json();

  const panel = document.getElementById('log-panel');
  const newLogs = data.logs
    .filter(l => l.id > lastLogId)
    .reverse();

  for (const l of newLogs) {
    const div = document.createElement('div');
    div.className = `log-line ${l.level}`;
    const t = l.created_at.slice(11, 19);
    div.textContent = `[${t}] › ${l.message}`;
    panel.appendChild(div);
    lastLogId = Math.max(lastLogId, l.id);
    logLines++;
  }

  if (newLogs.length) {
    panel.scrollTop = panel.scrollHeight;
    document.getElementById('log-count').textContent = `${logLines} événements`;
  }
}

function resetSyncUI() {
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-stop').style.display  = 'none';
  paused = false;
}

function setStatus(msg, dotClass = 'g') {
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('status-dot').className   = `dot ${dotClass}`;
}

// ── Tracks ────────────────────────────────────────────────────────
async function loadTrackStats() {
  const res  = await fetch(`${API}/tracks/stats`);
  const data = await res.json();
  document.getElementById('t-pending').textContent  = data.pending   || '0';
  document.getElementById('t-listened').textContent = data.listened  || '0';
  document.getElementById('t-skipped').textContent  = data.skipped   || '0';
  document.getElementById('t-total').textContent    = data.total     || '0';
}

async function loadTracks(reset = false) {
  if (reset) { tracksOffset = 0; document.getElementById('track-list').innerHTML = ''; }

  const res  = await fetch(`${API}/tracks?listened=0&limit=20&offset=${tracksOffset}`);
  const data = await res.json();
  tracksTotal = data.total;

  const list = document.getElementById('track-list');
  for (const t of data.tracks) {
    const el = document.createElement('div');
    el.className = 'track-item';
    el.id = `track-${t.id}`;
    const dur = t.track_duration_ms
      ? `${Math.floor(t.track_duration_ms/60000)}:${String(Math.floor((t.track_duration_ms%60000)/1000)).padStart(2,'0')}`
      : '—';
    el.innerHTML = `
      ${t.album_cover_url
        ? `<img class="track-cover" src="${t.album_cover_url}" alt="cover"/>`
        : `<div class="track-cover" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem">♪</div>`}
      <div class="track-info">
        <div class="track-name">${t.track_name}</div>
        <div class="track-sub">${t.artist_name} · ${t.album_name} · ${dur}</div>
        <div class="track-sub" style="font-size:0.55rem;margin-top:0.1rem">${t.release_date || ''}</div>
      </div>
      <div class="track-actions">
        <button class="btn btn-green" onclick="playTrack(${t.id},'${t.spotify_track_uri}')" style="padding:0.5rem 0.7rem;font-size:0.65rem">▶</button>
        <button class="btn btn-ghost" onclick="skipTrack(${t.id})" style="padding:0.5rem 0.7rem;font-size:0.65rem">↪</button>
      </div>
    `;
    list.appendChild(el);
  }

  tracksOffset += data.tracks.length;
  const btn = document.getElementById('load-more');
  btn.style.display = tracksOffset < tracksTotal ? 'inline-flex' : 'none';
}

function loadMoreTracks() { loadTracks(false); }

async function playTrack(id, uri) {
  const res  = await fetch(`${API}/playback/play`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ uri, trackId: id }),
  });
  const data = await res.json();
  if (data.ok) {
    // Marque comme écouté
    await fetch(`${API}/tracks/${id}/listened`, { method: 'PUT' });
    document.getElementById(`track-${id}`)?.remove();
    loadTrackStats();
  } else {
    alert(`Erreur : ${data.error}`);
  }
}

async function skipTrack(id) {
  await fetch(`${API}/tracks/${id}/skipped`, { method: 'PUT' });
  document.getElementById(`track-${id}`)?.remove();
  loadTrackStats();
}

// ── Logs ──────────────────────────────────────────────────────────
async function loadLogs() {
  const level = document.getElementById('log-level-filter').value;
  const url   = `${API}/logs?limit=200${level ? '&level=' + level : ''}`;
  const res   = await fetch(url);
  const data  = await res.json();

  const el = document.getElementById('logs-list');
  el.innerHTML = '';
  for (const l of data.logs) {
    const div = document.createElement('div');
    div.className = `log-line ${l.level}`;
    const t = l.created_at.slice(0, 19).replace('T', ' ');
    div.textContent = `[${t}] [${l.source}] › ${l.message}`;
    el.appendChild(div);
  }
}

init();
</script>
</body>
</html>
